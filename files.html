<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
  <title>파일 · 핀로그</title>
  <link rel="icon" type="image/png" href="/assets/logo.png" />
  <link rel="apple-touch-icon" href="/assets/logo.png" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#f04438" />
  <script>document.documentElement.classList.add(window.Capacitor ? "dt-app" : "dt-web");</script>
  <link rel="stylesheet" href="/css/style.css?v=232" />
</head>
<body class="app-bg has-tabbar" data-kbresize="none">
  <header class="topbar">
    <div class="topbar__brand">파일</div>
    <div class="topbar__right">
    </div>
  </header>

  <input type="file" id="file-input" hidden multiple
         accept="image/*,application/pdf,.doc,.docx,.ppt,.pptx,.xls,.xlsx,.txt,.hwp,.hwpx" />

  <main class="container">
    <input type="search" id="file-search" class="field__input memo-search" placeholder="파일 검색" autocomplete="off" />
    <div class="memo-cats" id="fcats"></div>
    <p class="file-status" id="file-status" hidden></p>
    <div id="file-list"></div>
  </main>

  <!-- 폴더 관리 시트 -->
  <div class="evsheet" id="fcat-sheet" hidden>
    <div class="evsheet__backdrop" data-fcat-close></div>
    <div class="evsheet__panel">
      <div class="evsheet__head">
        <span></span>
        <span class="evsheet__title">폴더 관리</span>
        <button type="button" class="evsheet__save" data-fcat-close>완료</button>
      </div>
      <div class="catmgr__addrow">
        <input type="text" id="fcat-new-input" class="field__input" placeholder="새 폴더 이름" maxlength="20" autocomplete="off" />
        <button type="button" class="catmgr__addbtn" id="fcat-new-btn">추가</button>
      </div>
      <div id="fcat-mgr-list"></div>
    </div>
  </div>

  <!-- 폴더 이동 시트 -->
  <div class="evsheet" id="fpick-sheet" hidden>
    <div class="evsheet__backdrop" data-fpick-close></div>
    <div class="evsheet__panel">
      <div class="evsheet__head">
        <span></span>
        <span class="evsheet__title">폴더로 이동</span>
        <button type="button" class="evsheet__cancel" data-fpick-close>닫기</button>
      </div>
      <div id="fpick-list"></div>
      <div class="catmgr__addrow">
        <input type="text" id="fpick-new-input" class="field__input" placeholder="새 폴더 만들기" maxlength="20" autocomplete="off" />
        <button type="button" class="catmgr__addbtn" id="fpick-new-btn">추가</button>
      </div>
    </div>
  </div>

  <button type="button" class="fab" id="file-add" aria-label="파일 올리기">＋</button>

  <nav class="tabbar">
    <a href="/student.html" class="tabbar__item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V21h14V9.5"/></svg>
      <span>홈</span>
    </a>
    <a href="/calendar.html" class="tabbar__item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M8 3v4M16 3v4M3 10h18"/></svg>
      <span>캘린더</span>
    </a>
    <a href="/memo.html" class="tabbar__item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 3h9l5 5v13a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1z"/><path d="M14 3v6h5M8 13h8M8 17h5"/></svg>
      <span>메모</span>
    </a>
    <a href="/files.html" class="tabbar__item is-active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
      <span>파일</span>
    </a>
    <a href="/settings.html" class="tabbar__item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .34 1.87l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.7 1.7 0 0 0-1.87-.34 1.7 1.7 0 0 0-1 1.55V21a2 2 0 1 1-4 0v-.09a1.7 1.7 0 0 0-1-1.55 1.7 1.7 0 0 0-1.87.34l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.7 1.7 0 0 0 .34-1.87 1.7 1.7 0 0 0-1.55-1H3a2 2 0 1 1 0-4h.09a1.7 1.7 0 0 0 1.55-1 1.7 1.7 0 0 0-.34-1.87l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.7 1.7 0 0 0 1.87.34h.09a1.7 1.7 0 0 0 1-1.55V3a2 2 0 1 1 4 0v.09a1.7 1.7 0 0 0 1 1.55 1.7 1.7 0 0 0 1.87-.34l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.7 1.7 0 0 0-.34 1.87v.09a1.7 1.7 0 0 0 1.55 1H21a2 2 0 1 1 0 4h-.09a1.7 1.7 0 0 0-1.55 1z"/></svg>
      <span>설정</span>

  </nav>

  <script src="/js/vendor/supabase.js"></script>
  <script src="/js/supabaseClient.js?v=mock13"></script>
  <script src="/js/utils.js?v=42"></script>
  <script src="/js/notify.js?v=5"></script>
  <script>
    /* 파일 보관함 — Supabase Storage + files 테이블 + 폴더(file_categories)
     * 업로드: 보고 있는 폴더로 / 탭: 열기 / 스와이프: 이동·삭제 */
    document.addEventListener("DOMContentLoaded", async () => {
      const profile = await requireRole(["student"]);
      if (!profile) return;

      const BUCKET = "memo-files";
      const MAX_SIZE = 25 * 1024 * 1024;
      const listEl = document.getElementById("file-list");
      const searchEl = document.getElementById("file-search");
      const statusEl = document.getElementById("file-status");
      const input = document.getElementById("file-input");
      const esc = (s) => String(s ?? "").replace(/[&<>"']/g, (c) =>
        ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));

      const MOVE_SVG = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>`;
      const DEL_SVG = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4h8v2M6 6l1 14h10l1-14"/><path d="M10 11v6M14 11v6"/></svg>`;

      let files = [];
      let categories = [];
      let activeCat = "all";
      let moveTargetId = null;
      let openRow = null;
      const thumbs = new Map();

      const isImage = (m) => String(m || "").startsWith("image/");
      const sizeText = (n) => {
        const k = Number(n) || 0;
        if (k < 1024) return `${k} B`;
        if (k < 1024 * 1024) return `${Math.round(k / 1024)} KB`;
        return `${(k / 1024 / 1024).toFixed(1)} MB`;
      };
      const when = (iso) => {
        const d = new Date(iso);
        const now = new Date();
        return d.toDateString() === now.toDateString()
          ? `오늘 ${fmtTime12(d)}`
          : `${d.getMonth() + 1}월 ${d.getDate()}일`;
      };
      const icon = (mime, name) => {
        const ext = (name.split(".").pop() || "").toLowerCase();
        if (String(mime).includes("pdf") || ext === "pdf") return "📕";
        if (["doc", "docx", "hwp", "hwpx", "txt"].includes(ext)) return "📄";
        if (["xls", "xlsx", "csv"].includes(ext)) return "📊";
        if (["ppt", "pptx"].includes(ext)) return "📽";
        return "📁";
      };
      const status = (msg) => {
        if (!msg) { statusEl.hidden = true; return; }
        statusEl.textContent = msg;
        statusEl.hidden = false;
      };

      async function signed(path, sec = 3600) {
        const { data } = await supabaseClient.storage.from(BUCKET).createSignedUrl(path, sec);
        return data ? data.signedUrl : null;
      }

      /* ---------- 폴더 칩 ---------- */
      function renderCats() {
        const el = document.getElementById("fcats");
        const uncategorized = files.filter((f) => !f.category_id).length;
        let html = `<button type="button" class="memo-cat${activeCat === "all" ? " is-active" : ""}" data-cat="all">전체 ${files.length}</button>`;
        html += categories.map((c) => {
          const n = files.filter((f) => f.category_id === c.id).length;
          return `<button type="button" class="memo-cat${activeCat === c.id ? " is-active" : ""}" data-cat="${c.id}">${c.color ? `<i class="cat-dot" style="background:${c.color}"></i>` : ""}${esc(c.name)} ${n}</button>`;
        }).join("");
        if (uncategorized && categories.length) {
          html += `<button type="button" class="memo-cat${activeCat === "none" ? " is-active" : ""}" data-cat="none">미분류 ${uncategorized}</button>`;
        }
        html += `<button type="button" class="memo-cat memo-cat--add" data-cat="__manage">폴더 관리</button>`;
        el.innerHTML = html;

        el.querySelectorAll("[data-cat]").forEach((btn) => {
          btn.addEventListener("click", () => {
            const id = btn.dataset.cat;
            if (id === "__manage") { openCatSheet(); return; }
            activeCat = id;
            renderCats();
            render();
          });
        });
      }

      /* ---------- 폴더 관리 시트 ---------- */
      const catSheet = document.getElementById("fcat-sheet");
      const catInput = document.getElementById("fcat-new-input");

      function openCatSheet() {
        renderCatManager();
        catInput.value = "";
        catSheet.hidden = false;
      }
      catSheet.querySelectorAll("[data-fcat-close]").forEach((el2) =>
        el2.addEventListener("click", () => {
          catSheet.hidden = true;
          renderCats();
          render();
        }));

      function renderCatManager() {
        const box = document.getElementById("fcat-mgr-list");
        if (!categories.length) {
          box.innerHTML = `<p class="catmgr__empty">아직 폴더가 없어요.<br/>위에서 첫 폴더를 만들어보세요.</p>`;
          return;
        }
        box.innerHTML = categories.map((c) => `
          <div class="catmgr__row" data-id="${c.id}">
            <button type="button" class="catmgr__dot" style="background:${c.color || CAT_COLORS[0]}" aria-label="색상 변경"></button>
            <input type="text" class="catmgr__name" value="${esc(c.name)}" maxlength="20" />
            <span class="catmgr__count">${files.filter((f) => f.category_id === c.id).length}</span>
            <button type="button" class="catmgr__del">삭제</button>
          </div>`).join("");

        box.querySelectorAll(".catmgr__row").forEach((row) => {
          const cid = row.dataset.id;
          const nameEl = row.querySelector(".catmgr__name");
          const commit = async () => {
            const cat = categories.find((c) => c.id === cid);
            const name = nameEl.value.trim();
            if (!cat || !name || name === cat.name) { nameEl.value = cat ? cat.name : ""; return; }
            const { error } = await supabaseClient.from("file_categories")
              .update({ name }).eq("id", cid);
            if (!error) cat.name = name; else nameEl.value = cat.name;
          };
          nameEl.addEventListener("blur", commit);
          nameEl.addEventListener("keydown", (e) => {
            if (e.key === "Enter" && !e.isComposing) { e.preventDefault(); nameEl.blur(); }
          });

          row.querySelector(".catmgr__dot").addEventListener("click", async (ev) => {
            const cat = categories.find((c) => c.id === cid);
            if (!cat) return;
            const next = CAT_COLORS[(CAT_COLORS.indexOf(cat.color) + 1) % CAT_COLORS.length];
            const { error } = await supabaseClient.from("file_categories")
              .update({ color: next }).eq("id", cid);
            if (!error) { cat.color = next; ev.currentTarget.style.background = next; }
          });
          row.querySelector(".catmgr__del").addEventListener("click", async () => {
            const cat = categories.find((c) => c.id === cid);
            if (!cat) return;
            const n = files.filter((f) => f.category_id === cid).length;
            if (!confirm(n ? `'${cat.name}' 폴더를 삭제할까요?\n파일 ${n}개는 미분류로 이동합니다.` : `'${cat.name}' 폴더를 삭제할까요?`)) return;
            const { error } = await supabaseClient.from("file_categories").delete().eq("id", cid);
            if (!error) {
              categories = categories.filter((c) => c.id !== cid);
              files.forEach((f) => { if (f.category_id === cid) f.category_id = null; });
              if (activeCat === cid) activeCat = "all";
              renderCatManager();
            }
          });
        });
      }

      async function createCategory(name) {
        const text = name.trim();
        if (!text) return null;
        const { data, error } = await supabaseClient.from("file_categories")
          .insert({ student_id: profile.id, name: text, sort: categories.length })
          .select().single();
        if (!error && data) { categories.push(data); return data; }
        return null;
      }
      document.getElementById("fcat-new-btn").addEventListener("click", async () => {
        if (await createCategory(catInput.value)) { catInput.value = ""; renderCatManager(); }
      });
      catInput.addEventListener("keydown", async (e) => {
        if (e.key !== "Enter" || e.isComposing) return;
        e.preventDefault();
        if (await createCategory(catInput.value)) { catInput.value = ""; renderCatManager(); }
      });

      /* ---------- 폴더 이동 시트 ---------- */
      const pickSheet = document.getElementById("fpick-sheet");
      pickSheet.querySelectorAll("[data-fpick-close]").forEach((el2) =>
        el2.addEventListener("click", () => { pickSheet.hidden = true; moveTargetId = null; }));

      function openPickSheet(fileId) {
        moveTargetId = fileId;
        renderPicker();
        pickSheet.hidden = false;
      }
      function renderPicker() {
        const file = files.find((f) => f.id === moveTargetId);
        const cur = file ? (file.category_id || null) : null;
        const rows = [{ id: null, name: "미분류" }].concat(categories);
        document.getElementById("fpick-list").innerHTML = rows.map((c) => {
          const on = (c.id || null) === cur;
          return `<button type="button" class="pickrow${on ? " is-on" : ""}" data-fpick="${c.id || ""}">
            <span>${esc(c.name)}</span>${on ? '<span class="pickrow__check">✓</span>' : ""}
          </button>`;
        }).join("");
        document.querySelectorAll("#fpick-list [data-fpick]").forEach((b) =>
          b.addEventListener("click", () => applyMove(b.dataset.fpick || null)));
      }
      async function applyMove(cid) {
        const file = files.find((f) => f.id === moveTargetId);
        pickSheet.hidden = true;
        if (!file) return;
        const { error } = await supabaseClient.from("files")
          .update({ category_id: cid }).eq("id", file.id);
        if (!error) file.category_id = cid;
        moveTargetId = null;
        openRow = null;
        renderCats();
        render();
      }
      async function createAndMove() {
        const inputEl = document.getElementById("fpick-new-input");
        const made = await createCategory(inputEl.value);
        if (made) { inputEl.value = ""; applyMove(made.id); }
      }
      document.getElementById("fpick-new-btn").addEventListener("click", createAndMove);
      document.getElementById("fpick-new-input").addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.isComposing) { e.preventDefault(); createAndMove(); }
      });

      /* ---------- 업로드 (보고 있는 폴더로) ---------- */
      document.getElementById("file-add").addEventListener("click", () => input.click());
      input.addEventListener("change", async () => {
        const picked = [...input.files];
        input.value = "";
        await uploadPicked(picked);
      });

      async function uploadPicked(picked) {
        if (!picked.length) return;
        const targetCat = activeCat !== "all" && activeCat !== "none" ? activeCat : null;

        let done = 0;
        for (const f of picked) {
          if (f.size > MAX_SIZE) { status(`${f.name} — 25MB를 넘어 건너뜁니다`); continue; }
          status(`올리는 중… ${++done}/${picked.length}`);
          const safe = f.name.replace(/[^\w.\-가-힣 ]/g, "_");
          const path = `${profile.id}/${Date.now()}-${safe}`;
          const up = await supabaseClient.storage.from(BUCKET).upload(path, f, {
            contentType: f.type || "application/octet-stream",
            upsert: false,
          });
          if (up.error) { status(`${f.name} 업로드 실패`); continue; }
          const ins = await supabaseClient.from("files").insert({
            student_id: profile.id, name: f.name, path, mime: f.type, size: f.size,
            category_id: targetCat,
          });
          if (ins.error) {
            await supabaseClient.storage.from(BUCKET).remove([path]);
            status(`${f.name} 저장 실패`);
          }
        }
        status("");
        await load();
      }

      /* ---------- 공유 시트로 받은 파일 자동 저장 ---------- */
      const EXT_MIME = { pdf: "application/pdf", jpg: "image/jpeg", jpeg: "image/jpeg", png: "image/png", gif: "image/gif", heic: "image/heic", txt: "text/plain", csv: "text/csv", doc: "application/msword", docx: "application/vnd.openxmlformats-officedocument.wordprocessingml.document", xls: "application/vnd.ms-excel", xlsx: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet", ppt: "application/vnd.ms-powerpoint", pptx: "application/vnd.openxmlformats-officedocument.presentationml.presentation", hwp: "application/x-hwp", hwpx: "application/x-hwpx", zip: "application/zip", mp4: "video/mp4", mp3: "audio/mpeg", m4a: "audio/mp4" };
      window.__dtHandleSharedFile = async () => {
        try {
          const viz = window.Capacitor && window.Capacitor.Plugins
            ? window.Capacitor.Plugins.VisionOCR : null;
          if (!viz || !viz.takeSharedFile) return;
          const res = await viz.takeSharedFile();
          if (!res || !res.base64) return;
          status("공유받은 파일 저장 중…");
          const bin = atob(res.base64);
          const bytes = new Uint8Array(bin.length);
          for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
          const name = res.name || "공유 파일";
          const ext = (name.split(".").pop() || "").toLowerCase();
          const file = new File([bytes], name, { type: EXT_MIME[ext] || "application/octet-stream" });
          await uploadPicked([file]);
        } catch (e) { status(""); }
      };
      window.__dtHandleSharedFile();   // 페이지 진입 시 대기 파일 처리
      if (new URLSearchParams(location.search).get("upload")) setTimeout(() => input.click(), 300);

      /* ---------- 목록 ---------- */
      function rowHtml(f) {
        const thumb = isImage(f.mime) && thumbs.has(f.path)
          ? `<img class="file-item__thumb" src="${thumbs.get(f.path)}" alt="" loading="lazy" />`
          : `<span class="file-item__icon">${icon(f.mime, f.name)}</span>`;
        return `
          <div class="memo-row file-row" data-id="${f.id}">
            <div class="memo-row__actions">
              <button type="button" class="memo-act memo-act--move" data-act="move">${MOVE_SVG}<span>이동</span></button>
              <button type="button" class="memo-act memo-act--del" data-act="del">${DEL_SVG}<span>삭제</span></button>
            </div>
            <button type="button" class="card memo-item file-item" data-open="${esc(f.path)}">
              ${thumb}
              <span class="file-item__body">
                <span class="file-item__name">${esc(f.name)}</span>
                <span class="file-item__meta">${when(f.created_at)} · ${sizeText(f.size)}</span>
                <span class="file-item__badge">${esc((f.name.split(".").pop() || "파일").slice(0, 6))}</span>
              </span>
            </button>
          </div>`;
      }

      function closeOpen() {
        if (!openRow) return;
        openRow.classList.remove("is-open");
        openRow.querySelector(".memo-item").style.transform = "";
        openRow = null;
      }

      const OPEN_X = -150;
      function wireRow(row) {
        const card = row.querySelector(".memo-item");
        let sx = 0, sy = 0, dx = 0, dir = null, active = false, moved = false;
        const setX = (x) => { card.style.transform = x ? `translateX(${x}px)` : ""; };

        card.addEventListener("pointerdown", (e) => {
          if (e.pointerType === "mouse" && e.button !== 0) return;
          if (openRow && openRow !== row) closeOpen();
          sx = e.clientX; sy = e.clientY; dx = 0; dir = null; active = true; moved = false;
          card.style.transition = "none";
        });
        card.addEventListener("pointermove", (e) => {
          if (!active) return;
          const mx = e.clientX - sx, my = e.clientY - sy;
          if (!dir) {
            if (Math.abs(mx) < 6 && Math.abs(my) < 6) return;
            if (Math.abs(my) > Math.abs(mx)) { active = false; return; }
            dir = "x";
            try { card.setPointerCapture(e.pointerId); } catch (err) {}
          }
          moved = true;
          const base = row.classList.contains("is-open") ? OPEN_X : 0;
          dx = Math.max(OPEN_X - 30, Math.min(0, base + mx));
          setX(dx);
        });
        const finish = () => {
          if (!active) return;
          active = false;
          card.style.transition = "";
          if (dir !== "x") return;
          if (dx < OPEN_X / 2) { setX(OPEN_X); row.classList.add("is-open"); openRow = row; }
          else { setX(0); row.classList.remove("is-open"); if (openRow === row) openRow = null; }
        };
        card.addEventListener("pointerup", finish);
        card.addEventListener("pointercancel", finish);

        card.addEventListener("click", async () => {
          if (moved) { moved = false; return; }
          if (row.classList.contains("is-open")) { closeOpen(); return; }
          status("여는 중…");
          const url = await signed(card.dataset.open);
          if (!url) { status(""); alert("파일을 열지 못했습니다."); return; }

          // 앱: iOS 내장 뷰어(QuickLook) — 이미지는 사진 뷰어, PDF는 PDF 뷰어
          const viz = window.Capacitor && window.Capacitor.isNativePlatform && window.Capacitor.isNativePlatform()
            ? window.Capacitor.Plugins.VisionOCR : null;
          if (viz && viz.previewFile) {
            try {
              const f = files.find((x) => x.id === row.dataset.id);
              const resp = await fetch(url);
              const blob = await resp.blob();
              const b64 = await new Promise((res, rej) => {
                const r = new FileReader();
                r.onload = () => res(String(r.result).split(",")[1]);
                r.onerror = rej;
                r.readAsDataURL(blob);
              });
              status("");
              await viz.previewFile({ base64: b64, name: (f && f.name) || "파일" });
              return;
            } catch (e) { /* 실패 시 아래 웹 열기로 폴백 */ }
          }
          status("");
          const w = window.open(url, "_blank");
          if (!w) window.location.href = url;
        });

        row.querySelector("[data-act=move]").addEventListener("click", () => {
          openPickSheet(row.dataset.id);
        });
        row.querySelector("[data-act=del]").addEventListener("click", async () => {
          const f = files.find((x) => x.id === row.dataset.id);
          if (!f || !confirm(`'${f.name}' 을(를) 삭제할까요?`)) { closeOpen(); return; }
          const { error: se } = await supabaseClient.storage.from(BUCKET).remove([f.path]);
          const { error: de } = await supabaseClient.from("files").delete().eq("id", f.id);
          if (se || de) { status("삭제 실패"); return; }
          files = files.filter((x) => x.id !== f.id);
          openRow = null;
          renderCats();
          render();
        });
      }

      function render() {
        const q = searchEl.value.trim().toLowerCase();
        let rows = q ? files.filter((f) => f.name.toLowerCase().includes(q)) : files;
        if (activeCat === "none") rows = rows.filter((f) => !f.category_id);
        else if (activeCat !== "all") rows = rows.filter((f) => f.category_id === activeCat);

        if (!files.length) {
          listEl.innerHTML = `
            <div class="card memo-empty">
              <p class="memo-empty__title">아직 올린 파일이 없어요</p>
              <p class="memo-empty__desc">필기 사진, 문제지 PDF, 문서를 올려두면<br />폰과 태블릿 어디서나 열어볼 수 있어요</p>
              <button type="button" class="btn btn--primary btn--lg" id="file-first">파일 올리기</button>
            </div>`;
          document.getElementById("file-first").addEventListener("click", () => input.click());
          return;
        }
        if (!rows.length) { listEl.innerHTML = `<p class="muted">해당하는 파일이 없습니다.</p>`; return; }

        listEl.innerHTML = rows.map(rowHtml).join("");
        listEl.querySelectorAll(".file-row").forEach(wireRow);
      }

      async function loadThumbs() {
        const imgs = files.filter((f) => isImage(f.mime) && !thumbs.has(f.path)).slice(0, 40);
        if (!imgs.length) return;
        const { data } = await supabaseClient.storage.from(BUCKET)
          .createSignedUrls(imgs.map((f) => f.path), 3600);
        (data || []).forEach((d) => { if (d.signedUrl) thumbs.set(d.path, d.signedUrl); });
        render();
      }

      async function load() {
        const stopSkel = dtSkeleton(listEl, 4);
        const [filesRes, catsRes] = await Promise.all([
          supabaseClient.from("files").select("*")
            .eq("student_id", profile.id).order("created_at", { ascending: false }),
          supabaseClient.from("file_categories").select("*")
            .eq("student_id", profile.id).order("sort").order("created_at"),
        ]);
        stopSkel();
        if (filesRes.error) { listEl.innerHTML = `<p class="muted">파일을 불러오지 못했습니다.</p>`; return; }
        files = filesRes.data || [];
        categories = catsRes.data || [];
        renderCats();
        render();
        loadThumbs();
      }

      searchEl.addEventListener("input", () => { openRow = null; render(); });
      await load();
    });
  </script>
</body>
</html>
