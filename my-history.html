<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
  <title>내 기록 · 디턴로그</title>
  <link rel="stylesheet" href="/css/style.css?v=85" />
  <script src="/js/vendor/supabase.js"></script>
</head>
<body class="app-bg has-tabbar">
  <header class="topbar">
    <div class="topbar__brand">내 기록</div>
    <span></span>
  </header>

  <main class="container">
    <!-- 기간 필터 -->
    <div class="period" id="period">
      <button type="button" class="period__btn is-active" data-days="7">7일</button>
      <button type="button" class="period__btn" data-days="15">15일</button>
      <button type="button" class="period__btn" data-days="30">1달</button>
      <button type="button" class="period__btn" data-days="90">3달</button>
      <button type="button" class="period__btn" data-days="0">전체</button>
    </div>

    <!-- 요약 -->
    <section class="stat-grid">
      <div class="card stat">
        <span class="stat__label"><span class="period-label">최근 7일</span> 과제 완료율</span>
        <span class="stat__value" id="stat-rate">—</span>
      </div>
      <div class="card stat">
        <span class="stat__label"><span class="period-label">최근 7일</span> 완료 과제</span>
        <span class="stat__value" id="stat-done">—</span>
      </div>
    </section>

    <section class="card">
      <h2 class="card__title"><span class="period-label">최근 7일</span> 일자별 완료율</h2>
      <div id="daily-completion" class="bar-list"><p class="muted">불러오는 중...</p></div>
    </section>

    <section class="card">
      <h2 class="card__title">미완료 사유 TOP 3</h2>
      <ul id="failure-top" class="rank-list"><li class="muted">불러오는 중...</li></ul>
    </section>

    <section class="card">
      <h2 class="card__title">이번 주 핵심 목표</h2>
      <div id="weekly-goals"><p class="muted">불러오는 중...</p></div>
    </section>

    <section class="card">
      <h2 class="card__title">최근 주간 회고</h2>
      <div id="recent-review"><p class="muted">불러오는 중...</p></div>
    </section>
  </main>

  <nav class="tabbar">
    <a href="/student.html" class="tabbar__item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V21h14V9.5"/></svg>
      <span>홈</span>
    </a>
    <a href="/todo.html" class="tabbar__item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3 8-8"/><path d="M20 12v6a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h9"/></svg>
      <span>할 일</span>
    </a>
    <a href="/calendar.html" class="tabbar__item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M8 3v4M16 3v4M3 10h18"/></svg>
      <span>캘린더</span>
    </a>
    <a href="/my-history.html" class="tabbar__item is-active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20V10"/><path d="M12 20V4"/><path d="M20 20v-7"/></svg>
      <span>기록</span>
    </a>
    <a href="/settings.html" class="tabbar__item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .34 1.87l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.7 1.7 0 0 0-1.87-.34 1.7 1.7 0 0 0-1 1.55V21a2 2 0 1 1-4 0v-.09a1.7 1.7 0 0 0-1-1.55 1.7 1.7 0 0 0-1.87.34l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.7 1.7 0 0 0 .34-1.87 1.7 1.7 0 0 0-1.55-1H3a2 2 0 1 1 0-4h.09a1.7 1.7 0 0 0 1.55-1 1.7 1.7 0 0 0-.34-1.87l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.7 1.7 0 0 0 1.87.34h.09a1.7 1.7 0 0 0 1-1.55V3a2 2 0 1 1 4 0v.09a1.7 1.7 0 0 0 1 1.55 1.7 1.7 0 0 0 1.87-.34l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.7 1.7 0 0 0-.34 1.87v.09a1.7 1.7 0 0 0 1.55 1H21a2 2 0 1 1 0 4h-.09a1.7 1.7 0 0 0-1.55 1z"/></svg>
      <span>설정</span>
    </a>
  </nav>

  <script src="/js/supabaseClient.js?v=mock9"></script>
  <script src="/js/utils.js?v=8"></script>
  <script src="/js/history.js?v=9"></script>
</body>
</html>
