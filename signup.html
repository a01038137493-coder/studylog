<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
  <title>회원가입 · 핀로그</title>
  <link rel="stylesheet" href="/css/style.css?v=144" />
</head>
<body class="center-screen">
  <button type="button" class="auth-back" aria-label="뒤로 가기"
          onclick="if (history.length > 1) history.back(); else location.href='/welcome.html'">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M15 5l-7 7 7 7"/></svg>
  </button>

  <div class="auth-split">
  <aside class="auth-brand" aria-hidden="true">
    <div class="auth-brand__inner">
      <img src="/assets/logo.png" alt="" class="auth-brand__logo" onerror="this.style.display='none'" />
      <p class="auth-brand__title">핀로그</p>
      <p class="auth-brand__subtitle">매일 목표를 세우고,<br />실제 성과를 기록하고,<br />누적 데이터를 기반으로 관리합니다.</p>
    </div>
  </aside>
  <main class="auth-card auth-card--lowered">
    <h1 class="auth-card__title">이메일로 가입</h1>

    <form id="signup-form" class="form" autocomplete="on">
      <label class="field">
        <span class="field__label">이름</span>
        <input type="text" id="name" class="field__input" placeholder="이름 또는 닉네임" required maxlength="30" />
      </label>

      <label class="field">
        <span class="field__label">이메일</span>
        <input type="email" id="email" class="field__input" placeholder="이메일" required autocomplete="email" />
      </label>

      <label class="field">
        <span class="field__label">비밀번호</span>
        <input type="password" id="password" class="field__input" placeholder="비밀번호" required minlength="6" autocomplete="new-password" />
      </label>

      <label class="field">
        <span class="field__label">비밀번호 확인</span>
        <input type="password" id="password2" class="field__input" placeholder="비밀번호 확인" required autocomplete="new-password" />
      </label>

      <p id="signup-error" class="form__error" role="alert"></p>
      <p id="signup-success" class="form__success" role="status" hidden></p>

      <button type="submit" class="btn btn--primary btn--block btn--lg">가입하기</button>
    </form>

    <p class="auth-alt">이미 계정이 있나요? <a href="/login.html">로그인</a></p>
  </main>
  </div>

  <script src="/js/vendor/supabase.js"></script>
  <script src="/js/supabaseClient.js?v=mock12"></script>
  <script src="/js/signup.js?v=1"></script>
</body>
</html>
