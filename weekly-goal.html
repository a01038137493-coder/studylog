<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
  <title>이번 주 목표 · 핀로그</title>
  <link rel="stylesheet" href="/css/style.css?v=151" />
</head>
<body class="app-bg">
  <header class="topbar">
    <a href="/student.html" class="topbar__back" aria-label="뒤로 가기"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M15 5l-7 7 7 7"/></svg></a>
    <div class="topbar__brand">이번 주 목표</div>
    <span></span>
  </header>

  <main class="container">
    <p class="section-hint" id="week-range">이번 주</p>
    <p id="edit-notice" class="notice notice--info" hidden>이미 작성한 주간 목표를 수정합니다.</p>

    <form id="weekly-goal-form" class="form card">
      <h2 class="form__group-title">이번 주 핵심 목표</h2>
      <p class="field-help">이번 주에 꼭 이뤄낼 목표를 적어보세요.</p>
      <div id="goal-list"></div>
      <button type="button" class="btn btn--outline btn--block" id="add-goal">+ 핵심 목표 추가</button>

      <h2 class="form__group-title">이번 주 전략</h2>
      <label class="field"><span class="field__label">가장 중요한 약점</span><input type="text" id="weak_point" class="field__input" /></label>
      <label class="field"><span class="field__label">이번 주 생활 목표</span><input type="text" id="life_goal" class="field__input" /></label>
      <label class="field"><span class="field__label">이번 주 위험 요소</span><input type="text" id="risk_factor" class="field__input" /></label>

      <button type="submit" class="btn btn--primary btn--block btn--lg">주간 목표 저장</button>
    </form>
  </main>

  <script src="/js/vendor/supabase.js"></script>
  <script src="/js/supabaseClient.js?v=mock12"></script>
  <script src="/js/utils.js?v=8"></script>
  <script src="/js/weeklyGoal.js?v=9"></script>
</body>
</html>
