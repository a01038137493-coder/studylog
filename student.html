<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
  <title>오늘 · 핀로그</title>
  <link rel="stylesheet" href="/css/style.css?v=174" />
  <!-- 메모장 위젯 폰트 (손글씨/또박또박/명조) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&family=Gaegu:wght@400;700&family=Nanum+Myeongjo:wght@400;700&display=swap" rel="stylesheet" />
</head>
<body class="app-bg has-tabbar">
  <!-- 모바일은 별도 페이지(student-m.html)에서 개발 — 이 파일은 태블릿/PC 전용 -->
  <script>
    if (window.matchMedia("(max-width: 600px)").matches) window.location.replace("/student-m.html");
  </script>


  <main class="container home-wide">
    <div class="pager" id="pager">
    <section class="page">
    <div class="home-main">

    <!-- 전역 그리드 캔버스: 메인카드(고정) + 달력 + 추가 위젯 (1페이지) -->
    <div class="widget-canvas" id="widget-canvas" data-page="1">

    <!-- 고정 메인 위젯 (캡처 영역): 학생카드 + 체크인/체크아웃 + 목표/회고/기록 -->
    <section class="widget widget--core" data-widget="core">

    <!-- 상단 상태 카드 -->
    <section class="card status-card">
      <div class="status-card__top">
        <div>
          <p class="status-card__hello">안녕하세요,</p>
          <h1 class="status-card__name" id="student-name">학생</h1>
        </div>
        <div class="status-card__dday">
          <span class="status-card__dday-label">수능까지</span>
          <span class="status-card__dday-value" id="dday">D-—</span>
        </div>
      </div>
      <p class="status-card__date" id="today-date">오늘</p>

      <!-- 체크아웃 완료 후 오늘 결과 요약 -->
      <div class="result-strip" id="result-strip" hidden></div>

      <!-- 오늘의 한마디 (위인 명언) -->
      <div class="daily-quote daily-quote--in-card" id="daily-quote"></div>
    </section>

    <div class="home-grid">
    <!-- 오늘의 흐름: 체크인(플랜) → 체크아웃(성과). 플랜은 하루 중 추가·수정 가능 -->
    <section class="flow">
      <div class="flow__steps">
        <a href="/checkin.html" class="flow-card" id="act-checkin">
          <span class="flow-card__tag flow-card__tag--am">체크인</span>
          <span class="flow-card__title">오늘 플랜</span>
          <span class="flow-card__meta" id="checkin-meta">아직 작성 전 · 지금 입력</span>
        </a>

        <a href="/checkout.html" class="flow-card" id="act-checkout">
          <span class="flow-card__tag flow-card__tag--pm">체크아웃</span>
          <span class="flow-card__title">오늘 성과</span>
          <span class="flow-card__meta" id="checkout-meta">플랜 입력 후 가능</span>
        </a>
      </div>
    </section>

    <!-- 보조 메뉴 -->
    <section class="action-grid action-grid--secondary">
      <a href="/weekly-goal.html" class="action" id="act-weekly-goal">
        <img class="action__icon" src="/assets/icon/%EB%AA%A9%ED%91%9C.png" alt="" />
        <span class="action__title">이번 주 목표</span>
        <span class="action__desc">월요일에 주간 목표를 정합니다</span>
      </a>

      <a href="/weekly-review.html" class="action" id="act-weekly-review">
        <img class="action__icon" src="/assets/icon/icon-calendar-subscription.svg" alt="" />
        <span class="action__title">주간 회고</span>
        <span class="action__desc">금요일에 한 주를 돌아봅니다</span>
      </a>

      <a href="/my-history.html" class="action" id="act-history">
        <img class="action__icon" src="/assets/icon/ditton_my_records_icon_transparent_clean.png" alt="" />
        <span class="action__title">내 기록 보기</span>
        <span class="action__desc">최근 성과를 확인합니다</span>
      </a>
    </section>
    </div><!-- /home-grid -->
    </section><!-- /widget--core -->

      <section class="widget widget--calendar" data-widget="calendar">
        <button type="button" class="widget__del" aria-label="삭제">−</button>
        <div class="calendar" id="calendar"></div>
      </section>
    </div><!-- /widget-canvas -->

    <p class="footer-quote">오늘의 계획과 실제 결과를 남기면, 내일의 전략이 달라집니다.</p>
    </div><!-- /home-main -->
    </section><!-- /page 1 -->

    <section class="page">
      <div class="home-main">
        <div class="widget-canvas" data-page="2"></div>
      </div>
    </section>

    <section class="page">
      <div class="home-main">
        <div class="widget-canvas" data-page="3"></div>
      </div>
    </section>
    </div><!-- /pager -->

    <!-- 페이지 점 인디케이터 -->
    <div class="pager-dots" id="pager-dots">
      <button type="button" class="pager-dot is-active" data-page="1" aria-label="1페이지"></button>
      <button type="button" class="pager-dot" data-page="2" aria-label="2페이지"></button>
      <button type="button" class="pager-dot" data-page="3" aria-label="3페이지"></button>
    </div>
  </main>

      <span>홈</span>

      <span>캘린더</span>

    <a href="/memo.html" class="tabbar__item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 3h9l5 5v13a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1z"/><path d="M14 3v6h5M8 13h8M8 17h5"/></svg>

      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .34 1.87l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.7 1.7 0 0 0-1.87-.34 1.7 1.7 0 0 0-1 1.55V21a2 2 0 1 1-4 0v-.09a1.7 1.7 0 0 0-1-1.55 1.7 1.7 0 0 0-1.87.34l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.7 1.7 0 0 0 .34-1.87 1.7 1.7 0 0 0-1.55-1H3a2 2 0 1 1 0-4h.09a1.7 1.7 0 0 0 1.55-1 1.7 1.7 0 0 0-.34-1.87l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.7 1.7 0 0 0 1.87.34h.09a1.7 1.7 0 0 0 1-1.55V3a2 2 0 1 1 4 0v.09a1.7 1.7 0 0 0 1 1.55 1.7 1.7 0 0 0 1.87-.34l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.7 1.7 0 0 0-.34 1.87v.09a1.7 1.7 0 0 0 1.55 1H21a2 2 0 1 1 0 4h-.09a1.7 1.7 0 0 0-1.55 1z"/></svg>
      <span>설정</span>

  </nav>

  <script src="/js/vendor/supabase.js"></script>
  <script src="/js/supabaseClient.js?v=mock12"></script>
  <script src="/js/utils.js?v=31"></script>
  <script src="/js/dashboard.js?v=41"></script>
  <script src="/js/student.js?v=29"></script>
</body>
</html>
