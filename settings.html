<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
  <title>설정 · 핀로그</title>
  <link rel="stylesheet" href="/css/style.css?v=182" />
</head>
<body class="app-bg has-tabbar">
  <header class="topbar">
    <div class="topbar__brand">설정</div>
    <span></span>
  </header>

  <main class="container">
    <!-- 프로필 → 마이페이지 -->
    <a href="/mypage.html" class="card settings-profile settings-profile--link">
      <span class="settings-profile__avatar" id="profile-avatar">?</span>
      <span class="settings-profile__txt">
        <span class="settings-profile__name" id="profile-name">—</span>
        <span class="settings-profile__email" id="profile-email">—</span>
      </span>
      <span class="settings-row__chevron" aria-hidden="true">›</span>
    </a>

    <!-- 일반 메뉴 -->
    <section class="card settings-menu">
      <button type="button" class="settings-row" id="utype-row">
        <span>사용 유형</span>
        <span class="settings-row__value"><span id="utype-label">—</span> <span class="settings-row__chevron" aria-hidden="true">›</span></span>
      </button>
      <a href="/my-history.html" class="settings-row" id="history-row">
        내 기록
        <span class="settings-row__chevron" aria-hidden="true">›</span>
      </a>
      <a href="/privacy.html" class="settings-row">
        개인정보처리방침
        <span class="settings-row__chevron" aria-hidden="true">›</span>
      </a>
      <a href="/notifications.html" class="settings-row" id="ntf-link" hidden>
        알림
        <span class="settings-row__chevron" aria-hidden="true">›</span>
      </a>
      <a href="/guide.html" class="settings-row">
        사용법
        <span class="settings-row__chevron" aria-hidden="true">›</span>
      </a>
      <a href="/support.html" class="settings-row">
        문의하기
        <span class="settings-row__chevron" aria-hidden="true">›</span>
      </a>
      <button type="button" class="settings-row" onclick="logout()">
        로그아웃
        <span class="settings-row__chevron" aria-hidden="true">›</span>
      </button>
    </section>

    <!-- 위험 영역 -->
    <section class="card settings-menu">
      <button type="button" class="settings-row settings-row--danger" onclick="deleteMyAccount()">
        계정 삭제
        <span class="settings-row__chevron" aria-hidden="true">›</span>
      </button>
      <p class="settings-menu__hint">계정을 삭제하면 모든 기록이 영구히 사라지며 복구할 수 없습니다.</p>
    </section>

    <p class="settings-version">핀로그 v1.0.0</p>
  </main>

  <div class="evsheet" id="utype-sheet" hidden>
    <div class="evsheet__backdrop" data-ut-close></div>
    <div class="evsheet__panel">
      <div class="evsheet__head">
        <button type="button" class="evsheet__cancel" data-ut-close>취소</button>
        <span class="evsheet__title">사용 유형</span>
        <button type="button" class="evsheet__save" id="ut-save">저장</button>
      </div>
      <button type="button" class="card onb__opt" data-type="exam">
        <span class="onb__opt-title">수험생</span>
        <span class="onb__opt-desc">수능 D-Day · 과목별 과제 · 주간 목표와 회고</span>
      </button>
      <button type="button" class="card onb__opt" data-type="general">
        <span class="onb__opt-title">일반 사용자</span>
        <span class="onb__opt-desc">할 일 · 일정 · 메모 · 파일 중심</span>
      </button>
      <section class="onb__goal" id="ut-goal" hidden>
        <label class="field">
          <span class="field__label">목표 이름 (선택)</span>
          <input type="text" id="ut-goal-label" class="field__input" placeholder="예: 자격증 시험" maxlength="20" />
        </label>
        <label class="field">
          <span class="field__label">목표일 (선택)</span>
          <input type="date" id="ut-goal-date" class="field__input" />
        </label>
      </section>
      <p class="evsheet__error" id="ut-error" role="alert"></p>
    </div>
  </div>

  <nav class="tabbar">
    <a href="/student.html" class="tabbar__item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V21h14V9.5"/></svg>
      <span>홈</span>
    </a>
    <a href="/calendar.html" class="tabbar__item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M8 3v4M16 3v4M3 10h18"/></svg>
      <span>캘린더</span>
    </a>
    <a href="/memo.html" class="tabbar__item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 3h9l5 5v13a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1z"/><path d="M14 3v6h5M8 13h8M8 17h5"/></svg>
      <span>메모</span>
    </a>
    <a href="/files.html" class="tabbar__item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
      <span>파일</span>
    </a>
    <a href="/settings.html" class="tabbar__item is-active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .34 1.87l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.7 1.7 0 0 0-1.87-.34 1.7 1.7 0 0 0-1 1.55V21a2 2 0 1 1-4 0v-.09a1.7 1.7 0 0 0-1-1.55 1.7 1.7 0 0 0-1.87.34l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.7 1.7 0 0 0 .34-1.87 1.7 1.7 0 0 0-1.55-1H3a2 2 0 1 1 0-4h.09a1.7 1.7 0 0 0 1.55-1 1.7 1.7 0 0 0-.34-1.87l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.7 1.7 0 0 0 1.87.34h.09a1.7 1.7 0 0 0 1-1.55V3a2 2 0 1 1 4 0v.09a1.7 1.7 0 0 0 1 1.55 1.7 1.7 0 0 0 1.87-.34l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.7 1.7 0 0 0-.34 1.87v.09a1.7 1.7 0 0 0 1.55 1H21a2 2 0 1 1 0 4h-.09a1.7 1.7 0 0 0-1.55 1z"/></svg>
      <span>설정</span>
    </a>
  </nav>

  <script src="/js/vendor/supabase.js"></script>
  <script src="/js/supabaseClient.js?v=mock13"></script>
  <script src="/js/utils.js?v=36"></script>
  <script src="/js/notify.js?v=4"></script>
  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      const user = await requireAuth();
      if (!user) return;
      document.getElementById("profile-email").textContent = user.email || "";
      const profile = await getCurrentProfile();
      const pname = (profile && profile.name) || "사용자";
      document.getElementById("profile-name").textContent = pname;
      dtPaintAvatar(document.getElementById("profile-avatar"), profile);

      /* 사용 유형 */
      const sheet = document.getElementById("utype-sheet");
      const utLabel = document.getElementById("utype-label");
      const goalBox = document.getElementById("ut-goal");
      const errEl = document.getElementById("ut-error");
      let picked = (profile && profile.user_type) || "exam";

      const paint = () => {
        utLabel.textContent = picked === "general" ? "일반 사용자" : "수험생";
        sheet.querySelectorAll(".onb__opt").forEach((b) => b.classList.toggle("is-picked", b.dataset.type === picked));
        goalBox.hidden = picked !== "general";
      };
      paint();
      // 일반 사용자는 '내 기록'(학습 통계) 숨김
      if (picked === "general") document.getElementById("history-row").hidden = true;

      document.getElementById("ut-goal-label").value = (profile && profile.goal_label) || "";
      document.getElementById("ut-goal-date").value = (profile && profile.goal_date) || "";

      document.getElementById("utype-row").addEventListener("click", () => { sheet.hidden = false; });
      sheet.querySelectorAll("[data-ut-close]").forEach((el) => el.addEventListener("click", () => { sheet.hidden = true; }));
      sheet.querySelectorAll(".onb__opt").forEach((b) => b.addEventListener("click", () => { picked = b.dataset.type; paint(); }));

      document.getElementById("ut-save").addEventListener("click", async () => {
        errEl.textContent = "";
        localStorage.removeItem("dt_profile_cache");
        const patch = { user_type: picked };
        if (picked === "general") {
          const d = document.getElementById("ut-goal-date").value;
          const l = document.getElementById("ut-goal-label").value.trim();
          patch.goal_date = d || null;
          patch.goal_label = d ? (l || "목표") : null;
        } else {
          patch.goal_date = null; patch.goal_label = null;
        }
        const { error } = await supabaseClient.from("profiles").update(patch).eq("id", user.id);
        if (error) { errEl.textContent = "저장하지 못했습니다."; return; }
        window.location.reload();
      });

      /* 알림 설정 메뉴 — 앱에서만 노출 (전용 페이지로 이동) */
      if (window.dtNotify && dtNotify.available) document.getElementById("ntf-link").hidden = false;
    });
  </script>
</body>
</html>
