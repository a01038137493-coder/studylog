<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
  <title>할 일 · 디턴로그</title>
  <link rel="stylesheet" href="/css/style.css?v=91" />
  <script src="/js/vendor/supabase.js"></script>
</head>
<body class="app-bg has-tabbar">
  <header class="topbar">
    <div class="topbar__brand">할 일</div>
    <div class="topbar__right">
      <a href="/checkin.html" class="btn btn--ghost btn--sm" id="edit-plan-btn" hidden>플랜 수정</a>
    </div>
  </header>

  <main class="container">
    <!-- 오늘 일정 (Apple 캘린더, 앱에서만) -->
    <section class="card todo-events" id="todo-events" hidden>
      <p class="todo-events__title">오늘 일정</p>
      <div id="todo-events-list"></div>
    </section>

    <!-- 진행 요약 -->
    <section class="card todo-summary" id="todo-summary" hidden>
      <div class="todo-summary__row">
        <span class="todo-summary__label">오늘 과제</span>
        <span class="todo-summary__count" id="todo-count">0/0 완료</span>
      </div>
      <div class="todo-summary__bar"><div class="todo-summary__fill" id="todo-fill"></div></div>
    </section>

    <!-- 과제 리스트 -->
    <section id="todo-list"></section>

    <!-- 플랜 없음 -->
    <section class="card todo-empty" id="todo-empty" hidden>
      <p class="todo-empty__title">아직 오늘 플랜이 없어요</p>
      <p class="todo-empty__desc">오늘 할 과제를 먼저 정해볼까요?</p>
      <a href="/checkin.html" class="btn btn--primary btn--lg">오늘 플랜 만들기</a>
    </section>
  </main>

  <nav class="tabbar">
    <a href="/student.html" class="tabbar__item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V21h14V9.5"/></svg>
      <span>홈</span>
    </a>
    <a href="/todo.html" class="tabbar__item is-active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3 8-8"/><path d="M20 12v6a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h9"/></svg>
      <span>할 일</span>
    </a>
    <a href="/calendar.html" class="tabbar__item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M8 3v4M16 3v4M3 10h18"/></svg>
      <span>캘린더</span>
    </a>
    <a href="/memo.html" class="tabbar__item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 3h9l5 5v13a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1z"/><path d="M14 3v6h5M8 13h8M8 17h5"/></svg>
      <span>메모</span>
    </a>
    <a href="/settings.html" class="tabbar__item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .34 1.87l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.7 1.7 0 0 0-1.87-.34 1.7 1.7 0 0 0-1 1.55V21a2 2 0 1 1-4 0v-.09a1.7 1.7 0 0 0-1-1.55 1.7 1.7 0 0 0-1.87.34l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.7 1.7 0 0 0 .34-1.87 1.7 1.7 0 0 0-1.55-1H3a2 2 0 1 1 0-4h.09a1.7 1.7 0 0 0 1.55-1 1.7 1.7 0 0 0-.34-1.87l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.7 1.7 0 0 0 1.87.34h.09a1.7 1.7 0 0 0 1-1.55V3a2 2 0 1 1 4 0v.09a1.7 1.7 0 0 0 1 1.55 1.7 1.7 0 0 0 1.87-.34l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.7 1.7 0 0 0-.34 1.87v.09a1.7 1.7 0 0 0 1.55 1H21a2 2 0 1 1 0 4h-.09a1.7 1.7 0 0 0-1.55 1z"/></svg>
      <span>설정</span>
    </a>
  </nav>

  <script src="/js/supabaseClient.js?v=mock9"></script>
  <script src="/js/utils.js?v=14"></script>
  <script>
    /* 오늘 과제 리스트 — 체크 상태는 홈 카드와 같은 localStorage 키로 동기화 */
    function escapeHtml(str) {
      return String(str ?? "").replace(/[&<>"']/g, (c) =>
        ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
    }

    document.addEventListener("DOMContentLoaded", async () => {
      const profile = await requireRole(["student"]);
      if (!profile) return;

      const today = getTodayString();

      /* 오늘 일정 (Apple 캘린더) — 과제 로딩과 독립적으로 비동기 표시 */
      (async () => {
        try {
          const calPlugin = window.Capacitor && window.Capacitor.Plugins
            ? window.Capacitor.Plugins.CapacitorCalendar : null;
          if (!calPlugin) return;
          const { result: perm } = await calPlugin.requestFullCalendarAccess();
          if (perm !== "granted") return;
          const [y, m, d] = today.split("-").map(Number);
          const { result } = await calPlugin.listEventsInRange({
            from: new Date(y, m - 1, d).getTime(),
            to: new Date(y, m - 1, d, 23, 59, 59).getTime(),
          });
          if (!result || !result.length) return;
          result.sort((a, b) => a.startDate - b.startDate);
          const pad2 = (n) => String(n).padStart(2, "0");
          document.getElementById("todo-events-list").innerHTML = result.map((ev) => {
            const t = new Date(ev.startDate);
            const time = ev.isAllDay ? "종일" : `${pad2(t.getHours())}:${pad2(t.getMinutes())}`;
            return `<div class="fcal-ev"><span class="fcal-ev__time">${time}</span><span class="fcal-ev__title">${escapeHtml(ev.title || "(제목 없음)")}</span></div>`;
          }).join("");
          document.getElementById("todo-events").hidden = false;
        } catch (e) {}
      })();

      const progKey = `dt_taskprog_${profile.id}_${today}`;
      const loadProg = () => {
        try { return JSON.parse(localStorage.getItem(progKey)) || { done: {}, sub: {} }; }
        catch (e) { return { done: {}, sub: {} }; }
      };
      const saveProg = (p) => {
        try { localStorage.setItem(progKey, JSON.stringify(p)); } catch (e) {}
        try { window.dispatchEvent(new CustomEvent("dt-taskprog-changed")); } catch (e) {}
      };

      const { data: checkin } = await supabaseClient
        .from("daily_checkins")
        .select("*")
        .eq("student_id", profile.id)
        .eq("date", today)
        .maybeSingle();

      let tasks = checkin && Array.isArray(checkin.tasks) && checkin.tasks.length ? checkin.tasks : null;
      if (!tasks && checkin) tasks = [1, 2, 3].map((n) => ({ text: checkin[`task_${n}`] })).filter((t) => t.text);

      if (!tasks || !tasks.length) {
        document.getElementById("todo-empty").hidden = false;
        return;
      }

      document.getElementById("todo-summary").hidden = false;
      document.getElementById("edit-plan-btn").hidden = false;
      const list = document.getElementById("todo-list");

      const render = () => {
        const prog = loadProg();
        const n = tasks.length;
        const done = tasks.reduce((a, _, i) => a + (prog.done[i] ? 1 : 0), 0);
        document.getElementById("todo-count").textContent = `${done}/${n} 완료`;
        document.getElementById("todo-fill").style.width = n ? `${Math.round((done / n) * 100)}%` : "0%";

        list.innerHTML = tasks.map((t, i) => {
          const subs = Array.isArray(t.subtasks)
            ? t.subtasks.map((s) => (typeof s === "string" ? s : s && s.text)).filter(Boolean)
            : [];
          const sd = prog.sub[i] || {};
          return `
          <div class="card todo-item${prog.done[i] ? " is-done" : ""}">
            <button type="button" class="todo-item__main" data-task="${i}">
              <span class="todo-item__checkbox">${prog.done[i] ? "✓" : ""}</span>
              <span class="todo-item__body">
                ${t.subject ? `<span class="todo-item__subject">${escapeHtml(subjectLabel(t.subject))}</span>` : ""}
                <span class="todo-item__title">${escapeHtml(t.text || "")}</span>
              </span>
            </button>
            ${subs.length ? `<ul class="todo-item__subs">${subs.map((s, j) => `
              <li>
                <button type="button" class="todo-item__sub${sd[j] ? " is-done" : ""}" data-task="${i}" data-sub="${j}">
                  <span class="todo-item__subcheck">${sd[j] ? "✓" : ""}</span>
                  <span class="todo-item__subtext">${escapeHtml(s)}</span>
                </button>
              </li>`).join("")}</ul>` : ""}
          </div>`;
        }).join("");

        list.querySelectorAll(".todo-item__main").forEach((btn) => {
          btn.addEventListener("click", () => {
            const i = Number(btn.dataset.task);
            const p = loadProg();
            p.done[i] = !p.done[i];
            saveProg(p);
            render();
          });
        });
        list.querySelectorAll(".todo-item__sub").forEach((btn) => {
          btn.addEventListener("click", (e) => {
            e.stopPropagation();
            const i = Number(btn.dataset.task);
            const j = Number(btn.dataset.sub);
            const p = loadProg();
            p.sub[i] = p.sub[i] || {};
            p.sub[i][j] = !p.sub[i][j];
            saveProg(p);
            render();
          });
        });
      };

      render();
      window.addEventListener("dt-taskprog-changed", render);
    });
  </script>
</body>
</html>
