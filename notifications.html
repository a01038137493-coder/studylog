<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
  <title>알림 · 핀로그</title>
  <link rel="icon" type="image/png" href="/assets/logo.png" />
  <link rel="apple-touch-icon" href="/assets/logo.png" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#f04438" />
  <script>document.documentElement.classList.add(window.Capacitor ? "dt-app" : "dt-web");</script>
  <link rel="stylesheet" href="/css/style.css?v=240" />
</head>
<body class="app-bg">
  <header class="topbar">
    <a href="/settings.html" class="topbar__back" aria-label="뒤로 가기"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M15 5l-7 7 7 7"/></svg></a>
    <div class="topbar__brand">알림</div>
    <span></span>
  </header>

  <main class="container">
    <!-- 웹(브라우저)에서는 미지원 안내 -->
    <section class="card settings-menu" id="ntf-noapp" hidden>
      <p class="settings-menu__hint" style="padding-top:12px;">알림은 핀로그 앱에서 설정할 수 있어요.</p>
    </section>

    <section class="card settings-menu" id="ntf-sec" hidden>
      <div class="settings-row settings-row--static">
        <span>아침 플랜 알림</span>
        <span class="ntf-right">
          <input type="time" id="ntf-morning-time" class="ntf-time" value="08:00" />
          <label class="dtswitch"><input type="checkbox" id="ntf-morning" /><i></i></label>
        </span>
      </div>
      <div class="settings-row settings-row--static">
        <span>저녁 기록 알림</span>
        <span class="ntf-right">
          <input type="time" id="ntf-evening-time" class="ntf-time" value="22:00" />
          <label class="dtswitch"><input type="checkbox" id="ntf-evening" /><i></i></label>
        </span>
      </div>
      <div class="settings-row settings-row--static">
        <span>기상 알림</span>
        <span class="ntf-right">
          <input type="time" id="ntf-wake-time" class="ntf-time" value="07:30" />
          <label class="dtswitch"><input type="checkbox" id="ntf-wake" /><i></i></label>
        </span>
      </div>
      <div class="settings-row settings-row--static">
        <span>취침 알림</span>
        <span class="ntf-right">
          <input type="time" id="ntf-sleep-time" class="ntf-time" value="23:30" />
          <label class="dtswitch"><input type="checkbox" id="ntf-sleep" /><i></i></label>
        </span>
      </div>
      <div class="settings-row settings-row--static" id="ntf-tb-row" hidden>
        <span>타임박스 시작 알림</span>
        <span class="ntf-right">
          <label class="dtswitch"><input type="checkbox" id="ntf-timebox" /><i></i></label>
        </span>
      </div>
      <p class="settings-menu__hint" id="ntf-hint">알림은 이 기기에서 울립니다. 일정에 설정한 알림(5분 전 등)은 자동으로 예약돼요.</p>
    </section>

    <section class="card settings-menu" id="ntf-tools" hidden>
      <button type="button" class="settings-row" id="ntf-test">
        테스트 알림 보내기
        <span class="settings-row__chevron" aria-hidden="true">›</span>
      </button>
      <p class="settings-menu__hint" id="ntf-pending">예약된 알림 확인 중...</p>
    </section>
  </main>

  <script src="/js/vendor/supabase.js"></script>
  <script src="/js/supabaseClient.js?v=mock14"></script>
  <script src="/js/utils.js?v=42"></script>
  <script src="/js/notify.js?v=5"></script>
  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      const profile = await getCurrentProfile();
      if (!profile) { window.location.href = "/welcome.html"; return; }

      if (!(window.dtNotify && dtNotify.available)) {
        document.getElementById("ntf-noapp").hidden = false;
        return;
      }
      document.getElementById("ntf-sec").hidden = false;
      document.getElementById("ntf-tools").hidden = false;
      if (profile.user_type !== "general") document.getElementById("ntf-tb-row").hidden = false;

      const el = {
        morning: document.getElementById("ntf-morning"),
        morningTime: document.getElementById("ntf-morning-time"),
        evening: document.getElementById("ntf-evening"),
        eveningTime: document.getElementById("ntf-evening-time"),
        wake: document.getElementById("ntf-wake"),
        wakeTime: document.getElementById("ntf-wake-time"),
        sleep: document.getElementById("ntf-sleep"),
        sleepTime: document.getElementById("ntf-sleep-time"),
        timebox: document.getElementById("ntf-timebox"),
        hint: document.getElementById("ntf-hint"),
        pending: document.getElementById("ntf-pending"),
      };
      const s = dtNotify.getSettings();
      el.morning.checked = s.morning; el.morningTime.value = s.morningTime;
      el.evening.checked = s.evening; el.eveningTime.value = s.eveningTime;
      el.wake.checked = s.wake; el.wakeTime.value = s.wakeTime;
      el.sleep.checked = s.sleep; el.sleepTime.value = s.sleepTime;
      el.timebox.checked = s.timebox;

      const paintPending = async () => {
        const n = await dtNotify.pendingCount();
        el.pending.textContent = n < 0
          ? "예약 상태를 확인하지 못했어요."
          : `현재 이 기기에 예약된 알림 ${n}개`;
      };
      paintPending();

      let applyTimer;
      const apply = () => {
        dtNotify.saveSettings({
          morning: el.morning.checked, morningTime: el.morningTime.value || "08:00",
          evening: el.evening.checked, eveningTime: el.eveningTime.value || "22:00",
          wake: el.wake.checked, wakeTime: el.wakeTime.value || "07:30",
          sleep: el.sleep.checked, sleepTime: el.sleepTime.value || "23:30",
          timebox: el.timebox.checked,
        });
        clearTimeout(applyTimer);
        applyTimer = setTimeout(async () => {
          const ok = await dtNotify.resync(profile);
          el.hint.textContent = ok
            ? "알림은 이 기기에서 울립니다. 일정에 설정한 알림(5분 전 등)은 자동으로 예약돼요."
            : "알림 권한이 꺼져 있어요. 설정 앱 > 핀로그에서 알림을 허용해주세요.";
          paintPending();
        }, 250);
      };
      [el.morning, el.evening, el.wake, el.sleep, el.timebox].forEach((c) => c.addEventListener("change", apply));
      [el.morningTime, el.eveningTime, el.wakeTime, el.sleepTime].forEach((t) => t.addEventListener("change", apply));

      document.getElementById("ntf-test").addEventListener("click", async () => {
        const ok = await dtNotify.test();
        if (ok) showToast("5초 뒤 알림이 도착해요");
        else el.hint.textContent = "알림 권한이 꺼져 있어요. 설정 앱 > 핀로그에서 알림을 허용해주세요.";
      });
    });
  </script>
</body>
</html>
