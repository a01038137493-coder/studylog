<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
  <title>캘린더 · 디턴로그</title>
  <link rel="stylesheet" href="/css/style.css?v=110" />
  <script src="/js/vendor/supabase.js"></script>
</head>
<body class="app-bg has-tabbar fcal-page">
  <main class="fcal">
    <!-- 월 헤더: 제목만 (달 이동은 좌우 스와이프) -->
    <div class="fcal__head">
      <h1 class="fcal__title" id="fcal-title">—</h1>
    </div>

    <!-- 요일 (월요일 시작, 고정) -->
    <div class="fcal__dows">
      <span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span class="is-sat">토</span><span class="is-sun">일</span>
    </div>

    <!-- 날짜 그리드 (화면 채움) -->
    <div class="fcal__grid" id="fcal-grid"></div>

    <!-- 선택한 날 일정 -->
    <div class="fcal__events" id="fcal-events"></div>
  </main>

  <!-- 새 일정 등록 시트 (날짜 길게 누르면 열림) -->
  <div class="evsheet" id="evsheet" hidden>
    <div class="evsheet__backdrop" data-ev-close></div>
    <div class="evsheet__panel">
      <div class="evsheet__head">
        <button type="button" class="evsheet__cancel" data-ev-close>취소</button>
        <span class="evsheet__title">새 일정</span>
        <button type="button" class="evsheet__save" id="ev-save">저장</button>
      </div>

      <input type="text" id="ev-title" class="field__input evsheet__field" placeholder="제목" maxlength="80" />

      <label class="evsheet__row">
        <span>하루 종일</span>
        <input type="checkbox" id="ev-allday" class="evsheet__toggle" />
      </label>

      <div class="evsheet__row evsheet__row--col">
        <span>시작</span>
        <div class="evsheet__dt">
          <input type="date" id="ev-start-date" class="field__input" />
          <input type="time" id="ev-start-time" class="field__input" />
        </div>
      </div>

      <div class="evsheet__row evsheet__row--col">
        <span>종료</span>
        <div class="evsheet__dt">
          <input type="date" id="ev-end-date" class="field__input" />
          <input type="time" id="ev-end-time" class="field__input" />
        </div>
      </div>

      <label class="evsheet__row">
        <span>반복</span>
        <select id="ev-repeat" class="field__input evsheet__select">
          <option value="">안 함</option>
          <option value="daily">매일</option>
          <option value="weekly">매주</option>
          <option value="monthly">매월</option>
          <option value="yearly">매년</option>
        </select>
      </label>

      <label class="evsheet__row">
        <span>알림</span>
        <select id="ev-alert" class="field__input evsheet__select">
          <option value="">없음</option>
          <option value="0">일정 시작 시간</option>
          <option value="-5" selected>5분 전</option>
          <option value="-10">10분 전</option>
          <option value="-15">15분 전</option>
          <option value="-30">30분 전</option>
          <option value="-60">1시간 전</option>
          <option value="-120">2시간 전</option>
          <option value="-1440">1일 전</option>
          <option value="-2880">2일 전</option>
          <option value="-10080">7일 전</option>
        </select>
      </label>

      <p class="evsheet__error" id="ev-error" role="alert"></p>

      <button type="button" class="evsheet__delete" id="ev-delete" hidden>일정 삭제</button>
    </div>
  </div>

  <nav class="tabbar">
    <a href="/student.html" class="tabbar__item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V21h14V9.5"/></svg>
      <span>홈</span>
    </a>
    <a href="/calendar.html" class="tabbar__item is-active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M8 3v4M16 3v4M3 10h18"/></svg>
      <span>캘린더</span>
    </a>
    <a href="/memo.html" class="tabbar__item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 3h9l5 5v13a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1z"/><path d="M14 3v6h5M8 13h8M8 17h5"/></svg>
      <span>메모</span>
    </a>
    <a href="/files.html" class="tabbar__item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>

      <span>설정</span>
    </a>
  </nav>

  <script src="/js/supabaseClient.js?v=mock10"></script>
  <script src="/js/utils.js?v=18"></script>
  <script src="/js/scheduleParse.js?v=1"></script>
  <script>
    /* 풀스크린 월간 캘린더 (월요일 시작)
     * - 공부 기록(체크아웃)한 날: 초록 점 / Apple 캘린더 일정: 주황 점
     * - 날짜 탭: 선택 → 아래에 일정 목록 / 날짜 길게(0.5초): 새 일정 등록
     * - 좌우 스와이프: 이전·다음 달 (요일 헤더는 고정)
     */
    document.addEventListener("DOMContentLoaded", async () => {
      const profile = await getCurrentProfile();
      if (!profile) { window.location.href = "/welcome.html"; return; }

      const pad = (n) => String(n).padStart(2, "0");
      const esc = (s) => String(s ?? "").replace(/[&<>"']/g, (c) =>
        ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
      const dstr = (y, m, d) => `${y}-${pad(m + 1)}-${pad(d)}`;

      const now = new Date();
      let viewY = now.getFullYear();
      let viewM = now.getMonth();                 // 0-based
      let selected = dstr(viewY, viewM, now.getDate());

      const recorded = new Set();                  // 체크아웃한 날
      const events = new Map();                    // 날짜 → Apple 캘린더 일정 배열

      /* Apple 캘린더 (네이티브 앱에서만) */
      const calPlugin = window.Capacitor && window.Capacitor.Plugins
        ? window.Capacitor.Plugins.CapacitorCalendar : null;
      let calGranted = false;

      async function ensureCalendarAccess() {
        if (!calPlugin || calGranted) return calGranted;
        try {
          const { result } = await calPlugin.requestFullCalendarAccess();
          calGranted = result === "granted";
        } catch (e) { calGranted = false; }
        return calGranted;
      }

      async function loadMonth() {
        const daysInMonth = new Date(viewY, viewM + 1, 0).getDate();
        recorded.clear();
        events.clear();

        try {
          const { data } = await supabaseClient
            .from("daily_checkouts")
            .select("date")
            .eq("student_id", profile.id)
            .gte("date", dstr(viewY, viewM, 1))
            .lte("date", dstr(viewY, viewM, daysInMonth));
          (data || []).forEach((r) => recorded.add(r.date));
        } catch (e) {}

        if (await ensureCalendarAccess()) {
          try {
            const from = new Date(viewY, viewM, 1).getTime();
            const to = new Date(viewY, viewM, daysInMonth, 23, 59, 59).getTime();
            const { result } = await calPlugin.listEventsInRange({ from, to });
            (result || []).forEach((ev) => {
              const d = new Date(ev.startDate);
              const key = dstr(d.getFullYear(), d.getMonth(), d.getDate());
              if (!events.has(key)) events.set(key, []);
              events.get(key).push(ev);
            });
            events.forEach((list) => list.sort((a, b) => a.startDate - b.startDate));
          } catch (e) {}
        }
      }

      async function gotoMonth(delta) {
        viewM += delta;
        if (viewM < 0) { viewM = 11; viewY--; }
        if (viewM > 11) { viewM = 0; viewY++; }
        renderGrid();
        await loadMonth();
        renderGrid();
        renderEvents();
      }

      /* 길게 누르면 새 일정 시트 (탭과 구분: 이동·해제 시 취소) */
      let pressTimer = null;
      let longPressed = false;
      function wireLongPress(cell) {
        cell.addEventListener("pointerdown", (e) => {
          longPressed = false;
          const sx = e.clientX, sy = e.clientY;
          pressTimer = setTimeout(() => {
            longPressed = true;
            openSheet(cell.dataset.date);
          }, 500);
          const cancel = () => { clearTimeout(pressTimer); pressTimer = null; };
          const onMove = (ev2) => {
            if (Math.abs(ev2.clientX - sx) > 10 || Math.abs(ev2.clientY - sy) > 10) cancel();
          };
          cell.addEventListener("pointermove", onMove, { once: false });
          cell.addEventListener("pointerup", cancel, { once: true });
          cell.addEventListener("pointerleave", cancel, { once: true });
        });
        cell.addEventListener("contextmenu", (e) => e.preventDefault());
      }

      function renderGrid() {
        document.getElementById("fcal-title").textContent = `${viewY}년 ${viewM + 1}월`;
        // 월요일 시작: 일(0)→6, 월(1)→0 …
        const firstDow = (new Date(viewY, viewM, 1).getDay() + 6) % 7;
        const daysInMonth = new Date(viewY, viewM + 1, 0).getDate();
        const todayStr = dstr(now.getFullYear(), now.getMonth(), now.getDate());

        let html = "";
        for (let i = 0; i < firstDow; i++) html += `<div class="fcal__cell fcal__cell--empty"></div>`;
        for (let d = 1; d <= daysInMonth; d++) {
          const key = dstr(viewY, viewM, d);
          const cls = [
            "fcal__cell",
            key === todayStr ? "is-today" : "",
            key === selected ? "is-selected" : "",
          ].join(" ");
          const dots =
            (recorded.has(key) ? `<i class="fcal__dot fcal__dot--rec"></i>` : "") +
            (events.has(key) ? `<i class="fcal__dot fcal__dot--ev"></i>` : "");
          html += `<button type="button" class="${cls}" data-date="${key}">
            <span class="fcal__num">${d}</span>
            <span class="fcal__dots">${dots}</span>
          </button>`;
        }
        const grid = document.getElementById("fcal-grid");
        grid.innerHTML = html;
        grid.querySelectorAll("[data-date]").forEach((cell) => {
          cell.addEventListener("click", () => {
            if (longPressed) { longPressed = false; return; }
            selected = cell.dataset.date;
            renderGrid();
            renderEvents();
          });
          wireLongPress(cell);
        });
      }

      function renderEvents() {
        const box = document.getElementById("fcal-events");
        const list = events.get(selected) || [];
        const hasRec = recorded.has(selected);
        const [y, m, d] = selected.split("-").map(Number);

        let html = `<p class="fcal__events-title">${m}월 ${d}일</p>`;
        if (hasRec) html += `<div class="fcal-ev fcal-ev--rec"><span class="fcal-ev__time">공부</span><span class="fcal-ev__title">체크아웃 기록 완료 ✓</span></div>`;
        if (list.length) {
          html += list.map((ev, idx) => {
            const t = new Date(ev.startDate);
            const time = ev.isAllDay ? "종일" : fmtTime12(t);
            return `<button type="button" class="fcal-ev fcal-ev--tap" data-ev="${idx}">
              <span class="fcal-ev__time">${time}</span>
              <span class="fcal-ev__title">${esc(ev.title || "(제목 없음)")}</span>
              <span class="fcal-ev__chevron" aria-hidden="true">›</span>
            </button>`;
          }).join("");
        } else if (!hasRec) {
          html += `<p class="fcal__events-empty">${calPlugin ? "일정이 없습니다 · 날짜를 길게 누르면 일정을 등록할 수 있어요" : "Apple 캘린더 일정은 앱에서 표시됩니다"}</p>`;
        }
        box.innerHTML = html;

        // 일정 탭 → 수정/삭제 시트
        box.querySelectorAll("[data-ev]").forEach((row) => {
          row.addEventListener("click", () => {
            const ev = (events.get(selected) || [])[Number(row.dataset.ev)];
            if (ev) openEditSheet(ev);
          });
        });
      }

      /* ---------- 새 일정 / 수정 시트 ---------- */
      const sheet = document.getElementById("evsheet");
      const evErr = document.getElementById("ev-error");
      let editingId = null;   // null = 새 일정, 값 있으면 해당 일정 수정

      function fillSheet({ title, allday, sd, st, ed, et, repeat, alert5 }) {
        evErr.textContent = "";
        document.getElementById("ev-title").value = title;
        document.getElementById("ev-allday").checked = allday;
        document.getElementById("ev-start-date").value = sd;
        document.getElementById("ev-start-time").value = st;
        document.getElementById("ev-end-date").value = ed;
        document.getElementById("ev-end-time").value = et;
        document.getElementById("ev-repeat").value = repeat;
        document.getElementById("ev-alert").value = alert5;
        syncAllday();
        sheet.hidden = false;
      }

      function openSheet(dateKey) {
        if (!calPlugin) { alert("일정 등록은 앱에서 사용할 수 있어요."); return; }
        editingId = null;
        document.querySelector(".evsheet__title").textContent = "새 일정";
        document.getElementById("ev-delete").hidden = true;
        fillSheet({ title: "", allday: false, sd: dateKey, st: "09:00", ed: dateKey, et: "10:00", repeat: "", alert5: "-5" });
        setTimeout(() => document.getElementById("ev-title").focus(), 50);
      }

      function openEditSheet(ev) {
        editingId = ev.id;
        document.querySelector(".evsheet__title").textContent = "일정 수정";
        document.getElementById("ev-delete").hidden = false;
        const s = new Date(ev.startDate);
        const e = new Date(ev.endDate || ev.startDate);
        // 알림: 기존 값이 선택지에 있으면 채우고, 없으면 '없음'
        const known = ["0", "-5", "-10", "-15", "-30", "-60", "-120", "-1440", "-2880", "-10080"];
        const a = Array.isArray(ev.alerts) && ev.alerts.length ? String(ev.alerts[0]) : "";
        fillSheet({
          title: ev.title || "",
          allday: !!ev.isAllDay,
          sd: dstr(s.getFullYear(), s.getMonth(), s.getDate()),
          st: `${pad(s.getHours())}:${pad(s.getMinutes())}`,
          ed: dstr(e.getFullYear(), e.getMonth(), e.getDate()),
          et: `${pad(e.getHours())}:${pad(e.getMinutes())}`,
          repeat: "",                       // 반복은 조회가 안 돼 기본값 — 바꾸면 새 반복으로 덮어씀
          alert5: known.includes(a) ? a : "",
        });
      }

      function closeSheet() { sheet.hidden = true; editingId = null; }

      function syncAllday() {
        const allday = document.getElementById("ev-allday").checked;
        document.getElementById("ev-start-time").style.display = allday ? "none" : "";
        document.getElementById("ev-end-time").style.display = allday ? "none" : "";
      }
      document.getElementById("ev-allday").addEventListener("change", syncAllday);
      sheet.querySelectorAll("[data-ev-close]").forEach((el) => el.addEventListener("click", closeSheet));

      document.getElementById("ev-save").addEventListener("click", async () => {
        const title = document.getElementById("ev-title").value.trim();
        if (!title) { evErr.textContent = "제목을 입력해주세요."; return; }

        const allday = document.getElementById("ev-allday").checked;
        const sd = document.getElementById("ev-start-date").value;
        const ed = document.getElementById("ev-end-date").value || sd;
        const st = allday ? "00:00" : (document.getElementById("ev-start-time").value || "09:00");
        const et = allday ? "23:59" : (document.getElementById("ev-end-time").value || "10:00");
        const startDate = new Date(`${sd}T${st}:00`).getTime();
        const endDate = new Date(`${ed}T${et}:00`).getTime();
        if (!(endDate >= startDate)) { evErr.textContent = "종료가 시작보다 빠릅니다."; return; }

        const opts = { title, startDate, endDate, isAllDay: allday };
        const rep = document.getElementById("ev-repeat").value;
        if (rep) opts.recurrence = { frequency: rep };
        const alert5 = document.getElementById("ev-alert").value;
        if (alert5 !== "") opts.alerts = [Number(alert5)];

        const btn = document.getElementById("ev-save");
        btn.disabled = true;
        try {
          if (!(await ensureCalendarAccess())) throw new Error("permission");
          if (editingId) await calPlugin.modifyEvent({ id: editingId, ...opts });
          else await calPlugin.createEvent(opts);
          closeSheet();
          selected = sd;
          await loadMonth();
          renderGrid();
          renderEvents();
        } catch (e) {
          evErr.textContent = editingId
            ? "이 일정은 수정할 수 없어요. (공휴일 등 구독 캘린더 일정)"
            : "일정을 저장하지 못했습니다. 캘린더 접근 권한을 확인해주세요.";
        } finally {
          btn.disabled = false;
        }
      });

      /* 일정 삭제 */
      document.getElementById("ev-delete").addEventListener("click", async () => {
        if (!editingId) return;
        if (!confirm("이 일정을 삭제할까요?")) return;
        try {
          await calPlugin.deleteEventsById({ ids: [editingId] });
          closeSheet();
          await loadMonth();
          renderGrid();
          renderEvents();
        } catch (e) {
          evErr.textContent = "이 일정은 삭제할 수 없어요. (공휴일 등 구독 캘린더 일정)";
        }
      });

      /* ---------- 좌우 스와이프로 달 이동 (요일 헤더·그리드 영역) ---------- */
      (function wireSwipe() {
        const area = document.getElementById("fcal-grid");
        let tx = null, ty = null;
        area.addEventListener("touchstart", (e) => {
          tx = e.touches[0].clientX; ty = e.touches[0].clientY;
        }, { passive: true });
        area.addEventListener("touchend", (e) => {
          if (tx === null) return;
          const dx = e.changedTouches[0].clientX - tx;
          const dy = e.changedTouches[0].clientY - ty;
          tx = ty = null;
          if (Math.abs(dx) > 55 && Math.abs(dx) > Math.abs(dy) * 1.4) {
            gotoMonth(dx < 0 ? 1 : -1);
          }
        }, { passive: true });
      })();

      /* base64 스크린샷 → OCR → 파싱 → 시트 자동 채움 (📷 버튼·공유 시트 공용) */
      async function processScreenshotBase64(base64) {
        const titleEl = document.getElementById("fcal-title");
        const prevTitle = titleEl.textContent;
        try {
          titleEl.textContent = "대화를 읽는 중…";
          const { text } = await window.Capacitor.Plugins.VisionOCR.recognize({ base64 });
          titleEl.textContent = prevTitle;

          const { candidate, cancelled } = ScheduleParse.parse(text, new Date());
          if (!candidate) {
            alert(cancelled
              ? "취소된 일정만 발견했어요.\n새로 등록할 일정이 없습니다."
              : "등록할 일정을 찾지 못했습니다.\n\n날짜와 시간이 포함된 대화가 화면에\n보이도록 다시 캡처해주세요.");
            return;
          }
          openSheetFromCandidate(candidate);
        } catch (e) {
          titleEl.textContent = prevTitle;
          alert("이미지를 처리하지 못했습니다.\n다른 스크린샷으로 다시 시도해주세요.");
        }
      }

      /* 공유 시트로 들어온 스크린샷 자동 처리 */
      window.__dtHandleSharedShot = () => {
        const b64 = sessionStorage.getItem("dt_shared_shot");
        if (!b64) return;
        sessionStorage.removeItem("dt_shared_shot");
        processScreenshotBase64(b64);
      };
      window.__dtHandleSharedShot();

      /* 인식 결과로 새 일정 시트를 미리 채워서 연다 (등록 전 확인은 사용자가) */
      function openSheetFromCandidate(c) {
        const d = c.start;
        openSheet(dstr(d.getFullYear(), d.getMonth(), d.getDate()));
        document.getElementById("ev-title").value = c.title || "";
        if (c.hasTime) {
          document.getElementById("ev-start-time").value = `${pad(d.getHours())}:${pad(d.getMinutes())}`;
          const end = new Date(d.getTime() + 3600000);
          document.getElementById("ev-end-date").value = dstr(end.getFullYear(), end.getMonth(), end.getDate());
          document.getElementById("ev-end-time").value = `${pad(end.getHours())}:${pad(end.getMinutes())}`;
        }
        const info = [];
        if (c.source) info.push(`“${c.source}”`);
        if (c.ambiguities.length) info.push("⚠ " + c.ambiguities.join(" · "));
        evErr.textContent = info.join("  ");
      }

      renderGrid();          // 데이터 로드 전 골격 먼저
      renderEvents();
      await loadMonth();
      renderGrid();
      renderEvents();
    });
  </script>
</body>
</html>
