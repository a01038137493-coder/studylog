  <script src="/js/supabaseClient.js?v=mock9"></script>
  <script src="/js/utils.js?v=14"></script>
  <script>
    /* 이번 달 달력 + 체크아웃 기록 있는 날 표시 */
    document.addEventListener("DOMContentLoaded", async () => {
      const now = new Date();
      const year = now.getFullYear();
      const month = now.getMonth(); // 0-based
      const today = now.getDate();
      const firstDow = new Date(year, month, 1).getDay();
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const dows = ["일", "월", "화", "수", "목", "금", "토"];
      const pad = (n) => String(n).padStart(2, "0");

      // 이번 달 체크아웃 기록 날짜 수집 (로그인 상태에서만)
      const recorded = new Set();
      try {
        const profile = await getCurrentProfile();
        if (!profile) { window.location.href = "/welcome.html"; return; }
        const start = `${year}-${pad(month + 1)}-01`;
        const end = `${year}-${pad(month + 1)}-${pad(daysInMonth)}`;
        const { data } = await supabaseClient
          .from("daily_checkouts")
          .select("date")
          .eq("student_id", profile.id)
          .gte("date", start)
          .lte("date", end);
        (data || []).forEach((r) => recorded.add(r.date));
      } catch (e) {}

      let cells = dows.map((d) => `<div class="calendar__dow">${d}</div>`).join("");
      for (let i = 0; i < firstDow; i++) cells += `<div class="calendar__cell"></div>`;
      for (let d = 1; d <= daysInMonth; d++) {
        const isToday = d === today;
        const hasRec = recorded.has(`${year}-${pad(month + 1)}-${pad(d)}`);
        cells += `<div class="calendar__cell${isToday ? " calendar__cell--today" : ""}${hasRec ? " calendar__cell--rec" : ""}">${d}</div>`;
      }
      document.getElementById("calendar").innerHTML = `
        <div class="calendar__title">${year}년 ${month + 1}월</div>
        <div class="calendar__grid">${cells}</div>`;
    });
  </script>
