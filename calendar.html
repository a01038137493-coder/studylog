<body class="app-bg has-tabbar fcal-page" data-kbresize="none">
  <main class="fcal">
    <!-- 월 헤더: 제목만 (달 이동은 좌우 스와이프) -->
    <div class="fcal__head">
      <h1 class="fcal__title" id="fcal-title">—</h1>
      <div class="fcal__nav">
        <button type="button" class="fcal__navbtn" id="fcal-prev-btn" aria-label="이전 달"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 5l-7 7 7 7"/></svg></button>
        <button type="button" class="fcal__navbtn fcal__navbtn--today" id="fcal-today-btn">오늘</button>
        <button type="button" class="fcal__navbtn" id="fcal-next-btn" aria-label="다음 달"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 5l7 7-7 7"/></svg></button>
      </div>
    </div>

    <!-- 요일 (월요일 시작, 고정) -->
    <div class="fcal__dows">
      <span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span class="is-sat">토</span><span class="is-sun">일</span>
    </div>

    <!-- 날짜 그리드: 이전·현재·다음 달 3패널 캐러셀 (드래그 시 이웃 달이 보임) -->
    <div class="fcal__carousel">
      <div class="fcal__track" id="fcal-track">
        <div class="fcal__grid fcal__grid--side" id="fcal-prev"></div>
        <div class="fcal__grid" id="fcal-grid"></div>
        <div class="fcal__grid fcal__grid--side" id="fcal-next"></div>
      </div>
    </div>

    <!-- 선택한 날 일정 -->
    <div class="fcal__events" id="fcal-events"></div>
  </main>

  <!-- 새 일정 등록 시트 (날짜 길게 누르면 열림) -->
  <div class="evsheet" id="evsheet" hidden>
    <div class="evsheet__backdrop" data-ev-close></div>
    <div class="evsheet__panel">
      <div class="evsheet__head">
        <button type="button" class="evsheet__cancel" data-ev-close>취소</button>
        <span class="evsheet__title">새 일정</span>
        <button type="button" class="evsheet__save" id="ev-save">저장</button>
      </div>

      <input type="text" id="ev-title" class="field__input evsheet__field" placeholder="제목" maxlength="80" />

      <label class="evsheet__row">
        <span>하루 종일</span>
        <input type="checkbox" id="ev-allday" class="evsheet__toggle" />
      </label>

      <div class="evsheet__row evsheet__row--col">
        <span>시작</span>
        <div class="evsheet__dt">
          <input type="date" id="ev-start-date" class="field__input" />
          <input type="time" id="ev-start-time" class="field__input" />
        </div>
      </div>

      <label class="evsheet__row">
        <span>반복</span>
        <select id="ev-repeat" class="field__input evsheet__select">
          <option value="">안 함</option>
          <option value="daily">매일</option>
          <option value="weekly">매주</option>
          <option value="monthly">매월</option>
          <option value="yearly">매년</option>
        </select>
      </label>

      <label class="evsheet__row">
        <span>알림</span>
        <select id="ev-alert" class="field__input evsheet__select">
          <option value="">없음</option>
          <option value="0">일정 시작 시간</option>
          <option value="-5" selected>5분 전</option>
          <option value="-10">10분 전</option>
          <option value="-15">15분 전</option>
          <option value="-30">30분 전</option>
          <option value="-60">1시간 전</option>
          <option value="-120">2시간 전</option>
          <option value="-1440">1일 전</option>
          <option value="-2880">2일 전</option>
          <option value="-10080">7일 전</option>
        </select>
      </label>

      <p class="evsheet__error" id="ev-error" role="alert"></p>

      <button type="button" class="evsheet__delete" id="ev-delete" hidden>일정 삭제</button>
    </div>
  </div>

  <button type="button" class="fab" id="fcal-add" aria-label="새 일정 추가">＋</button>

  <script src="/js/vendor/supabase.js"></script>
  <script src="/js/supabaseClient.js?v=mock13"></script>
  <script src="/js/utils.js?v=39"></script>
  <script src="/js/notify.js?v=4"></script>
  <script src="/js/scheduleParse.js?v=4"></script>
  <script>
    /* 풀스크린 월간 캘린더 (월요일 시작)
     * - 공부 기록(체크아웃)한 날: 초록 점 / Apple 캘린더 일정: 주황 점
     * - 날짜 탭: 선택 → 아래에 일정 목록 / 날짜 길게(0.5초): 새 일정 등록
     * - 좌우 스와이프: 이전·다음 달 (요일 헤더는 고정)
     */
    document.addEventListener("DOMContentLoaded", async () => {
      const profile = await getCurrentProfile();
      if (!profile) { window.location.href = "/welcome.html"; return; }

      const pad = (n) => String(n).padStart(2, "0");
      const esc = (s) => String(s ?? "").replace(/[&<>"']/g, (c) =>
        ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
      const dstr = (y, m, d) => `${y}-${pad(m + 1)}-${pad(d)}`;

      const now = new Date();
      let viewY = now.getFullYear();
      let viewM = now.getMonth();                 // 0-based
      let selected = dstr(viewY, viewM, now.getDate());

      const recorded = new Set();                  // 체크아웃한 날
      const events = new Map();                    // 날짜 → 일정 배열 (핀로그 DB + Apple 캘린더 병합)

      /* Apple 캘린더 (네이티브 앱에서만) */
      const calPlugin = window.Capacitor && window.Capacitor.Plugins
        ? window.Capacitor.Plugins.CapacitorCalendar : null;
      let calGranted = false;

      async function ensureCalendarAccess() {
        if (!calPlugin || calGranted) return calGranted;
        try {
          const { result } = await calPlugin.requestFullCalendarAccess();
          calGranted = result === "granted";
        } catch (e) { calGranted = false; }
        return calGranted;
      }

      async function loadMonth() {
        const daysInMonth = new Date(viewY, viewM + 1, 0).getDate();
        recorded.clear();
        events.clear();

        // 공부 기록(체크아웃) 점은 수험생 전용 — 일반 사용자는 일정만
        if (!isGeneral(profile)) {
          try {
            const { data } = await supabaseClient
              .from("daily_checkouts")
              .select("date")
              .eq("student_id", profile.id)
              .gte("date", dstr(viewY, viewM, 1))
              .lte("date", dstr(viewY, viewM, daysInMonth));
            (data || []).forEach((r) => recorded.add(r.date));
          } catch (e) {}
        }

        const from = new Date(viewY, viewM, 1).getTime();
        const to = new Date(viewY, viewM, daysInMonth, 23, 59, 59).getTime();
        const put = (ev) => {
          const d = new Date(ev.startDate);
          const key = dstr(d.getFullYear(), d.getMonth(), d.getDate());
          if (!events.has(key)) events.set(key, []);
          events.get(key).push(ev);
        };

        // 핀로그 일정 (계정 동기화 — 모든 기기 공통)
        const pins = await dtPinEventsInRange(profile.id, from, to);
        pins.forEach(put);

        // Apple 캘린더 일정 (기기 로컬, 읽기·기존 일정용) — 이관된 일정과 중복 표시 방지
        if (await ensureCalendarAccess()) {
          try {
            const dup = new Set(pins.map((p) => (p.title || "") + "|" + Math.round(p.startDate / 60000)));
            const { result } = await calPlugin.listEventsInRange({ from, to });
            (result || []).forEach((ev) => {
              if (dup.has((ev.title || "") + "|" + Math.round(ev.startDate / 60000))) return;
              ev.src = "apple";
              put(ev);
            });
          } catch (e) {}
        }
        events.forEach((list) => list.sort((a, b) => a.startDate - b.startDate));
      }

      let monthBusy = false;
      async function gotoMonth(delta) {
        if (monthBusy) return;              // 연타로 요청이 겹치면 달이 어긋남
        monthBusy = true;
        viewM += delta;
        if (viewM < 0) { viewM = 11; viewY--; }
        if (viewM > 11) { viewM = 0; viewY++; }
        // 선택 날짜를 보이는 달로 이동 (이번 달이면 오늘, 아니면 1일)
        selected = (viewY === now.getFullYear() && viewM === now.getMonth())
          ? dstr(viewY, viewM, now.getDate())
          : dstr(viewY, viewM, 1);
        renderGrid();
        await loadMonth();
        renderGrid();
        renderEvents();
        monthBusy = false;
      }

      /* 길게 누르면 새 일정 시트 (탭과 구분: 이동·해제 시 취소) */
      let pressTimer = null;
      let longPressed = false;
      function wireLongPress(cell) {
        cell.addEventListener("pointerdown", (e) => {
          longPressed = false;
          const sx = e.clientX, sy = e.clientY;
          pressTimer = setTimeout(() => {
            longPressed = true;
            openSheet(cell.dataset.date);
          }, 500);
          const cancel = () => { clearTimeout(pressTimer); pressTimer = null; };
          const onMove = (ev2) => {
            if (Math.abs(ev2.clientX - sx) > 10 || Math.abs(ev2.clientY - sy) > 10) cancel();
          };
          cell.addEventListener("pointermove", onMove, { once: false });
          cell.addEventListener("pointerup", cancel, { once: true });
          cell.addEventListener("pointerleave", cancel, { once: true });
        });
        cell.addEventListener("contextmenu", (e) => e.preventDefault());
      }

      // 월요일 시작: 일(0)→6, 월(1)→0 …
      function gridHTML(y, m) {
        const firstDow = (new Date(y, m, 1).getDay() + 6) % 7;
        const daysInMonth = new Date(y, m + 1, 0).getDate();
        const todayStr = dstr(now.getFullYear(), now.getMonth(), now.getDate());
        const isCur = y === viewY && m === viewM;   // 데이터(점)는 현재 달만 로드돼 있음
        let html = "";
        for (let i = 0; i < firstDow; i++) html += `<div class="fcal__cell fcal__cell--empty"></div>`;
        for (let d = 1; d <= daysInMonth; d++) {
          const key = dstr(y, m, d);
          const cls = [
            "fcal__cell",
            key === todayStr ? "is-today" : "",
            isCur && key === selected ? "is-selected" : "",
          ].join(" ");
          const dots = isCur
            ? (recorded.has(key) ? `<i class="fcal__dot fcal__dot--rec"></i>` : "") +
              (events.has(key) ? `<i class="fcal__dot fcal__dot--ev"></i>` : "")
            : "";
          html += `<button type="button" class="${cls}" data-date="${key}">
            <span class="fcal__num">${d}</span>
            <span class="fcal__dots">${dots}</span>
          </button>`;
        }
        return html;
      }

      function renderGrid() {
        document.getElementById("fcal-title").textContent = `${viewY}년 ${viewM + 1}월`;
        const grid = document.getElementById("fcal-grid");
        grid.innerHTML = gridHTML(viewY, viewM);
        const pm = viewM === 0 ? [viewY - 1, 11] : [viewY, viewM - 1];
        const nm = viewM === 11 ? [viewY + 1, 0] : [viewY, viewM + 1];
        document.getElementById("fcal-prev").innerHTML = gridHTML(pm[0], pm[1]);
        document.getElementById("fcal-next").innerHTML = gridHTML(nm[0], nm[1]);
        grid.querySelectorAll("[data-date]").forEach((cell) => {
          cell.addEventListener("click", () => {
            if (longPressed) { longPressed = false; return; }
            selected = cell.dataset.date;
            renderGrid();
            renderEvents();
          });
          wireLongPress(cell);
        });
      }

      function renderEvents() {
        const box = document.getElementById("fcal-events");
        const list = events.get(selected) || [];
        const hasRec = recorded.has(selected);
        const [y, m, d] = selected.split("-").map(Number);

        let html = `<p class="fcal__events-title">${m}월 ${d}일</p>`;
        if (hasRec) html += `<div class="fcal-ev fcal-ev--rec"><span class="fcal-ev__time">공부</span><span class="fcal-ev__title">체크아웃 기록 완료 ✓</span></div>`;
        if (list.length) {
          html += list.map((ev, idx) => {
            const t = new Date(ev.startDate);
            const time = ev.isAllDay ? "종일" : fmtTime12(t);
            return `<button type="button" class="fcal-ev fcal-ev--tap" data-ev="${idx}">
              <span class="fcal-ev__time">${time}</span>
              <span class="fcal-ev__title">${esc(ev.title || "(제목 없음)")}</span>
              <span class="fcal-ev__chevron" aria-hidden="true">›</span>
            </button>`;
          }).join("");
        } else if (!hasRec) {
          html += `<p class="fcal__events-empty">일정이 없습니다 · 날짜를 길게 누르면 일정을 등록할 수 있어요</p>`;
        }
        box.innerHTML = html;

        // 일정 탭 → 수정/삭제 시트
        box.querySelectorAll("[data-ev]").forEach((row) => {
          row.addEventListener("click", () => {
            const ev = (events.get(selected) || [])[Number(row.dataset.ev)];
            if (ev) openEditSheet(ev);
          });
        });
      }

      /* ---------- 새 일정 / 수정 시트 ---------- */
      const sheet = document.getElementById("evsheet");
      const evErr = document.getElementById("ev-error");
      let editingId = null;   // null = 새 일정, 값 있으면 해당 일정 수정
      let editingSrc = null;  // "pin"(핀로그 DB) | "apple"(기기 캘린더)
      let durationMs = 3600000;  // 종료는 입력받지 않고 시작 + 지속시간으로 자동 계산 (기본 1시간)

      function fillSheet({ title, allday, sd, st, repeat, alert5 }) {
        evErr.textContent = "";
        document.getElementById("ev-title").value = title;
        document.getElementById("ev-allday").checked = allday;
        document.getElementById("ev-start-date").value = sd;
        document.getElementById("ev-start-time").value = st;
        document.getElementById("ev-repeat").value = repeat;
        document.getElementById("ev-alert").value = alert5;
        syncAllday();
        sheet.hidden = false;
      }

      function openSheet(dateKey) {
        editingId = null;
        editingSrc = null;
        durationMs = 3600000;
        document.querySelector(".evsheet__title").textContent = "새 일정";
        document.getElementById("ev-delete").hidden = true;
        fillSheet({ title: "", allday: false, sd: dateKey, st: "09:00", repeat: "", alert5: "-5" });
        setTimeout(() => document.getElementById("ev-title").focus({ preventScroll: true }), 50);
      }

      function openEditSheet(ev) {
        editingId = ev.id;
        editingSrc = ev.src === "pin" ? "pin" : "apple";
        document.querySelector(".evsheet__title").textContent = "일정 수정";
        document.getElementById("ev-delete").hidden = false;
        const s = new Date(ev.startDate);
        const e = new Date(ev.endDate || ev.startDate);
        durationMs = Math.max(0, e.getTime() - s.getTime()) || 3600000;  // 수정 시 원래 길이 유지
        // 알림: 기존 값이 선택지에 있으면 채우고, 없으면 '없음'
        const known = ["0", "-5", "-10", "-15", "-30", "-60", "-120", "-1440", "-2880", "-10080"];
        const a = editingSrc === "pin"
          ? (ev.alertMin == null ? "" : String(ev.alertMin))
          : (Array.isArray(ev.alerts) && ev.alerts.length ? String(ev.alerts[0]) : "");
        fillSheet({
          title: ev.title || "",
          allday: !!ev.isAllDay,
          sd: dstr(s.getFullYear(), s.getMonth(), s.getDate()),
          st: `${pad(s.getHours())}:${pad(s.getMinutes())}`,
          repeat: editingSrc === "pin" ? (ev.repeat || "") : "",   // 기기 캘린더는 반복 조회 불가
          alert5: known.includes(a) ? a : "",
        });
      }

      function closeSheet() { sheet.hidden = true; editingId = null; }

      function syncAllday() {
        const allday = document.getElementById("ev-allday").checked;
        document.getElementById("ev-start-time").style.display = allday ? "none" : "";
      }
      document.getElementById("ev-allday").addEventListener("change", syncAllday);
      document.getElementById("fcal-add").addEventListener("click", () => openSheet(selected));
      // 웹(마우스)용 달 이동 버튼 — 모바일은 스와이프
      document.getElementById("fcal-prev-btn").addEventListener("click", () => gotoMonth(-1));
      document.getElementById("fcal-next-btn").addEventListener("click", () => gotoMonth(1));
      document.getElementById("fcal-today-btn").addEventListener("click", async () => {
        if (monthBusy) return;
        monthBusy = true;
        viewY = now.getFullYear();
        viewM = now.getMonth();
        selected = dstr(viewY, viewM, now.getDate());
        renderGrid();
        await loadMonth();
        renderGrid();
        renderEvents();
        monthBusy = false;
      });
      if (new URLSearchParams(location.search).get("new")) setTimeout(() => openSheet(selected), 250);
      sheet.querySelectorAll("[data-ev-close]").forEach((el) => el.addEventListener("click", closeSheet));

      document.getElementById("ev-save").addEventListener("click", async () => {
        const title = document.getElementById("ev-title").value.trim();
        if (!title) { evErr.textContent = "제목을 입력해주세요."; return; }

        const allday = document.getElementById("ev-allday").checked;
        const sd = document.getElementById("ev-start-date").value;
        const st = allday ? "00:00" : (document.getElementById("ev-start-time").value || "09:00");
        const startDate = new Date(`${sd}T${st}:00`).getTime();
        const endDate = allday
          ? new Date(`${sd}T23:59:00`).getTime()
          : startDate + durationMs;   // 종료는 시작 + 지속시간(새 일정 1시간, 수정은 원래 길이)

        const rep = document.getElementById("ev-repeat").value;
        const alert5 = document.getElementById("ev-alert").value;

        const btn = document.getElementById("ev-save");
        btn.disabled = true;
        try {
          if (editingId && editingSrc === "apple") {
            // 기기(Apple) 캘린더 일정은 기존 방식대로 수정
            const opts = { title, startDate, endDate, isAllDay: allday };
            if (rep) opts.recurrence = { frequency: rep };
            if (alert5 !== "") opts.alerts = [Number(alert5)];
            if (!(await ensureCalendarAccess())) throw new Error("permission");
            await calPlugin.modifyEvent({ id: editingId, ...opts });
          } else {
            // 핀로그 일정 — DB 저장이라 같은 계정의 모든 기기에서 동기화
            const row = {
              title,
              all_day: allday,
              start_at: new Date(startDate).toISOString(),
              end_at: new Date(endDate).toISOString(),
              alert_min: alert5 === "" ? null : Number(alert5),
              repeat: rep || null,
            };
            if (editingId) {
              const { error } = await supabaseClient.from("events").update(row).eq("id", editingId);
              if (error) throw error;
            } else {
              const { error } = await supabaseClient.from("events").insert({ ...row, user_id: profile.id });
              if (error) throw error;
            }
            if (window.dtNotify && dtNotify.available) dtNotify.resync(profile);   // 일정 알림 재예약
          }
          closeSheet();
          selected = sd;
          await loadMonth();
          renderGrid();
          renderEvents();
        } catch (e) {
          evErr.textContent = editingId && editingSrc === "apple"
            ? "이 일정은 수정할 수 없어요. (공휴일 등 구독 캘린더 일정)"
            : "일정을 저장하지 못했습니다. 잠시 후 다시 시도해주세요.";
        } finally {
          btn.disabled = false;
        }
      });

      /* 일정 삭제 */
      document.getElementById("ev-delete").addEventListener("click", async () => {
        if (!editingId) return;
        if (!confirm("이 일정을 삭제할까요?")) return;
        try {
          if (editingSrc === "apple") {
            await calPlugin.deleteEventsById({ ids: [editingId] });
          } else {
            const { error } = await supabaseClient.from("events").delete().eq("id", editingId);
            if (error) throw error;
            if (window.dtNotify && dtNotify.available) dtNotify.resync(profile);
          }
          closeSheet();
          await loadMonth();
          renderGrid();
          renderEvents();
        } catch (e) {
          evErr.textContent = "이 일정은 삭제할 수 없어요. (공휴일 등 구독 캘린더 일정)";
        }
      });

      /* ---------- 좌우 스와이프: 트랙 드래그 — 이웃 달 숫자가 실시간으로 보임 ---------- */
      (function wireSwipe() {
        const wrap = document.querySelector(".fcal__carousel");
        const track = document.getElementById("fcal-track");
        const CENTER = "translateX(-33.3333%)";
        let tx = null, ty = null, dragging = false, busy = false;

        wrap.addEventListener("touchstart", (e) => {
          if (busy) return;
          tx = e.touches[0].clientX; ty = e.touches[0].clientY; dragging = false;
        }, { passive: true });
        wrap.addEventListener("touchmove", (e) => {
          if (tx === null || busy) return;
          const dx = e.touches[0].clientX - tx, dy = e.touches[0].clientY - ty;
          if (!dragging) {
            if (Math.abs(dx) < 10 || Math.abs(dx) < Math.abs(dy) * 1.2) return;
            dragging = true;
          }
          track.style.transition = "none";
          track.style.transform = `translateX(calc(-33.3333% + ${dx}px))`;
        }, { passive: true });
        wrap.addEventListener("touchend", (e) => {
          if (tx === null || busy) return;
          const dx = e.changedTouches[0].clientX - tx;
          const wasDragging = dragging;
          tx = ty = null; dragging = false;
          if (!wasDragging) return;
          if (Math.abs(dx) > wrap.clientWidth * 0.18) {
            const dir = dx < 0 ? 1 : -1;
            busy = true;
            track.style.transition = "transform 0.24s cubic-bezier(.22,.61,.36,1)";
            track.style.transform = dir === 1 ? "translateX(-66.6666%)" : "translateX(0%)";
            setTimeout(() => {
              track.style.transition = "none";
              track.style.transform = CENTER;
              busy = false;
              gotoMonth(dir);
            }, 245);
          } else {
            track.style.transition = "transform 0.24s cubic-bezier(.22,.61,.36,1)";
            track.style.transform = CENTER;
          }
        }, { passive: true });
      })();

      /* base64 스크린샷 → OCR → 파싱 → 시트 자동 채움 (📷 버튼·공유 시트 공용) */
      async function processScreenshotBase64(base64) {
        const titleEl = document.getElementById("fcal-title");
        const prevTitle = titleEl.textContent;
        try {
          titleEl.textContent = "대화를 읽는 중…";
          const { text } = await window.Capacitor.Plugins.VisionOCR.recognize({ base64 });
          titleEl.textContent = prevTitle;

          const { candidate, cancelled } = ScheduleParse.parse(text, new Date());
          if (!candidate) {
            alert(cancelled
              ? "취소된 일정만 발견했어요.\n새로 등록할 일정이 없습니다."
              : "등록할 일정을 찾지 못했습니다.\n\n날짜와 시간이 포함된 대화가 화면에\n보이도록 다시 캡처해주세요.");
            return;
          }
          openSheetFromCandidate(candidate);
        } catch (e) {
          titleEl.textContent = prevTitle;
          alert("이미지를 처리하지 못했습니다.\n다른 스크린샷으로 다시 시도해주세요.");
        }
      }

      /* 공유 시트로 들어온 스크린샷 자동 처리 */
      window.__dtHandleSharedShot = () => {
        const b64 = sessionStorage.getItem("dt_shared_shot");
        if (!b64) return;
        sessionStorage.removeItem("dt_shared_shot");
        processScreenshotBase64(b64);
      };
      window.__dtHandleSharedShot();

      /* 공유 시트로 들어온 텍스트 자동 처리 (OCR 없이 바로 파싱) */
      window.__dtHandleSharedText = () => {
        const txt = sessionStorage.getItem("dt_shared_text");
        if (!txt) return;
        sessionStorage.removeItem("dt_shared_text");
        const { candidate, cancelled } = ScheduleParse.parse(txt, new Date());
        if (!candidate) {
          alert(cancelled
            ? "취소된 일정만 발견했어요.\n새로 등록할 일정이 없습니다."
            : "등록할 일정을 찾지 못했습니다.\n날짜나 시간이 포함된 텍스트를 공유해주세요.");
          return;
        }
        openSheetFromCandidate(candidate);
      };
      window.__dtHandleSharedText();

      /* 인식 결과로 새 일정 시트를 미리 채워서 연다 (등록 전 확인은 사용자가) */
      function openSheetFromCandidate(c) {
        const d = c.start;
        openSheet(dstr(d.getFullYear(), d.getMonth(), d.getDate()));
        document.getElementById("ev-title").value = c.title || "";
        if (c.hasTime) {
          document.getElementById("ev-start-time").value = `${pad(d.getHours())}:${pad(d.getMinutes())}`;
        }
        const info = [];
        if (c.source) info.push(`“${c.source}”`);
        if (c.ambiguities.length) info.push("⚠ " + c.ambiguities.join(" · "));
        evErr.textContent = info.join("  ");
      }

      /* 기존 기기(Apple) 캘린더 일정 1회 이관 — 계정 DB로 업로드해 기기 간 동기화.
         쓰기 가능한 캘린더만(공휴일 등 구독·생일 캘린더 제외), 제목+시각 중복은 건너뜀 */
      async function migrateDeviceEvents() {
        if (!calPlugin) return;
        const FLAG = "dt_ev_migrated_" + profile.id;
        if (localStorage.getItem(FLAG)) return;
        if (!(await ensureCalendarAccess())) return;
        try {
          const { result: cals } = await calPlugin.listCalendars();
          const writable = new Set((cals || [])
            .filter((c) => c.allowsContentModifications !== false).map((c) => c.id));
          const { result: devEvents } = await calPlugin.listEventsInRange({
            from: Date.now() - 30 * 86400000, to: Date.now() + 120 * 86400000,
          });
          const { data: mine } = await supabaseClient
            .from("events").select("title,start_at").eq("user_id", profile.id);
          const keyOf = (t, ms) => (t || "") + "|" + Math.round(ms / 60000);
          const seen = new Set((mine || []).map((e) => keyOf(e.title, new Date(e.start_at).getTime())));
          const rows = [];
          for (const ev of (devEvents || [])) {
            if (rows.length >= 200) break;
            if (ev.calendarId && !writable.has(ev.calendarId)) continue;
            if (ev.birthdayContactIdentifier) continue;
            const key = keyOf(ev.title, ev.startDate);
            if (seen.has(key)) continue;
            seen.add(key);
            rows.push({
              user_id: profile.id,
              title: ev.title || "(제목 없음)",
              start_at: new Date(ev.startDate).toISOString(),
              end_at: new Date(ev.endDate || ev.startDate + 3600000).toISOString(),
              all_day: !!ev.isAllDay,
              alert_min: Array.isArray(ev.alerts) && ev.alerts.length ? ev.alerts[0] : null,
              repeat: null,
            });
          }
          if (rows.length) {
            const { error } = await supabaseClient.from("events").insert(rows);
            if (error) return;                     // 실패 시 플래그를 안 남겨 다음에 재시도
            if (window.dtNotify && dtNotify.available) dtNotify.resync(profile);
          }
          localStorage.setItem(FLAG, "1");
          if (rows.length) {
            await loadMonth(); renderGrid(); renderEvents();
            showToast(`기기 일정 ${rows.length}개를 계정으로 가져왔어요`);
          }
        } catch (e) {}
      }

      renderGrid();          // 데이터 로드 전 골격 먼저
      renderEvents();
      await loadMonth();
      renderGrid();
      renderEvents();
      migrateDeviceEvents();
    });
  </script>
</body>
</html>
