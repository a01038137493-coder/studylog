<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
  <title>메모 · 핀로그</title>
  <link rel="stylesheet" href="/css/style.css?v=159" />
</head>
<body class="app-bg memoedit-page">
  <header class="topbar">
    <a href="/memo.html" class="topbar__back" aria-label="뒤로 가기"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M15 5l-7 7 7 7"/></svg></a>
    <span class="memoedit__status" id="me-status"></span>
    <div class="topbar__right">
      <button type="button" class="btn btn--ghost btn--sm" id="me-done" hidden>완료</button>
    </div>
  </header>

  <div class="memoedit__catbar">
    <button type="button" id="me-cat-btn" class="memoedit__cat">📁 미분류</button>
  </div>

  <!-- 폴더 선택 시트 -->
  <div class="evsheet" id="pick-sheet" hidden>
    <div class="evsheet__backdrop" data-pick-close></div>
    <div class="evsheet__panel">
      <div class="evsheet__head">
        <span></span>
        <span class="evsheet__title">폴더 선택</span>
        <button type="button" class="evsheet__cancel" data-pick-close>닫기</button>
      </div>
      <div id="pick-list"></div>
      <div class="catmgr__addrow">
        <input type="text" id="pick-new-input" class="field__input" placeholder="새 폴더 만들기" maxlength="20" autocomplete="off" />
        <button type="button" class="catmgr__addbtn" id="pick-new-btn">추가</button>
      </div>
    </div>
  </div>

  <main class="memoedit">
    <!-- 아이폰 메모장식 리치 텍스트 (서식이 바로 보이는 편집) -->
    <div id="me-body" class="memoedit__body" contenteditable="true" spellcheck="false"
         data-placeholder="메모를 입력하세요"></div>
  </main>

  <!-- 서식 툴바 (키보드 위) -->
  <div class="fmtbar" id="me-bar">
    <button type="button" data-cmd="bold" aria-label="굵게"><b>B</b></button>
    <button type="button" data-cmd="italic" aria-label="기울임"><i>I</i></button>
    <button type="button" data-cmd="underline" aria-label="밑줄"><u>U</u></button>
    <button type="button" data-cmd="strikeThrough" aria-label="취소선"><s>S</s></button>
    <span class="fmtbar__sep"></span>
    <button type="button" data-block="title" aria-label="제목">제목</button>
    <button type="button" data-block="head" aria-label="소제목">소제목</button>
    <span class="fmtbar__sep"></span>
    <button type="button" data-cmd="insertUnorderedList" aria-label="글머리 기호">• 목록</button>
  </div>

  <script src="/js/vendor/supabase.js"></script>
  <script src="/js/supabaseClient.js?v=mock12"></script>
  <script src="/js/utils.js?v=30"></script>
  <script src="/js/memofmt.js?v=1"></script>
  <script>
    /* 아이폰 메모장식 편집기: 서식 즉시 반영 + 자동 저장 */
    document.addEventListener("DOMContentLoaded", async () => {
      const profile = await requireRole(["student"]);
      if (!profile) return;

      const body = document.getElementById("me-body");
      const statusEl = document.getElementById("me-status");
      const doneBtn = document.getElementById("me-done");

      let id = new URLSearchParams(location.search).get("id");
      let categoryId = new URLSearchParams(location.search).get("cat") || null;
      let saved = "";
      let timer = null;
      const status = (s) => { statusEl.textContent = s; };

      if (id) {
        const { data } = await supabaseClient.from("memos").select("*").eq("id", id).maybeSingle();
        if (data) {
          body.innerHTML = MemoFmt.toHtml(data.content || "");
          saved = MemoFmt.clean(body.innerHTML);
          categoryId = data.category_id || null;
        } else { id = null; }
      }
      if (!id) setTimeout(() => body.focus(), 60);

      /* ---------- 폴더 선택 (시트) ---------- */
      const catBtn = document.getElementById("me-cat-btn");
      const pickSheet = document.getElementById("pick-sheet");
      let categories = [];
      {
        const { data: cats } = await supabaseClient.from("memo_categories")
          .select("*").eq("student_id", profile.id).order("sort").order("created_at");
        categories = cats || [];
      }

      const catName = (cid) => {
        const c = categories.find((x) => x.id === cid);
        return c ? c.name : "미분류";
      };
      const paintCatBtn = () => { catBtn.textContent = "📁 " + catName(categoryId); };
      paintCatBtn();

      async function applyCategory(cid) {
        categoryId = cid;
        paintCatBtn();
        pickSheet.hidden = true;
        if (id) {
          const { error } = await supabaseClient.from("memos")
            .update({ category_id: categoryId }).eq("id", id);
          status(error ? "저장 실패" : "저장됨");
          setTimeout(() => { if (statusEl.textContent === "저장됨") status(""); }, 1200);
        }
      }

      function renderPicker() {
        const esc2 = (s) => String(s ?? "").replace(/[&<>"']/g, (c) =>
          ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
        const rows = [{ id: null, name: "미분류" }].concat(categories);
        document.getElementById("pick-list").innerHTML = rows.map((c) => {
          const on = (c.id || null) === (categoryId || null);
          return `<button type="button" class="pickrow${on ? " is-on" : ""}" data-pick="${c.id || ""}">
            <span>${esc2(c.name)}</span>${on ? '<span class="pickrow__check">✓</span>' : ""}
          </button>`;
        }).join("");
        document.querySelectorAll("#pick-list [data-pick]").forEach((b) =>
          b.addEventListener("click", () => applyCategory(b.dataset.pick || null)));
      }

      catBtn.addEventListener("click", () => { renderPicker(); pickSheet.hidden = false; });
      pickSheet.querySelectorAll("[data-pick-close]").forEach((el) =>
        el.addEventListener("click", () => { pickSheet.hidden = true; }));

      async function createAndPick() {
        const input = document.getElementById("pick-new-input");
        const name = input.value.trim();
        if (!name) return;
        const { data, error } = await supabaseClient.from("memo_categories")
          .insert({ student_id: profile.id, name, sort: categories.length })
          .select().single();
        if (!error && data) {
          categories.push(data);
          input.value = "";
          applyCategory(data.id);
        }
      }
      document.getElementById("pick-new-btn").addEventListener("click", createAndPick);
      document.getElementById("pick-new-input").addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.isComposing) { e.preventDefault(); createAndPick(); }
      });

      async function save() {
        const content = MemoFmt.clean(body.innerHTML);
        if (content === saved) return;
        if (!id && MemoFmt.isEmpty(content)) return;   // 빈 새 메모는 저장 안 함
        status("저장 중…");
        try {
          if (id) {
            const { error } = await supabaseClient.from("memos").update({ content }).eq("id", id);
            if (error) throw error;
          } else {
            const { data, error } = await supabaseClient
              .from("memos").insert({ student_id: profile.id, content, category_id: categoryId }).select().single();
            if (error) throw error;
            id = data.id;
            history.replaceState(null, "", `/memo-edit.html?id=${id}`);
          }
          saved = content;
          status("저장됨");
          setTimeout(() => { if (statusEl.textContent === "저장됨") status(""); }, 1500);
        } catch (e) { status("저장 실패"); }
      }

      body.addEventListener("input", () => {
        clearTimeout(timer);
        timer = setTimeout(save, 800);
      });
      window.addEventListener("pagehide", save);
      document.addEventListener("visibilitychange", () => { if (document.hidden) save(); });

      /* 체크리스트: 동그라미 탭하면 완료 토글 */
      body.addEventListener("click", (e) => {
        const box = e.target.closest(".memo-check__box");
        if (!box) return;
        e.preventDefault();
        box.parentElement.classList.toggle("is-done");
        body.dispatchEvent(new Event("input"));
      });

      /* 키보드 표시 중에만 '완료' 버튼 */
      body.addEventListener("focus", () => { doneBtn.hidden = false; });
      doneBtn.addEventListener("click", () => { body.blur(); doneBtn.hidden = true; save(); });


      /* 키보드가 열리면 visualViewport 만큼 툴바를 끌어올린다 (WKWebView 대응) */
      const fmtBar = document.getElementById("me-bar");
      if (window.visualViewport) {
        const vv = window.visualViewport;
        const syncBar = () => {
          const hidden = window.innerHeight - (vv.height + vv.offsetTop);
          fmtBar.style.transform = hidden > 0 ? `translateY(-${hidden}px)` : "";
        };
        vv.addEventListener("resize", syncBar);
        vv.addEventListener("scroll", syncBar);
        syncBar();
      }

      /* 서식 툴바 */
      document.getElementById("me-bar").querySelectorAll("button").forEach((b) => {
        b.addEventListener("mousedown", (e) => e.preventDefault());   // 선택 영역 유지
        b.addEventListener("click", () => {
          body.focus();
          if (b.dataset.cmd) document.execCommand(b.dataset.cmd, false, null);
          else if (b.dataset.block) MemoFmt.applyBlock(b.dataset.block);
          else if (b.dataset.check) MemoFmt.insertCheck();
          body.dispatchEvent(new Event("input"));
        });
      });
    });
  </script>
</body>
</html>
