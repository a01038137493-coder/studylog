<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
  <title>핀로그 · Goal Tracker</title>
  <link rel="stylesheet" href="/css/style.css?v=183" />
</head>
<body class="center-screen">
  <!-- 앱 로더와 동일한 미니멀 스플래시 (라우팅 판단 동안만 잠깐 표시) -->
  <div class="app-loader" style="position: fixed; inset: 0;">
    <div class="app-loader__inner">
      <div class="app-loader__brand">핀로그</div>
      <div class="app-loader__spinner"></div>
    </div>
  </div>

  <script src="/js/vendor/supabase.js"></script>
  <script src="/js/supabaseClient.js?v=mock13"></script>
  <script>
    // 로그인 여부 / role 에 따라 적절한 페이지로 자동 이동
    (async () => {
      const profile = await getCurrentProfile();
      if (!profile) {
        window.location.href = "/welcome.html";
        return;
      }
      if (!profile.onboarded) { window.location.href = "/onboarding.html"; return; }
      // 공유 시트로 받은 스크린샷이 있으면 홈 대신 캘린더로 (일정 인식 이어가기)
      if (sessionStorage.getItem("dt_shared_shot")) { window.location.href = "/calendar.html"; return; }
      if (profile.role === "student") window.location.href = "/student.html";
      else window.location.href = "/admin.html";
    })();
  </script>
</body>
</html>
