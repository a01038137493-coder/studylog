<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
  <title>메모 · 디턴로그</title>
  <link rel="stylesheet" href="/css/style.css?v=108" />
  <script src="/js/vendor/supabase.js"></script>
</head>
<body class="app-bg has-tabbar">
  <header class="topbar">
    <div class="topbar__brand">메모</div>
    <div class="topbar__right">
      <button type="button" class="btn btn--ghost btn--sm topbar__plus" id="memo-new" aria-label="새 메모">＋</button>
    </div>
  </header>

  <main class="container">
    <input type="search" id="memo-search" class="field__input memo-search" placeholder="메모 검색" autocomplete="off" />
    <div class="memo-cats" id="memo-cats"></div>
    <div id="memo-list"><p class="muted">불러오는 중...</p></div>
  </main>

  <!-- 폴더 관리 시트 -->
  <div class="evsheet" id="cat-sheet" hidden>
    <div class="evsheet__backdrop" data-cat-close></div>
    <div class="evsheet__panel">
      <div class="evsheet__head">
        <span></span>
        <span class="evsheet__title">폴더 관리</span>
        <button type="button" class="evsheet__save" data-cat-close>완료</button>
      </div>
      <div class="catmgr__addrow">
        <input type="text" id="cat-new-input" class="field__input" placeholder="새 폴더 이름" maxlength="20" autocomplete="off" />
        <button type="button" class="catmgr__addbtn" id="cat-new-btn">추가</button>
      </div>
      <div id="cat-mgr-list"></div>
    </div>
  </div>

  <nav class="tabbar">
    <a href="/student.html" class="tabbar__item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V21h14V9.5"/></svg>
      <span>홈</span>
    </a>
    <a href="/calendar.html" class="tabbar__item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M8 3v4M16 3v4M3 10h18"/></svg>
      <span>캘린더</span>
    </a>
    <a href="/memo.html" class="tabbar__item is-active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 3h9l5 5v13a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1z"/><path d="M14 3v6h5M8 13h8M8 17h5"/></svg>
      <span>메모</span>
    </a>
    <a href="/files.html" class="tabbar__item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
      <span>파일</span>
    </a>
    <a href="/settings.html" class="tabbar__item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .34 1.87l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.7 1.7 0 0 0-1.87-.34 1.7 1.7 0 0 0-1 1.55V21a2 2 0 1 1-4 0v-.09a1.7 1.7 0 0 0-1-1.55 1.7 1.7 0 0 0-1.87.34l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.7 1.7 0 0 0 .34-1.87 1.7 1.7 0 0 0-1.55-1H3a2 2 0 1 1 0-4h.09a1.7 1.7 0 0 0 1.55-1 1.7 1.7 0 0 0-.34-1.87l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.7 1.7 0 0 0 1.87.34h.09a1.7 1.7 0 0 0 1-1.55V3a2 2 0 1 1 4 0v.09a1.7 1.7 0 0 0 1 1.55 1.7 1.7 0 0 0 1.87-.34l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.7 1.7 0 0 0-.34 1.87v.09a1.7 1.7 0 0 0 1.55 1H21a2 2 0 1 1 0 4h-.09a1.7 1.7 0 0 0-1.55 1z"/></svg>
      <span>설정</span>
    </a>
  </nav>

  <script src="/js/supabaseClient.js?v=mock10"></script>
  <script src="/js/utils.js?v=18"></script>
  <script src="/js/memofmt.js?v=1"></script>
  <script>
    /* 메모 목록 — 아이폰 메모장식: 검색 + 좌측 스와이프로 고정/삭제 */
    document.addEventListener("DOMContentLoaded", async () => {
      const profile = await requireRole(["student"]);
      if (!profile) return;

      const listEl = document.getElementById("memo-list");
      const searchEl = document.getElementById("memo-search");
      const esc = (s) => String(s ?? "").replace(/[&<>"']/g, (c) =>
        ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
      let memos = [];
      let categories = [];
      let activeCat = "all";      // "all" | "none" | category id
      let openRow = null;          // 현재 열려 있는 스와이프 행

      function when(iso) {
        const d = new Date(iso);
        const now = new Date();
        const p = (n) => String(n).padStart(2, "0");
        return d.toDateString() === now.toDateString()
          ? `오늘 ${fmtTime12(d)}`
          : `${d.getMonth() + 1}월 ${d.getDate()}일`;
      }

      function sorted(rows) {
        return [...rows].sort((a, b) => {
          if (!!b.pinned !== !!a.pinned) return b.pinned ? 1 : -1;
          return String(b.updated_at || "").localeCompare(String(a.updated_at || ""));
        });
      }

      function cardHtml(m) {
        const lines = MemoFmt.toText(m.content).split("\n").filter((l) => l.trim());
        const title = lines[0] || "새로운 메모";
        const body = lines.slice(1).join(" ").trim();
        return `
          <div class="memo-row" data-id="${m.id}">
            <div class="memo-row__actions">
              <button type="button" class="memo-act memo-act--pin" data-act="pin"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 17v5"/><path d="M9 3h6l-1 7 3 3H7l3-3z"/></svg><span>${m.pinned ? "해제" : "고정"}</span></button>
              <button type="button" class="memo-act memo-act--del" data-act="del"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4h8v2M6 6l1 14h10l1-14"/><path d="M10 11v6M14 11v6"/></svg><span>삭제</span></button>
            </div>
            <a href="/memo-edit.html?id=${m.id}" class="card memo-item">
              <span class="memo-item__title">${m.pinned ? '<span class="memo-item__pin">📌</span> ' : ""}${esc(title)}</span>
              <span class="memo-item__meta">
                <span class="memo-item__date">${when(m.updated_at || m.created_at)}</span>
                ${body ? `<span class="memo-item__body">${esc(body)}</span>` : ""}
              </span>
            </a>
          </div>`;
      }

      function closeOpen() {
        if (!openRow) return;
        openRow.classList.remove("is-open");
        openRow.querySelector(".memo-item").style.transform = "";
        openRow = null;
      }

      /* 좌측 스와이프 — 포인터 이벤트(터치·마우스 공통).
       * 가로 이동은 CSS touch-action: pan-y 가 브라우저 스크롤에서 떼어 준다. */
      const OPEN_X = -158;
      function wireSwipe(row) {
        const card = row.querySelector(".memo-item");
        let sx = 0, sy = 0, dx = 0, dir = null, active = false, moved = false;

        const setX = (x) => { card.style.transform = x ? `translateX(${x}px)` : ""; };

        card.addEventListener("pointerdown", (e) => {
          if (e.pointerType === "mouse" && e.button !== 0) return;
          if (openRow && openRow !== row) closeOpen();
          sx = e.clientX; sy = e.clientY;
          dx = 0; dir = null; active = true; moved = false;
          card.style.transition = "none";
        });

        card.addEventListener("pointermove", (e) => {
          if (!active) return;
          const mx = e.clientX - sx;
          const my = e.clientY - sy;
          if (!dir) {
            if (Math.abs(mx) < 6 && Math.abs(my) < 6) return;
            if (Math.abs(my) > Math.abs(mx)) { active = false; return; }   // 세로 스크롤에 양보
            dir = "x";
            try { card.setPointerCapture(e.pointerId); } catch (err) {}
          }
          moved = true;
          const base = row.classList.contains("is-open") ? OPEN_X : 0;
          dx = Math.max(OPEN_X - 40, Math.min(0, base + mx));              // 왼쪽으로만
          setX(dx);
        });

        const finish = () => {
          if (!active) return;
          active = false;
          card.style.transition = "";
          if (dir !== "x") return;
          if (dx < OPEN_X / 2) {
            setX(OPEN_X);
            row.classList.add("is-open");
            openRow = row;
          } else {
            setX(0);
            row.classList.remove("is-open");
            if (openRow === row) openRow = null;
          }
        };
        card.addEventListener("pointerup", finish);
        card.addEventListener("pointercancel", finish);
        card.addEventListener("dragstart", (e) => e.preventDefault());

        // 드래그 직후 또는 열린 상태의 탭은 메모 이동 대신 처리
        card.addEventListener("click", (e) => {
          if (moved || row.classList.contains("is-open")) {
            e.preventDefault();
            if (row.classList.contains("is-open") && !moved) closeOpen();
            moved = false;
          }
        });

        row.querySelectorAll("[data-act]").forEach((btn) => {
          btn.addEventListener("click", async () => {
            const id = row.dataset.id;
            const memo = memos.find((m) => m.id === id);
            if (!memo) return;
            if (btn.dataset.act === "pin") {
              const next = !memo.pinned;
              const { error } = await supabaseClient.from("memos").update({ pinned: next }).eq("id", id);
              if (!error) memo.pinned = next;
            } else {
              if (!confirm("이 메모를 삭제할까요?")) { closeOpen(); return; }
              const { error } = await supabaseClient.from("memos").delete().eq("id", id);
              if (!error) memos = memos.filter((m) => m.id !== id);
            }
            openRow = null;
            renderList();
          });
        });
      }

      /* ---------- 카테고리 (노션식 폴더) ---------- */
      function renderCats() {
        const el = document.getElementById("memo-cats");
        const uncategorized = memos.filter((m) => !m.category_id).length;
        let html = `<button type="button" class="memo-cat${activeCat === "all" ? " is-active" : ""}" data-cat="all">전체 ${memos.length}</button>`;
        html += categories.map((c) => {
          const n = memos.filter((m) => m.category_id === c.id).length;
          return `<button type="button" class="memo-cat${activeCat === c.id ? " is-active" : ""}" data-cat="${c.id}">${esc(c.name)} ${n}</button>`;
        }).join("");
        if (uncategorized && categories.length) {
          html += `<button type="button" class="memo-cat${activeCat === "none" ? " is-active" : ""}" data-cat="none">미분류 ${uncategorized}</button>`;
        }
        html += `<button type="button" class="memo-cat memo-cat--add" data-cat="__manage">폴더 관리</button>`;
        el.innerHTML = html;

        el.querySelectorAll("[data-cat]").forEach((btn) => {
          btn.addEventListener("click", () => {
            const id = btn.dataset.cat;
            if (id === "__manage") { openCatSheet(); return; }
            activeCat = id;
            renderCats();
            renderList();
          });
        });
      }

      /* 폴더 관리 시트: 추가 · 이름 인라인 수정 · 삭제 */
      const catSheet = document.getElementById("cat-sheet");
      const catInput = document.getElementById("cat-new-input");

      function openCatSheet() {
        renderCatManager();
        catInput.value = "";
        catSheet.hidden = false;
      }
      catSheet.querySelectorAll("[data-cat-close]").forEach((el2) =>
        el2.addEventListener("click", () => {
          catSheet.hidden = true;
          renderCats();
          renderList();
        }));

      function renderCatManager() {
        const listBox = document.getElementById("cat-mgr-list");
        if (!categories.length) {
          listBox.innerHTML = `<p class="catmgr__empty">아직 폴더가 없어요.<br/>위에서 첫 폴더를 만들어보세요.</p>`;
          return;
        }
        listBox.innerHTML = categories.map((c) => `
          <div class="catmgr__row" data-id="${c.id}">
            <input type="text" class="catmgr__name" value="${esc(c.name)}" maxlength="20" />
            <span class="catmgr__count">${memos.filter((m) => m.category_id === c.id).length}</span>
            <button type="button" class="catmgr__del" aria-label="삭제">삭제</button>
          </div>`).join("");

        listBox.querySelectorAll(".catmgr__row").forEach((row) => {
          const cid = row.dataset.id;
          const nameEl = row.querySelector(".catmgr__name");

          // 이름 인라인 수정 (블러/Enter 시 저장)
          const commit = async () => {
            const cat = categories.find((c) => c.id === cid);
            const name = nameEl.value.trim();
            if (!cat || !name || name === cat.name) { nameEl.value = cat ? cat.name : ""; return; }
            const { error } = await supabaseClient.from("memo_categories")
              .update({ name }).eq("id", cid);
            if (!error) cat.name = name; else nameEl.value = cat.name;
          };
          nameEl.addEventListener("blur", commit);
          nameEl.addEventListener("keydown", (e) => {
            if (e.key === "Enter" && !e.isComposing) { e.preventDefault(); nameEl.blur(); }
          });

          row.querySelector(".catmgr__del").addEventListener("click", async () => {
            const cat = categories.find((c) => c.id === cid);
            if (!cat) return;
            const n = memos.filter((m) => m.category_id === cid).length;
            if (!confirm(n ? `'${cat.name}' 폴더를 삭제할까요?\n메모 ${n}개는 미분류로 이동합니다.` : `'${cat.name}' 폴더를 삭제할까요?`)) return;
            const { error } = await supabaseClient.from("memo_categories").delete().eq("id", cid);
            if (!error) {
              categories = categories.filter((c) => c.id !== cid);
              memos.forEach((m) => { if (m.category_id === cid) m.category_id = null; });
              if (activeCat === cid) activeCat = "all";
              renderCatManager();
            }
          });
        });
      }

      async function createCategory(name) {
        const text = name.trim();
        if (!text) return null;
        const { data, error } = await supabaseClient.from("memo_categories")
          .insert({ student_id: profile.id, name: text, sort: categories.length })
          .select().single();
        if (!error && data) { categories.push(data); return data; }
        return null;
      }
      document.getElementById("cat-new-btn").addEventListener("click", async () => {
        const made = await createCategory(catInput.value);
        if (made) { catInput.value = ""; renderCatManager(); }
      });
      catInput.addEventListener("keydown", async (e) => {
        if (e.key !== "Enter" || e.isComposing) return;
        e.preventDefault();
        const made = await createCategory(catInput.value);
        if (made) { catInput.value = ""; renderCatManager(); }
      });

      function renderList() {
        const q = searchEl.value.trim().toLowerCase();
        const rows = sorted(q
          ? memos.filter((m) => MemoFmt.toText(m.content).toLowerCase().includes(q))
          : memos);

        if (!memos.length) {
          listEl.innerHTML = `
            <div class="card memo-empty">
              <p class="memo-empty__title">아직 메모가 없어요</p>
              <p class="memo-empty__desc">수업 필기, 오답 포인트, 떠오른 생각을 자유롭게 적어보세요</p>
              <a href="/memo-edit.html" class="btn btn--primary btn--lg">첫 메모 쓰기</a>
            </div>`;
          return;
        }
        if (!rows.length) { listEl.innerHTML = `<p class="muted">검색 결과가 없습니다.</p>`; return; }

        const pinned = rows.filter((m) => m.pinned);
        const rest = rows.filter((m) => !m.pinned);
        listEl.innerHTML =
          (pinned.length ? `<p class="memo-section">고정된 메모</p>` + pinned.map(cardHtml).join("") : "") +
          (rest.length ? (pinned.length ? `<p class="memo-section">메모</p>` : "") + rest.map(cardHtml).join("") : "");

        listEl.querySelectorAll(".memo-row").forEach(wireSwipe);
      }

      searchEl.addEventListener("input", () => { openRow = null; renderList(); });
      document.getElementById("memo-new").addEventListener("click", () => {
        const cat = activeCat !== "all" && activeCat !== "none" ? "?cat=" + activeCat : "";
        window.location.href = "/memo-edit.html" + cat;
      });

      const [memosRes, catsRes] = await Promise.all([
        supabaseClient.from("memos").select("*")
          .eq("student_id", profile.id).order("updated_at", { ascending: false }),
        supabaseClient.from("memo_categories").select("*")
          .eq("student_id", profile.id).order("sort").order("created_at"),
      ]);
      if (memosRes.error) { listEl.innerHTML = `<p class="muted">메모를 불러오지 못했습니다.</p>`; return; }
      memos = memosRes.data || [];
      categories = catsRes.data || [];
      renderCats();
      renderList();
    });
  </script>
</body>
</html>
