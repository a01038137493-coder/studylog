<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
  <title>메모 · 디턴로그</title>
  <link rel="stylesheet" href="/css/style.css?v=87" />
  <script src="/js/vendor/supabase.js"></script>
</head>
<body class="app-bg has-tabbar">
  <header class="topbar">
    <div class="topbar__brand">메모</div>
    <div class="topbar__right">
      <button type="button" class="btn btn--ghost btn--sm" id="memo-new">＋ 새 메모</button>
    </div>
  </header>

  <main class="container">
    <input type="search" id="memo-search" class="field__input memo-search" placeholder="메모 검색" autocomplete="off" />
    <div class="memo-tags" id="memo-tags" hidden></div>
    <div id="memo-list"><p class="muted">불러오는 중...</p></div>
  </main>

  <nav class="tabbar">
    <a href="/student.html" class="tabbar__item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V21h14V9.5"/></svg>
      <span>홈</span>
    </a>
    <a href="/todo.html" class="tabbar__item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3 8-8"/><path d="M20 12v6a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h9"/></svg>
      <span>할 일</span>
    </a>
    <a href="/calendar.html" class="tabbar__item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M8 3v4M16 3v4M3 10h18"/></svg>
      <span>캘린더</span>
    </a>
    <a href="/memo.html" class="tabbar__item is-active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 3h9l5 5v13a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1z"/><path d="M14 3v6h5M8 13h8M8 17h5"/></svg>
      <span>메모</span>
    </a>
    <a href="/settings.html" class="tabbar__item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .34 1.87l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.7 1.7 0 0 0-1.87-.34 1.7 1.7 0 0 0-1 1.55V21a2 2 0 1 1-4 0v-.09a1.7 1.7 0 0 0-1-1.55 1.7 1.7 0 0 0-1.87.34l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.7 1.7 0 0 0 .34-1.87 1.7 1.7 0 0 0-1.55-1H3a2 2 0 1 1 0-4h.09a1.7 1.7 0 0 0 1.55-1 1.7 1.7 0 0 0-.34-1.87l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.7 1.7 0 0 0 1.87.34h.09a1.7 1.7 0 0 0 1-1.55V3a2 2 0 1 1 4 0v.09a1.7 1.7 0 0 0 1 1.55 1.7 1.7 0 0 0 1.87-.34l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.7 1.7 0 0 0-.34 1.87v.09a1.7 1.7 0 0 0 1.55 1H21a2 2 0 1 1 0 4h-.09a1.7 1.7 0 0 0-1.55 1z"/></svg>
      <span>설정</span>
    </a>
  </nav>

  <script src="/js/supabaseClient.js?v=mock9"></script>
  <script src="/js/utils.js?v=14"></script>
  <script src="/js/md.js?v=1"></script>
  <script>
    /* 메모 목록 — 검색 + 태그 필터. 편집은 memo-edit.html (옵시디언식 전체화면) */
    document.addEventListener("DOMContentLoaded", async () => {
      const profile = await requireRole(["student"]);
      if (!profile) return;

      const listEl = document.getElementById("memo-list");
      const searchEl = document.getElementById("memo-search");
      const tagsEl = document.getElementById("memo-tags");
      let memos = [];
      let activeTag = null;

      function when(iso) {
        const d = new Date(iso);
        const now = new Date();
        const p = (n) => String(n).padStart(2, "0");
        return d.toDateString() === now.toDateString()
          ? `오늘 ${p(d.getHours())}:${p(d.getMinutes())}`
          : `${d.getMonth() + 1}월 ${d.getDate()}일`;
      }

      function preview(content) {
        const lines = String(content || "").split("\n").slice(1);
        return lines.join(" ").replace(/[#*_~`>\-]/g, "").replace(/\s+/g, " ").trim();
      }

      function renderTags() {
        const counts = new Map();
        memos.forEach((m) => MD.tagsOf(m.content).forEach((t) => counts.set(t, (counts.get(t) || 0) + 1)));
        if (!counts.size) { tagsEl.hidden = true; return; }
        tagsEl.hidden = false;
        tagsEl.innerHTML = [...counts.entries()]
          .sort((a, b) => b[1] - a[1])
          .map(([t, n]) => `<button type="button" class="memo-tag${activeTag === t ? " is-active" : ""}" data-tag="${MD.esc(t)}">#${MD.esc(t)} ${n}</button>`)
          .join("");
        tagsEl.querySelectorAll("[data-tag]").forEach((b) => {
          b.addEventListener("click", () => {
            activeTag = activeTag === b.dataset.tag ? null : b.dataset.tag;
            renderTags(); renderList();
          });
        });
      }

      function renderList() {
        const q = searchEl.value.trim().toLowerCase();
        let rows = memos;
        if (activeTag) rows = rows.filter((m) => MD.tagsOf(m.content).includes(activeTag));
        if (q) rows = rows.filter((m) => (m.content || "").toLowerCase().includes(q));

        if (!memos.length) {
          listEl.innerHTML = `
            <div class="card memo-empty">
              <p class="memo-empty__title">아직 메모가 없어요</p>
              <p class="memo-empty__desc">마크다운으로 자유롭게 적고, <b>[[다른 메모]]</b>로 연결하거나 <b>#태그</b>를 붙여보세요</p>
              <a href="/memo-edit.html" class="btn btn--primary btn--lg">첫 메모 쓰기</a>
            </div>`;
          return;
        }
        if (!rows.length) { listEl.innerHTML = `<p class="muted">검색 결과가 없습니다.</p>`; return; }

        listEl.innerHTML = rows.map((m) => {
          const body = preview(m.content);
          return `
            <a href="/memo-edit.html?id=${m.id}" class="card memo-item">
              <span class="memo-item__title">${MD.esc(MD.titleOf(m.content))}</span>
              ${body ? `<span class="memo-item__body">${MD.esc(body)}</span>` : ""}
              <span class="memo-item__date">${when(m.updated_at || m.created_at)}</span>
            </a>`;
        }).join("");
      }

      searchEl.addEventListener("input", renderList);
      document.getElementById("memo-new").addEventListener("click", () => {
        window.location.href = "/memo-edit.html";
      });

      const { data, error } = await supabaseClient
        .from("memos").select("*")
        .eq("student_id", profile.id)
        .order("updated_at", { ascending: false });
      if (error) { listEl.innerHTML = `<p class="muted">메모를 불러오지 못했습니다.</p>`; return; }
      memos = data || [];
      renderTags();
      renderList();
    });
  </script>
</body>
</html>
