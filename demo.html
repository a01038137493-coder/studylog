<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
  <title>핀로그 데모 둘러보기</title>
  <link rel="stylesheet" href="/css/style.css?v=119" />
</head>
<body class="center-screen">
  <div class="splash">
    <img src="/assets/logo.svg" alt="핀로그" class="splash__logo" onerror="this.style.display='none'" />
    <h1 class="splash__title">핀로그 데모</h1>
    <p class="splash__tagline">실제 데이터처럼 자유롭게 둘러보세요.</p>
    <p class="splash__loading">데모를 준비하는 중...</p>
  </div>

  <!--
    핀로그 데모 전용 입구.
    · 일반 앱 동작(supabaseClient.js 기본값/login/index 등)은 전혀 건드리지 않는다.
    · 이 페이지로 들어올 때만: 목업 강제 ON + 데모 데이터 초기화 + 자동 로그인.
      → 누가, 언제 눌러도 "항상 똑같은" 깨끗한 상태에서 시작한다.
      (방문자가 둘러보며 바꾼 내용은 그 사람 브라우저에만 남고, 다시 이 링크로 들어오면 초기화됨)
    · 학생 화면: /demo.html        관리자 화면: /demo.html?role=admin
  -->
  <script>
    (function () {
      try {
        var role = new URLSearchParams(location.search).get("role") === "admin" ? "admin" : "student";
        sessionStorage.setItem("dt_mock_mode", "1"); // 목업 ON (이 탭 세션만 → 메인 도메인 누수 없음)
        localStorage.removeItem("dt_mock_db");        // 데모 데이터 초기화 → 다음 로드에서 재시드(항상 동일)
        localStorage.setItem("dt_mock_session", role === "admin" ? "demo-admin" : "demo-student-1"); // 자동 로그인
        location.replace(role === "admin" ? "/admin.html" : "/student.html");
      } catch (e) {
        location.replace("/login.html");              // 스토리지 차단 등 예외 시 실제 로그인으로
      }
    })();
  </script>
</body>
</html>
