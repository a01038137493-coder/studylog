<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
  <title>타임박스 · 핀로그</title>
  <link rel="icon" type="image/png" href="/assets/logo.png" />
  <link rel="apple-touch-icon" href="/assets/logo.png" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#f04438" />
  <script>if (!window.Capacitor) document.documentElement.classList.add("dt-web");</script>
  <link rel="stylesheet" href="/css/style.css?v=186" />
</head>
<body class="app-bg has-tabbar" data-kbresize="none">
  <header class="topbar">
    <button type="button" class="topbar__back" id="tb-back" style="visibility:hidden" aria-label="편집 닫기"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M15 5l-7 7 7 7"/></svg></button>
    <div class="topbar__brand" id="tb-title">타임박스</div>
    <div class="topbar__right">
      <button type="button" class="tb-vm" id="tb-vm" aria-label="하루 보기"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="5" width="16" height="15" rx="2"/><path d="M8 3v4M16 3v4M4 10h16"/><rect x="10.7" y="12.8" width="2.6" height="2.6" rx="0.6" fill="currentColor" stroke="none"/></svg></button>
    </div>
  </header>

  <main class="container">
    <!-- 태블릿 전용 좌측 패널: 지금/다음 · 주간 배분 · 블록 목록 -->
    <aside class="tbside">
      <section class="tbside__card" id="tbside-now"></section>
      <section class="tbside__card" id="tbside-wx" hidden></section>
      <section class="tbside__card" id="tbside-week"></section>
      <section class="tbside__card" id="tbside-list"></section>
    </aside>

    <!-- 보기: 오늘의 세로 시간축 그리드 (블록 탭 = 완료 체크) -->
    <section class="card" id="tb-view">
      <div id="tb-grid"><p class="muted" style="text-align:center;margin:16px 0;">불러오는 중...</p></div>
    </section>

    <!-- 편집: 블록 목록 (탭하면 시트로 수정) -->
    <section class="card" id="tb-editor" hidden>
      <div id="tbe-list"></div>
      <button type="button" class="gtodo__addbtn" id="tbe-add">＋ 블록 추가</button>
    </section>
  </main>

  <button type="button" class="fab" id="tb-mode" aria-label="시간표 편집"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/></svg></button>

  <!-- 블록 추가/수정 시트 -->
  <div class="evsheet" id="tbsheet" hidden>
    <div class="evsheet__backdrop" data-tb-close></div>
    <div class="evsheet__panel">
      <div class="evsheet__head">
        <button type="button" class="evsheet__cancel" data-tb-close>취소</button>
        <span class="evsheet__title" id="tbs-title">블록 추가</span>
        <button type="button" class="evsheet__save" id="tbs-save">저장</button>
      </div>
      <input type="text" id="tbs-label" class="field__input gt-input" placeholder="무엇을 하나요? (예: 수학)" maxlength="30" autocomplete="off" enterkeyhint="done" />
      <div class="evsheet__row evsheet__row--col">
        <span>시간</span>
        <div class="evsheet__dt">
          <input type="time" id="tbs-start" class="field__input" />
          <input type="time" id="tbs-end" class="field__input" />
        </div>
      </div>
      <div class="tbs__dayswrap">
        <span>요일</span>
        <div class="tbe__days" id="tbs-days"></div>
      </div>
      <div class="tbs__dayswrap">
        <span>색상</span>
        <div class="tbs__colors" id="tbs-colors"></div>
      </div>
      <button type="button" class="evsheet__delete" id="tbs-del" hidden>블록 삭제</button>
    </div>
  </div>

  <nav class="tabbar">
    <a href="/student.html" class="tabbar__item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V21h14V9.5"/></svg>
      <span>홈</span>
    </a>
    <a href="/calendar.html" class="tabbar__item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M8 3v4M16 3v4M3 10h18"/></svg>
      <span>캘린더</span>
    </a>
    <a href="/memo.html" class="tabbar__item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 3h9l5 5v13a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1z"/><path d="M14 3v6h5M8 13h8M8 17h5"/></svg>
      <span>메모</span>
    </a>
    <a href="/files.html" class="tabbar__item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
      <span>파일</span>
    </a>
    <a href="/settings.html" class="tabbar__item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .34 1.87l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.7 1.7 0 0 0-1.87-.34 1.7 1.7 0 0 0-1 1.55V21a2 2 0 1 1-4 0v-.09a1.7 1.7 0 0 0-1-1.55 1.7 1.7 0 0 0-1.87.34l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.7 1.7 0 0 0 .34-1.87 1.7 1.7 0 0 0-1.55-1H3a2 2 0 1 1 0-4h.09a1.7 1.7 0 0 0 1.55-1 1.7 1.7 0 0 0-.34-1.87l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.7 1.7 0 0 0 1.87.34h.09a1.7 1.7 0 0 0 1-1.55V3a2 2 0 1 1 4 0v.09a1.7 1.7 0 0 0 1 1.55 1.7 1.7 0 0 0 1.87-.34l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.7 1.7 0 0 0-.34 1.87v.09a1.7 1.7 0 0 0 1.55 1H21a2 2 0 1 1 0 4h-.09a1.7 1.7 0 0 0-1.55 1z"/></svg>
      <span>설정</span>
    </a>
  </nav>

  <script src="/js/vendor/supabase.js"></script>
  <script src="/js/supabaseClient.js?v=mock13"></script>
  <script src="/js/utils.js?v=39"></script>
  <script src="/js/notify.js?v=4"></script>
  <script>
    /* 타임박스 페이지 — 보기(그리드·체크) / 편집(블록·요일) 전환 */
    document.addEventListener("DOMContentLoaded", async () => {
      const profile = await requireRole(["student"]);
      if (!profile) return;

      const esc = (s) => String(s ?? "").replace(/[&<>"']/g, (c) =>
        ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
      const toMin = (t) => { const [h, m] = t.split(":").map(Number); return h * 60 + m; };
      const today = getTodayString();
      const gridEl = document.getElementById("tb-grid");
      const viewEl = document.getElementById("tb-view");
      const editorEl = document.getElementById("tb-editor");
      const modeBtn = document.getElementById("tb-mode");
      const listEl = document.getElementById("tbe-list");
      let boxes = [];

      async function loadBoxes() {
        const { data: bs } = await supabaseClient.from("timeboxes")
          .select("*").eq("student_id", profile.id).order("start_time");
        boxes = bs || [];
      }

      /* ---------- 보기: 일주일 / 하루 (홈 그리드와 같은 디자인 언어) ---------- */
      const DOWS = ["월", "화", "수", "목", "금", "토", "일"];
      const todayDow = (new Date().getDay() + 6) % 7;   // 월=0
      let selDow = todayDow;
      let viewMode = "week";
      const daysOf = (b) => Array.isArray(b.days) ? b.days : [0, 1, 2, 3, 4, 5, 6];
      const TB_COLORS = ["#ef767a", "#f5a25d", "#d9b23c", "#64ba7b", "#45c4b6", "#6096f0", "#7d80da", "#a06ee1", "#ea7fb1"];
      const colorOf = (label) => {
        let h = 0;
        for (const ch of String(label)) h = (h * 31 + ch.charCodeAt(0)) >>> 0;
        return TB_COLORS[h % TB_COLORS.length];
      };
      const boxColor = (b) => b.color || colorOf(b.label);
      const h12 = (h) => (h % 12 === 0 ? 12 : h % 12);
      const t12 = (t) => {
        const [h, m] = t.split(":").map(Number);
        return `${h < 12 ? "오전" : "오후"} ${h12(h)}:${String(m).padStart(2, "0")}`;
      };
      function renderView() { viewMode === "week" ? renderWeek() : renderDay(); }

      const vmBtn = document.getElementById("tb-vm");
      const VM_ICONS = {
        day: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="5" width="16" height="15" rx="2"/><path d="M8 3v4M16 3v4M4 10h16"/><rect x="10.7" y="12.8" width="2.6" height="2.6" rx="0.6" fill="currentColor" stroke="none"/></svg>',
        week: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="5" width="16" height="15" rx="2"/><path d="M8 3v4M16 3v4M4 10h16"/><path d="M9.3 10v10M14.7 10v10"/></svg>',
      };
      vmBtn.addEventListener("click", () => {
        viewMode = viewMode === "week" ? "day" : "week";
        vmBtn.innerHTML = viewMode === "week" ? VM_ICONS.day : VM_ICONS.week;   // 누르면 바뀔 모드 아이콘
        vmBtn.setAttribute("aria-label", viewMode === "week" ? "하루 보기" : "일주일 보기");
        renderView();
      });

      function wireCommon() {
        gridEl.querySelectorAll("[data-dow]").forEach((chip) => {
          chip.addEventListener("click", () => { selDow = Number(chip.dataset.dow); renderView(); });
        });
      }

      /* 일주일 뷰: 7컬럼 × 시간축 */
      function renderWeek() {
        const PX = 30;
        const nowMin = new Date().getHours() * 60 + new Date().getMinutes();
        let gs = 5 * 60, ge = 24 * 60;
        if (boxes.length) {
          gs = Math.min(gs, Math.floor(Math.min(...boxes.map((b) => toMin(b.start_time))) / 60) * 60);
          ge = Math.max(ge, Math.ceil(Math.max(...boxes.map((b) => toMin(b.end_time))) / 60) * 60);
        }
        const y = (min) => ((min - gs) / 60) * PX;
        const H = ((ge - gs) / 60) * PX;

        const head = `<div class="wk__gut"></div>` + DOWS.map((d, i) =>
          `<div class="wk__day${i === todayDow ? " is-today" : ""}">${d}</div>`).join("");
        let gut = "";
        for (let m = gs; m <= ge; m += 60) {
          gut += `<span style="top:${y(m)}px">${h12(m / 60)}</span>`;
        }
        const cols = DOWS.map((d, i) => {
          let cells = "";
          for (let m = gs; m <= ge; m += 60) cells += `<i style="top:${y(m)}px"></i>`;
          const isT = i === todayDow;
          const blks = boxes.filter((b) => daysOf(b).includes(i)).map((b) => {
            const s = toMin(b.start_time), e = toMin(b.end_time);
            return `
            <div class="wk__blk" style="top:${y(s) + 0.5}px; height:${Math.max(14, y(e) - y(s) - 1)}px; background:${boxColor(b)}">
              <span>${esc(b.label)}</span>
            </div>`;
          }).join("");
          return `<div class="wk__col${isT ? " is-today" : ""}" style="height:${H}px">${cells}${blks}</div>`;
        }).join("");

        gridEl.innerHTML = `
          <div class="wk">
            <div class="wk__head">${head}</div>
            <div class="wk__body"><div class="wk__gutcol" style="height:${H}px">${gut}</div>${cols}</div>
          </div>`;
        wireCommon();
      }

      /* 하루 뷰: 애플 캘린더 스타일 (시간 라벨 + 가는 선 + 현재 시각 배지) */
      function renderDay() {
        const chips = `<div class="tbe__days tbv__days">${DOWS.map((d, i) =>
          `<button type="button" class="tbe__day${i === selDow ? " is-on" : ""}${i === todayDow ? " tbv__today" : ""}" data-dow="${i}">${d}</button>`).join("")}</div>`;

        const dayBoxes = boxes.filter((b) => daysOf(b).includes(selDow));
        const PX = 58;
        const isToday = selDow === todayDow;
        const now = new Date();
        const nowMin = now.getHours() * 60 + now.getMinutes();
        let gs = 5 * 60, ge = 24 * 60;
        if (dayBoxes.length) {
          gs = Math.min(gs, Math.floor(Math.min(...dayBoxes.map((b) => toMin(b.start_time))) / 60) * 60);
          ge = Math.max(ge, Math.ceil(Math.max(...dayBoxes.map((b) => toMin(b.end_time))) / 60) * 60);
        }
        const y = (min) => ((min - gs) / 60) * PX;
        const hourLabel = (h) => `${h < 12 ? "오전" : "오후"} ${h % 12 === 0 ? 12 : h % 12}시`;

        let html = "";
        for (let m = gs; m <= ge; m += 60) {
          html += `<div class="tgd__hour" style="top:${y(m)}px"><span>${hourLabel(m / 60)}</span><i></i></div>`;
        }
        html += dayBoxes.map((b) => {
          const s = toMin(b.start_time), e = toMin(b.end_time);
          const h = Math.max(24, y(e) - y(s) - 3);
          const slim = h < 42;
          const bc = boxColor(b);
          return `
          <div class="tgd__block${slim ? " tgd__block--slim" : ""}"
               style="top:${y(s) + 1.5}px; height:${h}px; background:${bc}21; border-left-color:${bc}">
            ${slim ? "" : `<span class="tgd__time">${t12(b.start_time)}–${t12(b.end_time)}</span>`}
            <span class="tgd__label">${esc(b.label)}</span>
          </div>`;
        }).join("");
        if (isToday && nowMin >= gs && nowMin <= ge) {
          const badge = `${h12(now.getHours())}:${String(now.getMinutes()).padStart(2, "0")}`;
          html += `<div class="tgd__now" style="top:${y(nowMin)}px"><em>${badge}</em><i></i></div>`;
        }
        gridEl.innerHTML = chips +
          `<div class="tgd" style="height:${((ge - gs) / 60) * PX + 16}px">${html}</div>` +
          (dayBoxes.length === 0
            ? `<p class="wtb__hint">${DOWS[selDow]}요일엔 블록이 없어요 — 연필 버튼으로 추가해보세요</p>` : "");
        wireCommon();
      }

      /* ---------- 편집: 요약 목록 + 바텀시트 ---------- */
      const dayText = (b) => {
        const ds = daysOf(b).slice().sort((x, z) => x - z);
        if (ds.length === 7) return "매일";
        if (ds.join(",") === "0,1,2,3,4") return "평일";
        if (ds.join(",") === "5,6") return "주말";
        return ds.map((i) => DOWS[i]).join("·");
      };

      function renderEditor() {
        if (!boxes.length) {
          listEl.innerHTML = `<p class="muted" style="text-align:center;margin:14px 0;">아직 블록이 없어요.<br/>＋ 블록 추가로 시간표를 만들어보세요.</p>`;
          return;
        }
        listEl.innerHTML = boxes.map((b) => `
          <button type="button" class="tbr" data-id="${b.id}">
            <span class="tbr__dot" style="background:${boxColor(b)}"></span>
            <span class="tbr__mid">
              <b>${esc(b.label)}</b>
              <span>${t12(b.start_time)}–${t12(b.end_time)} · ${dayText(b)}</span>
            </span>
            <span class="tbr__chev">›</span>
          </button>`).join("");
        listEl.querySelectorAll(".tbr").forEach((row) => {
          row.addEventListener("click", () =>
            openSheet(boxes.find((x) => x.id === row.dataset.id) || null));
        });
      }

      /* ----- 시트 ----- */
      const sheet = document.getElementById("tbsheet");
      const sLabel = document.getElementById("tbs-label");
      const sStart = document.getElementById("tbs-start");
      const sEnd = document.getElementById("tbs-end");
      const sDays = document.getElementById("tbs-days");
      const sDel = document.getElementById("tbs-del");
      let editingBox = null;

      function renderSheetColors(sel) {
        const wrap = document.getElementById("tbs-colors");
        wrap.innerHTML = TB_COLORS.map((cc) =>
          `<button type="button" class="tbs__c${cc === sel ? " is-on" : ""}" data-c="${cc}" style="background:${cc}"></button>`).join("");
        wrap.querySelectorAll(".tbs__c").forEach((sw) => {
          sw.addEventListener("click", () => {
            wrap.querySelectorAll(".tbs__c").forEach((x) => x.classList.remove("is-on"));
            sw.classList.add("is-on");
          });
        });
      }

      function renderSheetDays(active) {
        sDays.innerHTML = DOWS.map((d, i) =>
          `<button type="button" class="tbe__day${active.includes(i) ? " is-on" : ""}" data-day="${i}">${d}</button>`).join("");
        sDays.querySelectorAll(".tbe__day").forEach((chip) =>
          chip.addEventListener("click", () => chip.classList.toggle("is-on")));
      }

      function openSheet(box) {
        editingBox = box;
        document.getElementById("tbs-title").textContent = box ? "블록 수정" : "블록 추가";
        sLabel.value = box ? box.label : "";
        if (box) {
          sStart.value = box.start_time.slice(0, 5);
          sEnd.value = box.end_time.slice(0, 5);
        } else {
          const last = boxes[boxes.length - 1];
          const st = last ? last.end_time.slice(0, 5) : "09:00";
          const [h, m] = st.split(":").map(Number);
          sStart.value = st;
          sEnd.value = `${String(Math.min(23, h + 1)).padStart(2, "0")}:${String(m).padStart(2, "0")}`;
        }
        renderSheetDays(box ? daysOf(box) : []);
        renderSheetColors(box ? boxColor(box) : TB_COLORS[boxes.length % TB_COLORS.length]);
        sDel.hidden = !box;
        sheet.hidden = false;
        if (!box) setTimeout(() => sLabel.focus({ preventScroll: true }), 60);
      }
      function closeSheet() { sheet.hidden = true; sLabel.blur(); }
      sheet.querySelectorAll("[data-tb-close]").forEach((el) => el.addEventListener("click", closeSheet));

      async function saveSheet() {
        const label = sLabel.value.trim() || "공부";
        let startT = sStart.value || "09:00";
        let endT = sEnd.value || "10:00";
        if (endT <= startT) {                    // 종료가 이르면 자동으로 1시간 뒤로
          const [h, m] = startT.split(":").map(Number);
          endT = `${String(Math.min(23, h + 1)).padStart(2, "0")}:${String(m).padStart(2, "0")}`;
        }
        const days = [...sDays.querySelectorAll(".tbe__day.is-on")].map((c) => Number(c.dataset.day));
        if (!days.length) { alert("요일을 하나 이상 선택해주세요."); return; }
        const colorEl = document.querySelector("#tbs-colors .tbs__c.is-on");
        const color = colorEl ? colorEl.dataset.c : null;
        if (editingBox) {
          await supabaseClient.from("timeboxes")
            .update({ label, start_time: startT, end_time: endT, days, color }).eq("id", editingBox.id);
        } else {
          await supabaseClient.from("timeboxes")
            .insert({ student_id: profile.id, label, start_time: startT, end_time: endT, days, color, sort: boxes.length });
        }
        closeSheet();
        await loadBoxes();
        refresh();
      }
      document.getElementById("tbs-save").addEventListener("click", saveSheet);
      sLabel.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.isComposing) { e.preventDefault(); saveSheet(); }
      });
      sDel.addEventListener("click", async () => {
        if (!editingBox || !confirm(`'${editingBox.label}' 블록을 삭제할까요?`)) return;
        await supabaseClient.from("timeboxes").delete().eq("id", editingBox.id);
        closeSheet();
        await loadBoxes();
        refresh();
      });

      document.getElementById("tbe-add").addEventListener("click", () => openSheet(null));

      /* ---------- 태블릿 좌측 패널: 지금/다음 · 주간 배분 · 블록 목록 ---------- */
      const sideNow = document.getElementById("tbside-now");
      const sideWeek = document.getElementById("tbside-week");
      const sideList = document.getElementById("tbside-list");
      function renderSide() {
        const nowD = new Date();
        const nowMin = nowD.getHours() * 60 + nowD.getMinutes();
        const todays = boxes.filter((b) => daysOf(b).includes(todayDow))
          .slice().sort((a, z) => toMin(a.start_time) - toMin(z.start_time));
        const cur = todays.find((b) => toMin(b.start_time) <= nowMin && nowMin < toMin(b.end_time));
        const nxt = todays.find((b) => toMin(b.start_time) > nowMin);
        const left = (m) => (m >= 60 ? `${Math.floor(m / 60)}시간${m % 60 ? ` ${m % 60}분` : ""}` : `${m}분`);

        let nowHtml = `<h3 class="tbside__h">지금</h3>`;
        if (cur) {
          nowHtml += `
            <div class="tbside__big"><i style="background:${boxColor(cur)}"></i>${esc(cur.label)}</div>
            <p class="tbside__sub">${t12(cur.end_time)}까지 · ${left(toMin(cur.end_time) - nowMin)} 남음</p>`;
        } else {
          nowHtml += `<div class="tbside__big tbside__big--free">빈 시간</div>`;
        }
        if (nxt) nowHtml += `<p class="tbside__next">다음 · ${esc(nxt.label)} · ${t12(nxt.start_time)} (${left(toMin(nxt.start_time) - nowMin)} 후)</p>`;
        else if (!cur) nowHtml += `<p class="tbside__next">오늘 남은 블록이 없어요</p>`;
        sideNow.innerHTML = nowHtml;

        const agg = new Map();
        boxes.forEach((b) => {
          const mins = (toMin(b.end_time) - toMin(b.start_time)) * daysOf(b).length;
          const a = agg.get(b.label) || { mins: 0, color: boxColor(b) };
          a.mins += mins;
          agg.set(b.label, a);
        });
        const hrs = (m) => { const h = m / 60; return Number.isInteger(h) ? `${h}시간` : `${h.toFixed(1)}시간`; };
        const rows = [...agg.entries()].sort((a, z) => z[1].mins - a[1].mins);
        sideWeek.innerHTML = `<h3 class="tbside__h">주간 배분</h3>` + (rows.length
          ? rows.map(([label, v]) =>
            `<div class="tbside__row"><i style="background:${v.color}"></i><span>${esc(label)}</span><b>${hrs(v.mins)}</b></div>`).join("")
          : `<p class="tbside__sub">블록을 추가하면 과목별 시간이 보여요</p>`);

        sideList.innerHTML = `<h3 class="tbside__h">블록</h3>` + (boxes.length
          ? boxes.map((b) => `
            <button type="button" class="tbside__blk" data-id="${b.id}">
              <i style="background:${boxColor(b)}"></i>
              <span><b>${esc(b.label)}</b><em>${t12(b.start_time)}–${t12(b.end_time)} · ${dayText(b)}</em></span>
            </button>`).join("")
          : `<p class="tbside__sub">아직 블록이 없어요</p>`);
        sideList.querySelectorAll(".tbside__blk").forEach((row) =>
          row.addEventListener("click", () => openSheet(boxes.find((x) => x.id === row.dataset.id) || null)));
      }

      /* 데이터 변경 후 현재 모드 화면 + 좌측 패널 갱신 (+블록 알림 재예약) */
      function refresh() {
        if (editing) renderEditor(); else renderView();
        renderSide();
        if (window.dtNotify && dtNotify.available && dtNotify.getSettings().timebox) dtNotify.resync(profile);
      }

      /* ---------- 날씨 (현재 위치: GPS → IP 폴백) ---------- */
      const WX_TEXT = [
        [0, "맑음", "☀️"], [1, "대체로 맑음", "🌤️"], [2, "구름 조금", "⛅"], [3, "흐림", "☁️"],
        [48, "안개", "🌫️"], [57, "이슬비", "🌦️"], [67, "비", "🌧️"], [77, "눈", "🌨️"],
        [82, "소나기", "🌦️"], [86, "소낙눈", "🌨️"], [99, "뇌우", "⛈️"],
      ];
      const wxOf = (code) => WX_TEXT.find(([max]) => code <= max) || [0, "—", "🌡️"];

      async function ipPos() {
        const g = await fetch("https://get.geojs.io/v1/ip/geo.json").then((r) => r.json());
        return { lat: +g.latitude, lon: +g.longitude, label: g.city || "" };
      }
      function getPos() {
        return new Promise((resolve, reject) => {
          let done = false;
          const finish = (v) => { if (!done) { done = true; resolve(v); } };
          const fallback = () => ipPos().then(finish).catch((e) => { if (!done) { done = true; reject(e); } });
          if (!navigator.geolocation) return fallback();
          navigator.geolocation.getCurrentPosition(
            (p) => finish({ lat: p.coords.latitude, lon: p.coords.longitude }),
            fallback,
            { timeout: 4000, maximumAge: 600000 }
          );
          setTimeout(() => { if (!done) fallback(); }, 5000);   // 권한 프롬프트 방치 대비
        });
      }
      async function renderWeather() {
        const el = document.getElementById("tbside-wx");
        if (!el) return;
        try {
          const pos = await getPos();
          const wx = await fetch(
            `https://api.open-meteo.com/v1/forecast?latitude=${pos.lat}&longitude=${pos.lon}` +
            `&current=temperature_2m,weather_code&daily=temperature_2m_max,temperature_2m_min,precipitation_probability_max` +
            `&timezone=auto&forecast_days=1`).then((r) => r.json());
          let label = pos.label;
          if (!label) {
            try {
              const geo = await fetch(`https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${pos.lat}&longitude=${pos.lon}&localityLanguage=ko`).then((r) => r.json());
              label = geo.city || geo.locality || "";
            } catch (e) { /* 지역명 없이 표시 */ }
          }
          const [, txt, icon] = wxOf(wx.current.weather_code);
          const d = wx.daily;
          el.innerHTML = `
            <h3 class="tbside__h">날씨${label ? ` · ${esc(label)}` : ""}</h3>
            <div class="tbside__wx">
              <span class="tbside__wxi">${icon}</span>
              <div class="tbside__wxt"><b>${Math.round(wx.current.temperature_2m)}°</b><em>${txt}</em></div>
            </div>
            <p class="tbside__sub">최고 ${Math.round(d.temperature_2m_max[0])}° · 최저 ${Math.round(d.temperature_2m_min[0])}°${d.precipitation_probability_max[0] != null ? ` · 강수 ${d.precipitation_probability_max[0]}%` : ""}</p>`;
          el.hidden = false;
        } catch (e) { el.hidden = true; }
      }

      /* ---------- 보기/편집 전환 ---------- */
      let editing = false;
      function setMode(edit) {
        editing = edit;
        viewEl.hidden = edit;
        editorEl.hidden = !edit;
        modeBtn.innerHTML = edit
          ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>'
          : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>';
        document.getElementById("tb-vm").style.visibility = edit ? "hidden" : "";
        document.getElementById("tb-back").style.visibility = edit ? "" : "hidden";
        document.getElementById("tb-title").textContent = edit ? "시간표 편집" : "타임박스";
        if (edit) renderEditor(); else renderView();
      }
      modeBtn.addEventListener("click", () => setMode(!editing));
      document.getElementById("tb-back").addEventListener("click", () => { if (editing) setMode(false); });

      await loadBoxes();
      if (!boxes.length) setMode(true);   // 처음이면 바로 편집으로
      else renderView();
      renderSide();
      setInterval(renderSide, 60000);     // 남은 시간 카운트다운 갱신
      renderWeather();
      setInterval(renderWeather, 30 * 60000);   // 날씨 30분마다 갱신
    });
  </script>
</body>
</html>
