<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />

<body class="app-bg has-tabbar">

    <div class="topbar__right">
      <button type="button" class="btn btn--ghost btn--sm" id="tb-mode">편집</button>
    </div>
  </header>

  <main class="container">
    <!-- 보기: 오늘의 세로 시간축 그리드 (블록 탭 = 완료 체크) -->
    <section class="card" id="tb-view">
      <div id="tb-grid"><p class="muted" style="text-align:center;margin:16px 0;">불러오는 중...</p></div>
    </section>

    <!-- 편집: 블록 추가/수정/요일 -->
    <section class="card" id="tb-editor" hidden>
      <p class="tbe__hint" style="margin-top:2px;">시간·이름·요일을 바꾸면 바로 저장돼요.</p>
      <div id="tbe-list"></div>
      <button type="button" class="gtodo__addbtn" id="tbe-add">＋ 블록 추가</button>
    </section>
  </main>

  <nav class="tabbar">

      <span>캘린더</span>

      <span>메모</span>

      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .34 1.87l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.7 1.7 0 0 0-1.87-.34 1.7 1.7 0 0 0-1 1.55V21a2 2 0 1 1-4 0v-.09a1.7 1.7 0 0 0-1-1.55 1.7 1.7 0 0 0-1.87.34l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.7 1.7 0 0 0 .34-1.87 1.7 1.7 0 0 0-1.55-1H3a2 2 0 1 1 0-4h.09a1.7 1.7 0 0 0 1.55-1 1.7 1.7 0 0 0-.34-1.87l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.7 1.7 0 0 0 1.87.34h.09a1.7 1.7 0 0 0 1-1.55V3a2 2 0 1 1 4 0v.09a1.7 1.7 0 0 0 1 1.55 1.7 1.7 0 0 0 1.87-.34l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.7 1.7 0 0 0-.34 1.87v.09a1.7 1.7 0 0 0 1.55 1H21a2 2 0 1 1 0 4h-.09a1.7 1.7 0 0 0-1.55 1z"/></svg>

  <script src="/js/vendor/supabase.js"></script>
  <script src="/js/supabaseClient.js?v=mock12"></script>
  <script src="/js/utils.js?v=30"></script>
  <script>
    /* 타임박스 페이지 — 보기(그리드·체크) / 편집(블록·요일) 전환 */
    document.addEventListener("DOMContentLoaded", async () => {
      const profile = await requireRole(["student"]);
      if (!profile) return;

      const esc = (s) => String(s ?? "").replace(/[&<>"']/g, (c) =>
        ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
      const toMin = (t) => { const [h, m] = t.split(":").map(Number); return h * 60 + m; };
      const today = getTodayString();
      const gridEl = document.getElementById("tb-grid");
      const viewEl = document.getElementById("tb-view");
      const editorEl = document.getElementById("tb-editor");
      const modeBtn = document.getElementById("tb-mode");
      const listEl = document.getElementById("tbe-list");
      let boxes = [];
      let doneSet = new Set();

      async function loadBoxes() {
        const [{ data: bs }, { data: checks }] = await Promise.all([
          supabaseClient.from("timeboxes").select("*")
            .eq("student_id", profile.id).order("start_time"),
          supabaseClient.from("timebox_checks").select("box_id, done")
            .eq("student_id", profile.id).eq("date", today),
        ]);
        boxes = bs || [];
        doneSet = new Set((checks || []).filter((c) => c.done).map((c) => c.box_id));
      }

      /* ---------- 보기: 세로 시간축 그리드 ---------- */
      function renderView() {
        const dow = (new Date().getDay() + 6) % 7;   // 월=0
        const todays = boxes.filter((b) =>
          !Array.isArray(b.days) || !b.days.length || b.days.includes(dow));
        if (!todays.length) {
          gridEl.innerHTML = `<p class="muted" style="text-align:center;margin:18px 0;">오늘 표시할 블록이 없어요.<br/>오른쪽 위 편집에서 시간표를 만들어보세요.</p>`;
          return;
        }
        const PX = 56;
        const nowMin = new Date().getHours() * 60 + new Date().getMinutes();
        const gs = Math.floor(Math.min(...todays.map((b) => toMin(b.start_time))) / 60) * 60;
        const ge = Math.ceil(Math.max(...todays.map((b) => toMin(b.end_time))) / 60) * 60;
        const y = (min) => ((min - gs) / 60) * PX;

        let html = "";
        for (let m = gs; m <= ge; m += 60) {
          html += `<div class="tgrid__hour" style="top:${y(m)}px"><span>${String(m / 60).padStart(2, "0")}</span></div>`;
          if (m < ge) html += `<div class="tgrid__half" style="top:${y(m + 30)}px"></div>`;
        }
        html += todays.map((b) => {
          const s = toMin(b.start_time), e = toMin(b.end_time);
          const cur = nowMin >= s && nowMin < e;
          const on = doneSet.has(b.id);
          const h = Math.max(22, y(e) - y(s) - 2);
          const slim = h < 40;
          return `
          <button type="button" class="tgrid__block${cur ? " is-now" : ""}${on ? " is-done" : ""}${slim ? " tgrid__block--slim" : ""}"
                  data-box="${b.id}" style="top:${y(s) + 1}px; height:${h}px">
            ${slim ? "" : `<span class="tgrid__time">${b.start_time.slice(0, 5)}–${b.end_time.slice(0, 5)}</span>`}
            <span class="tgrid__label">${on ? "✓ " : ""}${esc(b.label)}</span>
          </button>`;
        }).join("");
        if (nowMin >= gs && nowMin <= ge) {
          html += `<div class="tgrid__now" style="top:${y(nowMin)}px"></div>`;
        }
        gridEl.innerHTML = `<div class="tgrid" style="height:${((ge - gs) / 60) * PX + 14}px">${html}</div>`;

        gridEl.querySelectorAll("[data-box]").forEach((el) => {
          el.addEventListener("click", async () => {
            const id = el.dataset.box;
            const next = !doneSet.has(id);
            if (next) doneSet.add(id); else doneSet.delete(id);
            renderView();
            await supabaseClient.from("timebox_checks").upsert({
              student_id: profile.id, box_id: id, date: today, done: next,
            });
          });
        });
      }

      /* ---------- 편집 ---------- */
      function renderEditor() {
        if (!boxes.length) {
          listEl.innerHTML = `<p class="muted" style="text-align:center;margin:14px 0;">아직 블록이 없어요.<br/>＋ 블록 추가로 시간표를 만들어보세요.</p>`;
          return;
        }
        const DOWS = ["월", "화", "수", "목", "금", "토", "일"];
        const daysOf = (b) => Array.isArray(b.days) && b.days.length ? b.days : [0, 1, 2, 3, 4, 5, 6];
        listEl.innerHTML = boxes.map((b) => `
          <div class="tbe__item" data-id="${b.id}">
            <div class="tbe__row">
              <input type="time" class="field__input tbe__start" value="${b.start_time.slice(0, 5)}" />
              <input type="time" class="field__input tbe__end" value="${b.end_time.slice(0, 5)}" />
              <input type="text" class="field__input tbe__label" value="${esc(b.label)}" maxlength="30" placeholder="할 일" />
              <button type="button" class="tbe__del" aria-label="삭제">✕</button>
            </div>
            <div class="tbe__days">${DOWS.map((d, i) =>
              `<button type="button" class="tbe__day${daysOf(b).includes(i) ? " is-on" : ""}" data-day="${i}">${d}</button>`).join("")}</div>
          </div>`).join("");

        listEl.querySelectorAll(".tbe__item").forEach((row) => {
          const id = row.dataset.id;
          const commit = async () => {
            const start = row.querySelector(".tbe__start").value || "09:00";
            const end = row.querySelector(".tbe__end").value || "10:00";
            const label = row.querySelector(".tbe__label").value.trim() || "공부";
            const days = [...row.querySelectorAll(".tbe__day.is-on")].map((c) => Number(c.dataset.day));
            await supabaseClient.from("timeboxes")
              .update({ start_time: start, end_time: end, label, days }).eq("id", id);
            const b = boxes.find((x) => x.id === id);
            if (b) { b.start_time = start; b.end_time = end; b.label = label; b.days = days; }
            boxes.sort((a, bb) => a.start_time.localeCompare(bb.start_time));
          };
          row.querySelectorAll("input").forEach((inp) => {
            inp.addEventListener("change", commit);
            inp.addEventListener("blur", commit);
          });
          row.querySelectorAll(".tbe__day").forEach((chip) => {
            chip.addEventListener("click", () => { chip.classList.toggle("is-on"); commit(); });
          });
          row.querySelector(".tbe__label").addEventListener("keydown", (e) => {
            if (e.key === "Enter" && !e.isComposing) { e.preventDefault(); e.target.blur(); }
          });
          row.querySelector(".tbe__del").addEventListener("click", async () => {
            await supabaseClient.from("timeboxes").delete().eq("id", id);
            boxes = boxes.filter((x) => x.id !== id);
            renderEditor();
          });
        });
      }

      document.getElementById("tbe-add").addEventListener("click", async () => {
        const last = boxes[boxes.length - 1];
        const start = last ? last.end_time.slice(0, 5) : "09:00";
        const [h, m] = start.split(":").map(Number);
        const end = `${String(Math.min(23, h + 1)).padStart(2, "0")}:${String(m).padStart(2, "0")}`;
        const { data } = await supabaseClient.from("timeboxes")
          .insert({ student_id: profile.id, label: "공부", start_time: start, end_time: end, sort: boxes.length, days: [0, 1, 2, 3, 4, 5, 6] })
          .select().single();
        if (data) {
          boxes.push(data);
          boxes.sort((a, b) => a.start_time.localeCompare(b.start_time));
          renderEditor();
        }
      });

      /* ---------- 보기/편집 전환 ---------- */
      let editing = false;
      function setMode(edit) {
        editing = edit;
        viewEl.hidden = edit;
        editorEl.hidden = !edit;
        modeBtn.textContent = edit ? "완료" : "편집";
        if (edit) renderEditor(); else renderView();
      }
      modeBtn.addEventListener("click", () => setMode(!editing));

      await loadBoxes();
      if (!boxes.length) setMode(true);   // 처음이면 바로 편집으로
      else renderView();
    });
  </script>
</body>
</html>
