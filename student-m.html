<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
  <title>오늘 · 디턴로그</title>
  <link rel="stylesheet" href="/css/style.css?v=79" />
  <script src="/js/vendor/supabase.js"></script>
</head>
<body class="app-bg has-tabbar">
  <!-- 태블릿/PC는 위젯 대시보드(student.html)로 — 이 파일은 모바일 전용 -->
  <script>
    if (window.matchMedia("(min-width: 601px)").matches) window.location.replace("/student.html");
  </script>

  <!-- 로딩 스플래시 -->
  <div id="app-loader" class="app-loader" role="status" aria-label="불러오는 중">
    <script>window.__loaderStart = Date.now();</script>
    <div class="app-loader__inner">
      <div class="app-loader__brand">디턴로그</div>
      <div class="app-loader__spinner"></div>
    </div>
  </div>

  <main class="container">
    <!-- 헤더: D-Day 칩(좌) + 날짜(중앙) -->
    <div class="mhead">
      <span class="mhead__dday">수능 <b id="dday">D-—</b></span>
      <span class="mhead__date" id="today-date">오늘</span>
    </div>

    <!-- student.js 호환용 (모바일에선 미표시) -->
    <span id="student-name" hidden></span>
    <div id="daily-quote" hidden></div>

    <!-- 체크아웃 완료 후 오늘 결과 요약 -->
    <div class="result-strip" id="result-strip" hidden></div>

    <!-- 오늘의 흐름 -->
    <section class="flow">
      <div class="flow__steps">
        <a href="/checkin.html" class="flow-card" id="act-checkin">
          <span class="flow-card__tag flow-card__tag--am">체크인</span>
          <span class="flow-card__title">오늘 플랜</span>
          <span class="flow-card__meta" id="checkin-meta">아직 작성 전 · 지금 입력</span>
        </a>

        <a href="/checkout.html" class="flow-card" id="act-checkout">
          <span class="flow-card__tag flow-card__tag--pm">체크아웃</span>
          <span class="flow-card__title">오늘 성과</span>
          <span class="flow-card__meta" id="checkout-meta">플랜 입력 후 가능</span>
        </a>
      </div>
    </section>

    <!-- 주간 메뉴 -->
    <section class="action-grid action-grid--secondary">
      <a href="/weekly-goal.html" class="action" id="act-weekly-goal">
        <img class="action__icon" src="/assets/icon/%EB%AA%A9%ED%91%9C.png" alt="" />
        <span class="action__title">이번 주 목표</span>
        <span class="action__desc">월요일에 주간 목표를 정합니다</span>
      </a>

      <a href="/weekly-review.html" class="action" id="act-weekly-review">
        <img class="action__icon" src="/assets/icon/icon-calendar-subscription.svg" alt="" />
        <span class="action__title">주간 회고</span>
        <span class="action__desc">금요일에 한 주를 돌아봅니다</span>
      </a>
    </section>
  </main>

  <nav class="tabbar">
    <a href="/student-m.html" class="tabbar__item is-active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V21h14V9.5"/></svg>
      <span>홈</span>
    </a>
    <a href="/todo.html" class="tabbar__item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3 8-8"/><path d="M20 12v6a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h9"/></svg>
      <span>할 일</span>
    </a>
    <a href="/calendar.html" class="tabbar__item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M8 3v4M16 3v4M3 10h18"/></svg>
      <span>캘린더</span>
    </a>
    <a href="/my-history.html" class="tabbar__item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20V10"/><path d="M12 20V4"/><path d="M20 20v-7"/></svg>
      <span>기록</span>
    </a>
    <a href="/settings.html" class="tabbar__item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .34 1.87l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.7 1.7 0 0 0-1.87-.34 1.7 1.7 0 0 0-1 1.55V21a2 2 0 1 1-4 0v-.09a1.7 1.7 0 0 0-1-1.55 1.7 1.7 0 0 0-1.87.34l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.7 1.7 0 0 0 .34-1.87 1.7 1.7 0 0 0-1.55-1H3a2 2 0 1 1 0-4h.09a1.7 1.7 0 0 0 1.55-1 1.7 1.7 0 0 0-.34-1.87l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.7 1.7 0 0 0 1.87.34h.09a1.7 1.7 0 0 0 1-1.55V3a2 2 0 1 1 4 0v.09a1.7 1.7 0 0 0 1 1.55 1.7 1.7 0 0 0 1.87-.34l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.7 1.7 0 0 0-.34 1.87v.09a1.7 1.7 0 0 0 1.55 1H21a2 2 0 1 1 0 4h-.09a1.7 1.7 0 0 0-1.55 1z"/></svg>
      <span>설정</span>
    </a>
  </nav>

  <script src="/js/supabaseClient.js?v=mock9"></script>
  <script src="/js/utils.js?v=14"></script>
  <script src="/js/student.js?v=28"></script>
</body>
</html>
