<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
  <title>오늘 · 디턴로그</title>
  <link rel="stylesheet" href="/css/style.css?v=105" />

<body class="app-bg has-tabbar">
  <!-- 태블릿/PC는 위젯 대시보드(student.html)로 — 이 파일은 모바일 전용 -->
  <script>
    if (window.matchMedia("(min-width: 601px)").matches) window.location.replace("/student.html");
  </script>

  <!-- 로딩 스플래시 -->
  <div id="app-loader" class="app-loader" role="status" aria-label="불러오는 중">
    <script>window.__loaderStart = Date.now();</script>
    <div class="app-loader__inner">
      <div class="app-loader__brand">디턴로그</div>
      <div class="app-loader__spinner"></div>
    </div>
  </div>

  <main class="container">
    <!-- 헤더: 날짜(좌) + D-Day(우) -->
    <div class="mhead">
      <span class="mhead__date" id="m-date">오늘</span>
      <span class="mhead__dday">수능 <b id="m-dday">D-—</b></span>
    </div>

    <!-- 오늘 카드: 상태에 따라 플랜 CTA / 과제 체크 리스트 / 결과 요약 -->
    <section class="card mtoday" id="mtoday">
      <p class="mtoday__loading">불러오는 중…</p>
    </section>

    <!-- 스탯 한 줄: 스트릭 · 이번 주 기록 -->
    <p class="mstat" id="mstat" hidden></p>

    <!-- 오늘 일정 (Apple 캘린더) -->
    <section class="mevents" id="mevents" hidden>
      <p class="msection-title">오늘 일정</p>
      <div id="mevents-list"></div>
    </section>

    <!-- 주간 메뉴 (작은 행) -->
    <section class="card mrows">
      <a href="/weekly-goal.html" class="mrow" id="mrow-goal">
        <span>이번 주 목표 <span class="mrow__badge" hidden>오늘</span></span>
        <span class="mrow__chevron" aria-hidden="true">›</span>
      </a>
      <a href="/weekly-review.html" class="mrow" id="mrow-review">
        <span>주간 회고 <span class="mrow__badge" hidden>오늘</span></span>
        <span class="mrow__chevron" aria-hidden="true">›</span>
      </a>
    </section>
  </main>
