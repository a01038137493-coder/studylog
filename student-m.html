<body class="app-bg has-tabbar">
  <script>
    /* 일반 사용자면 대시보드를 그리기 전에 즉시 일반 홈으로 (수험생 홈 깜빡임 방지) */
    try {
      var __p = JSON.parse(localStorage.getItem("dt_profile_cache") || "null");
      if (__p && __p.user_type === "general") {
        location.replace(window.matchMedia("(max-width: 600px)").matches ? "/general-m.html" : "/general.html");
      }
    } catch (e) {}
  </script>

  <!-- 태블릿/PC는 위젯 대시보드(student.html)로 — 이 파일은 모바일 전용 -->
  <script>
    if (window.matchMedia("(min-width: 601px)").matches) window.location.replace("/student.html");
  </script>


  <main class="container">
    <!-- 헤더: 날짜(좌) + D-Day(우) -->
    <div class="mhead">
      <span class="mhead__date" id="m-date">오늘</span>
      <span class="mhead__dday">수능 <b id="m-dday">D-—</b></span>
    </div>

    <!-- 오늘 카드: 상태에 따라 플랜 CTA / 과제 체크 리스트 / 결과 요약 -->
    <section class="card mtoday" id="mtoday">
      <p class="mtoday__loading">불러오는 중…</p>
    </section>

    <!-- 스탯 한 줄: 스트릭 · 이번 주 기록 -->
    <p class="mstat" id="mstat" hidden></p>

    <!-- 오늘 일정 (Apple 캘린더) -->
    <!-- 타임박스: 매일 반복 시간표 (블록이 있을 때만 표시) -->
    <section class="card tbox" id="tbox" hidden>
      <div class="tbox__head">타임박스 <a href="/timebox.html">편집</a></div>
      <div id="tbox-list"></div>
    </section>


    <!-- 주간 메뉴 (작은 행) -->
    <section class="card mrows">
      <a href="/weekly-goal.html" class="mrow" id="mrow-goal">
        <span>이번 주 목표 <span class="mrow__badge" hidden>오늘</span></span>
        <span class="mrow__chevron" aria-hidden="true">›</span>
      </a>
      <a href="/weekly-review.html" class="mrow" id="mrow-review">
        <span>주간 회고 <span class="mrow__badge" hidden>오늘</span></span>
        <span class="mrow__chevron" aria-hidden="true">›</span>
      </a>
    </section>
  </main>

  <div class="fabmenu" id="fabmenu">
    <div class="fabmenu__backdrop" hidden></div>
    <div class="fabmenu__items" hidden>
      <a href="/checkin.html" class="fabmenu__item"><span>핵심과제 수정</span><i>✓</i></a>
      <a href="/timebox.html" class="fabmenu__item"><span>타임박스</span><i>⏱</i></a>
      <a href="/memo-edit.html" class="fabmenu__item"><span>메모 추가</span><i>✏️</i></a>
      <a href="/files.html?upload=1" class="fabmenu__item"><span>파일 업로드</span><i>📁</i></a>
    </div>
    <button type="button" class="fab" id="fab-toggle" aria-label="빠른 추가">＋</button>
  </div>

  <script>
    (function () {
      const menu = document.getElementById("fabmenu");
      const toggle = document.getElementById("fab-toggle");
      const items = menu.querySelector(".fabmenu__items");
      const back = menu.querySelector(".fabmenu__backdrop");
      function set(open) {
        menu.classList.toggle("is-open", open);
        items.hidden = !open;
        back.hidden = !open;
      }
      toggle.addEventListener("click", () => set(!menu.classList.contains("is-open")));
      back.addEventListener("click", () => set(false));
    })();
  </script>
