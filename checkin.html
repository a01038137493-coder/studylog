<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <title>오늘 플랜 만들기 · 핀로그</title>
  <link rel="stylesheet" href="/css/style.css?v=136" />
</head>
<body class="app-bg has-tabbar">
  <header class="topbar">
    <a href="/student.html" class="btn btn--ghost btn--sm">← 돌아가기</a>
    <div class="topbar__brand">오늘 플랜 만들기</div>
    <span></span>
  </header>

  <main class="container wizard">
    <div class="wizard__progress" id="wizard-progress">
      <span class="wstep is-active" data-step="1"></span>
      <span class="wstep" data-step="2"></span>
    </div>
    <p id="edit-note" class="edit-note" hidden>오늘 플랜이 이미 저장되어 있어요. 수정하면 업데이트됩니다.</p>

    <!-- STEP 1 — 오늘 꼭 끝낼 것 -->
    <section class="wpanel" id="panel-1">
      <h1 class="wpanel__q">오늘 꼭 끝낼 것</h1>
      <p class="wpanel__sub">공부시간은 정해져 있습니다. 오늘 남길 결과물을 정하세요.</p>

      <div id="task-cards"></div>
      <button type="button" class="btn btn--outline btn--block" id="add-task">+ 핵심 과제 추가</button>
    </section>

    <!-- STEP 2 — 오늘 조심할 것 -->
    <section class="wpanel" id="panel-2" hidden>
      <h1 class="wpanel__q">오늘 조심할 것</h1>
      <p class="wpanel__sub">오늘 무너질 수 있는 지점을 미리 확인합니다.</p>

      <span class="field__label">컨디션 (1~10)</span>
      <div class="cond-slider" data-level="mid" style="--cond-pct:55.55%;">
        <div class="cond-slider__readout">
          <span class="cond-slider__face" id="cond-face" aria-hidden="true">🙂</span>
          <span class="cond-slider__readtext">
            <span class="cond-slider__valrow">
              <span class="cond-slider__val" id="cond-val">6</span>
              <span class="cond-slider__unit">/ 10</span>
            </span>
            <span class="cond-slider__word" id="cond-word">보통</span>
          </span>
        </div>
        <div class="cond-slider__track">
          <input type="range" min="1" max="10" step="1" value="6" id="condition_range" class="cond-range"
                 aria-label="컨디션 점수 (1에서 10까지)" aria-valuetext="6점 보통" />
          <div class="cond-slider__ticks" id="cond-ticks" aria-hidden="true">
            <span></span><span></span><span></span><span></span><span></span>
            <span></span><span></span><span></span><span></span><span></span>
          </div>
        </div>
        <div class="cond-slider__scale" aria-hidden="true"><span>나쁨</span><span>좋음</span></div>
      </div>
      <p id="cond-low-notice" class="cond-low-notice" hidden>
        오늘은 컨디션이 낮습니다. 목표를 많이 적기보다 핵심 과제 완료를 우선하세요.
      </p>

      <span class="field__label" style="margin-top:22px;">오늘 위험 요소 <span class="field-hint-inline">여러 개 선택 가능</span></span>
      <div class="chip-group" id="risk-chips"></div>
      <input type="text" id="risk_custom" class="field__input field__input--mt" placeholder="직접 입력" hidden />
    </section>

    <!-- ============ 완료 화면 ============ -->
    <section class="wdone" id="panel-done" hidden>
      <div class="wdone__check">✓</div>
      <h1 class="wdone__title">오늘 플랜이 저장되었습니다.</h1>

      <div class="wdone__summary" id="done-summary"></div>
      <p class="wdone__advice" id="done-advice"></p>

      <p class="wdone__note">퇴실 전 오늘 성과를 기록해주세요.</p>
      <a href="/student.html" class="btn btn--primary btn--block btn--lg">홈으로 가기</a>
    </section>

    <!-- 하단 네비 -->
    <div class="wnav" id="wnav">
      <button type="button" class="btn btn--outline" id="nav-prev" hidden>이전</button>
      <button type="button" class="btn btn--primary btn--lg" id="nav-next">다음</button>
    </div>
  </main>

  <!-- 내부 저장용 숨은 필드 (시간은 학원 고정값, 학생에겐 비노출) -->
  <input type="hidden" id="planned_total_hours" />
  <input type="hidden" id="planned_korean_hours" />
  <input type="hidden" id="planned_math_hours" />
  <input type="hidden" id="planned_english_hours" />
  <input type="hidden" id="planned_inquiry1_hours" />
  <input type="hidden" id="planned_inquiry2_hours" />
  <input type="hidden" id="condition_score" value="6" />

  <nav class="tabbar">
    <a href="/student.html" class="tabbar__item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V21h14V9.5"/></svg>
      <span>홈</span>
    </a>
    <a href="/calendar.html" class="tabbar__item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M8 3v4M16 3v4M3 10h18"/></svg>
      <span>캘린더</span>
    </a>
    <a href="/memo.html" class="tabbar__item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 3h9l5 5v13a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1z"/><path d="M14 3v6h5M8 13h8M8 17h5"/></svg>
      <span>메모</span>
    </a>
    <a href="/files.html" class="tabbar__item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
      <span>파일</span>
    </a>
    <a href="/settings.html" class="tabbar__item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .34 1.87l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.7 1.7 0 0 0-1.87-.34 1.7 1.7 0 0 0-1 1.55V21a2 2 0 1 1-4 0v-.09a1.7 1.7 0 0 0-1-1.55 1.7 1.7 0 0 0-1.87.34l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.7 1.7 0 0 0 .34-1.87 1.7 1.7 0 0 0-1.55-1H3a2 2 0 1 1 0-4h.09a1.7 1.7 0 0 0 1.55-1 1.7 1.7 0 0 0-.34-1.87l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.7 1.7 0 0 0 1.87.34h.09a1.7 1.7 0 0 0 1-1.55V3a2 2 0 1 1 4 0v.09a1.7 1.7 0 0 0 1 1.55 1.7 1.7 0 0 0 1.87-.34l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.7 1.7 0 0 0-.34 1.87v.09a1.7 1.7 0 0 0 1.55 1H21a2 2 0 1 1 0 4h-.09a1.7 1.7 0 0 0-1.55 1z"/></svg>
      <span>설정</span>
    </a>
  </nav>

  <script src="/js/vendor/supabase.js"></script>
  <script src="/js/supabaseClient.js?v=mock12"></script>
  <script src="/js/utils.js?v=26"></script>
  <script src="/js/checkin.js?v=18"></script>
</body>
</html>
