<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
  <title>로그인 · 핀로그</title>
  <link rel="stylesheet" href="/css/style.css?v=174" />
  <style>
    /* 데모(목업) 로그인 영역 — 목업 모드일 때만 표시 */
    .demo-login { margin-top: 18px; }
    .demo-login__divider { display: flex; align-items: center; gap: 10px; color: var(--muted, #8a93a6); font-size: 0.8rem; margin: 4px 0 12px; }
    .demo-login__divider::before, .demo-login__divider::after { content: ""; flex: 1; height: 1px; background: rgba(0, 0, 0, 0.1); }
    .demo-login__hint { text-align: center; font-size: 0.82rem; color: var(--muted, #8a93a6); margin: 0 0 10px; }
    .demo-login .btn + .btn { margin-top: 8px; }
    #login-form button[type=submit] { margin-top: 26px; }
  </style>
</head>
<body class="center-screen">
  <button type="button" class="auth-back" aria-label="뒤로 가기"
          onclick="if (history.length > 1) history.back(); else location.href='/welcome.html'">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M15 5l-7 7 7 7"/></svg>
  </button>

  <div class="auth-split">
  <aside class="auth-brand" aria-hidden="true">
    <div class="auth-brand__inner">
      <img src="/assets/logo.png" alt="" class="auth-brand__logo" onerror="this.style.display='none'" />
      <p class="auth-brand__title">핀로그</p>
      <p class="auth-brand__subtitle">매일 목표를 세우고,<br />실제 성과를 기록하고,<br />누적 데이터를 기반으로 관리합니다.</p>
    </div>
  </aside>
  <main class="auth-card auth-card--brandled">
    <form id="login-form" class="form" autocomplete="on">
      <label class="field">
        <span class="field__label">이메일</span>
        <input type="email" id="email" class="field__input" placeholder="이메일" required autocomplete="email" />
      </label>

      <label class="field">
        <span class="field__label">비밀번호</span>
        <input type="password" id="password" class="field__input" placeholder="비밀번호" required autocomplete="current-password" />
      </label>

      <p id="login-error" class="form__error" role="alert"></p>

      <button type="submit" class="btn btn--primary btn--block btn--lg">로그인</button>
    </form>

    <div class="auth-divider">또는 간편하게 시작하기</div>

    <button type="button" class="btn btn--social btn--kakao btn--block btn--lg" onclick="signInWithProvider('kakao')">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M12 3C6.48 3 2 6.54 2 10.9c0 2.8 1.86 5.26 4.66 6.65-.15.52-.97 3.36-1 3.58 0 0-.02.17.09.24.11.07.24.02.24.02.32-.04 3.66-2.4 4.24-2.81.57.08 1.16.13 1.77.13 5.52 0 10-3.54 10-7.9S17.52 3 12 3z"/></svg>
      카카오로 시작하기
    </button>
    <button type="button" class="btn btn--social btn--google btn--block btn--lg" onclick="signInWithProvider('google')">
      <svg viewBox="0 0 18 18" aria-hidden="true"><path fill="#4285F4" d="M17.64 9.2c0-.64-.06-1.25-.16-1.84H9v3.48h4.84a4.14 4.14 0 0 1-1.8 2.72v2.26h2.92c1.7-1.57 2.68-3.88 2.68-6.62z"/><path fill="#34A853" d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.92-2.26c-.8.54-1.84.86-3.04.86-2.34 0-4.32-1.58-5.03-3.7H.96v2.33A9 9 0 0 0 9 18z"/><path fill="#FBBC05" d="M3.97 10.72a5.41 5.41 0 0 1 0-3.44V4.95H.96a9 9 0 0 0 0 8.1l3.01-2.33z"/><path fill="#EA4335" d="M9 3.58c1.32 0 2.5.45 3.44 1.35l2.58-2.59A9 9 0 0 0 .96 4.95l3.01 2.33C4.68 5.16 6.66 3.58 9 3.58z"/></svg>
      Google로 시작하기
    </button>

    <p class="auth-alt">아직 계정이 없나요? <a href="/signup.html">이메일로 회원가입</a></p>
  </main>
  </div>

  <script src="/js/vendor/supabase.js"></script>
  <script src="/js/supabaseClient.js?v=mock12"></script>
  <script src="/js/auth.js?v=2"></script>
</body>
</html>
