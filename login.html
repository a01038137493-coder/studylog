<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
  <title>로그인 · 스터디로그</title>
  <link rel="stylesheet" href="/css/style.css?v=19" />
  <script src="/js/vendor/supabase.js"></script>
  <style>
    /* 데모(목업) 로그인 영역 — 목업 모드일 때만 표시 */
    .demo-login { margin-top: 18px; }
    .demo-login__divider { display: flex; align-items: center; gap: 10px; color: var(--muted, #8a93a6); font-size: 0.8rem; margin: 4px 0 12px; }
    .demo-login__divider::before, .demo-login__divider::after { content: ""; flex: 1; height: 1px; background: rgba(0, 0, 0, 0.1); }
    .demo-login__hint { text-align: center; font-size: 0.82rem; color: var(--muted, #8a93a6); margin: 0 0 10px; }
    .demo-login .btn + .btn { margin-top: 8px; }
  </style>
</head>
<body class="center-screen">
  <main class="auth-card">
    <img src="/assets/logo.svg" alt="스터디로그" class="auth-card__logo" onerror="this.style.display='none'" />
    <h1 class="auth-card__title">스터디로그</h1>
    <p class="auth-card__subtitle">매일 목표를 세우고, 실제 성과를 기록하고,<br />누적 데이터를 기반으로 관리합니다.</p>

    <form id="login-form" class="form" autocomplete="on">
      <label class="field">
        <span class="field__label">이메일</span>
        <input type="email" id="email" class="field__input" placeholder="example@ditton.com" required />
      </label>

      <label class="field">
        <span class="field__label">비밀번호</span>
        <input type="password" id="password" class="field__input" placeholder="비밀번호" required />
      </label>

      <p id="login-error" class="form__error" role="alert"></p>

      <button type="submit" class="btn btn--primary btn--block btn--lg">로그인</button>
    </form>
  </main>

  <script src="/js/supabaseClient.js?v=mock6"></script>
  <script src="/js/auth.js?v=2"></script>
</body>
</html>
