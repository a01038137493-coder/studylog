<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
  <title>오늘 · 핀로그</title>
  <link rel="icon" type="image/png" href="/assets/logo.png" />
  <link rel="apple-touch-icon" href="/assets/logo.png" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#f04438" />
  <script>if (!window.Capacitor) document.documentElement.classList.add("dt-web");</script>
  <link rel="stylesheet" href="/css/style.css?v=197" />
</head>
<body class="app-bg has-tabbar" data-kbresize="none">
  <!-- 일반 사용자 전용 태블릿/PC 홈 (모바일은 general-m.html, 수험생은 student.html) -->
  <script>
    if (window.matchMedia("(max-width: 600px)").matches) window.location.replace("/general-m.html");
  </script>


  <main class="container home-wide">
    <!-- 헤더: 상시 시계 + 날짜(좌), 목표 D-Day(우, 설정 시에만) -->
    <div class="mhead gtab-head">
      <div>
        <div class="gtab-clock" id="g-clock">--:--</div>
        <span class="mhead__date" id="g-date">오늘</span>
      </div>
      <span class="mhead__dday" id="g-dday" hidden></span>
    </div>

    <div class="gtab-grid">
      <!-- 왼쪽: 오늘 할 일 -->
      <div class="gtab-col">
        <section class="card gtodo gtodo--tab">
          <div class="gtodo__head">
            <span class="gtodo__title">오늘 할 일</span>
            <span class="gtodo__count" id="g-count" hidden>0/0 완료</span>
          </div>
          <div id="g-list"></div>
          <button type="button" class="gtodo__addbtn" id="g-add-row">＋ 할 일 추가</button>
        </section>

        <!-- 어제 미완료 이월 안내 -->
        <div class="gcarry" id="g-carry" hidden>
          <span id="g-carry-text"></span>
          <button type="button" class="gcarry__btn" id="g-carry-btn">가져오기</button>
        </div>

        <!-- 예정: 오늘 이후 날짜의 할 일 -->
        <section class="card gtodo" id="g-upcoming" hidden>
          <div class="gtodo__head">
            <span class="gtodo__title">예정</span>
          </div>
          <div id="g-upcoming-list"></div>
        </section>
      </div>

      <!-- 오른쪽: 일정 (오늘 + 다가오는 7일) · 웹에선 업무 메모 패널 -->
      <div class="gtab-col">
        <section class="card gnote" id="gnote" hidden>
          <div class="gtodo__head">
            <span class="gtodo__title" id="gnote-title">업무 메모</span>
            <span class="gtodo__count" id="gnote-status"></span>
          </div>
          <textarea id="gnote-body" class="gnote__body" placeholder="이 업무에 대한 메모를 적어보세요"></textarea>
        </section>
        <section class="card gtab-events mevents" id="g-events">
          <div id="g-events-list"><p class="gtodo__empty">표시할 일정이 없어요</p></div>
        </section>
      </div>
    </div>
  </main>

  <!-- 할 일 작성 시트 -->
  <div class="evsheet" id="gt-sheet" hidden>
    <div class="evsheet__backdrop" data-gt-close></div>
    <div class="evsheet__panel">
      <div class="evsheet__head">
        <button type="button" class="evsheet__cancel" data-gt-close>취소</button>
        <span class="evsheet__title">새 할 일</span>
        <button type="button" class="evsheet__save" id="gt-save">추가</button>
      </div>
      <input type="text" id="gt-input" class="field__input gt-input" placeholder="무엇을 해야 하나요?"
             maxlength="200" autocomplete="off" enterkeyhint="done" />
      <div class="gt-chips" id="gt-when">
        <button type="button" class="gt-chip is-active" data-when="today">오늘</button>
        <button type="button" class="gt-chip" data-when="tomorrow">내일</button>
        <button type="button" class="gt-chip" data-when="pick">날짜 선택</button>
      </div>
      <input type="date" id="gt-date" class="field__input" hidden />
      <button type="button" class="gt-imp" id="gt-imp"><span class="gt-imp__star">★</span> 중요한 할 일</button>
      <div class="gt-tags" id="gt-tags"></div>
      <div class="catmgr__addrow" id="gt-tagadd" hidden>
        <input type="text" id="gt-tag-input" class="field__input" placeholder="새 태그 이름" maxlength="12" autocomplete="off" />
        <button type="button" class="catmgr__addbtn" id="gt-tag-btn">추가</button>
      </div>
    </div>
  </div>

      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .34 1.87l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.7 1.7 0 0 0-1.87-.34 1.7 1.7 0 0 0-1 1.55V21a2 2 0 1 1-4 0v-.09a1.7 1.7 0 0 0-1-1.55 1.7 1.7 0 0 0-1.87.34l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.7 1.7 0 0 0 .34-1.87 1.7 1.7 0 0 0-1.55-1H3a2 2 0 1 1 0-4h.09a1.7 1.7 0 0 0 1.55-1 1.7 1.7 0 0 0-.34-1.87l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.7 1.7 0 0 0 1.87.34h.09a1.7 1.7 0 0 0 1-1.55V3a2 2 0 1 1 4 0v.09a1.7 1.7 0 0 0 1 1.55 1.7 1.7 0 0 0 1.87-.34l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.7 1.7 0 0 0-.34 1.87v.09a1.7 1.7 0 0 0 1.55 1H21a2 2 0 1 1 0 4h-.09a1.7 1.7 0 0 0-1.55 1z"/></svg>
