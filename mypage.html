<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
  <title>마이페이지 · 핀로그</title>
  <link rel="stylesheet" href="/css/style.css?v=179" />
</head>
<body class="app-bg">
  <header class="topbar">
    <a href="/settings.html" class="topbar__back" aria-label="뒤로 가기"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M15 5l-7 7 7 7"/></svg></a>
    <div class="topbar__brand">마이페이지</div>
    <span></span>
  </header>

  <main class="container">
    <!-- 프로필 -->
    <section class="card mypage__head">
      <span class="mypage__avatar" id="mp-avatar">—</span>
      <div class="mypage__namewrap">
        <input type="text" id="mp-name" class="field__input" maxlength="20" placeholder="이름" autocomplete="off" />
        <button type="button" class="btn btn--primary mypage__save" id="mp-save" disabled>저장</button>
      </div>
      <p class="mypage__email" id="mp-email">—</p>
    </section>

    <!-- 계정 정보 -->
    <section class="card settings-menu">
      <div class="settings-row settings-row--static">
        <span>로그인 방식</span>
        <span class="settings-row__value" id="mp-provider">—</span>
      </div>
      <div class="settings-row settings-row--static">
        <span>사용 유형</span>
        <span class="settings-row__value" id="mp-type">—</span>
      </div>
      <div class="settings-row settings-row--static">
        <span>가입일</span>
        <span class="settings-row__value" id="mp-joined">—</span>
      </div>
    </section>
  </main>

  <script src="/js/vendor/supabase.js"></script>
  <script src="/js/supabaseClient.js?v=mock13"></script>
  <script src="/js/utils.js?v=35"></script>
  <script src="/js/notify.js?v=4"></script>
  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      const user = await requireAuth();
      if (!user) return;
      const profile = await getCurrentProfile();
      if (!profile) { window.location.href = "/welcome.html"; return; }

      const nameInput = document.getElementById("mp-name");
      const saveBtn = document.getElementById("mp-save");
      const avatarEl = document.getElementById("mp-avatar");

      const paintAvatar = (n) => { avatarEl.textContent = (n || "?").trim().charAt(0) || "?"; };
      nameInput.value = profile.name || "";
      paintAvatar(profile.name);
      document.getElementById("mp-email").textContent = user.email || "";

      const PROVIDERS = { kakao: "카카오", google: "Google", apple: "Apple", email: "이메일" };
      const prov = (user.app_metadata && user.app_metadata.provider) || "email";
      document.getElementById("mp-provider").textContent = PROVIDERS[prov] || prov;
      document.getElementById("mp-type").textContent = profile.user_type === "general" ? "일반 사용자" : "수험생";
      if (user.created_at) {
        const d = new Date(user.created_at);
        document.getElementById("mp-joined").textContent = `${d.getFullYear()}년 ${d.getMonth() + 1}월 ${d.getDate()}일`;
      }

      nameInput.addEventListener("input", () => {
        saveBtn.disabled = !nameInput.value.trim() || nameInput.value.trim() === (profile.name || "");
      });
      saveBtn.addEventListener("click", async () => {
        const name = nameInput.value.trim();
        if (!name) return;
        saveBtn.disabled = true;
        const { error } = await supabaseClient.from("profiles").update({ name }).eq("id", user.id);
        if (error) { showToast("이름을 저장하지 못했어요", "error"); saveBtn.disabled = false; return; }
        profile.name = name;
        localStorage.removeItem("dt_profile_cache");   // 다음 로드에서 새로 캐시
        paintAvatar(name);
        showToast("이름을 변경했어요");
      });
    });
  </script>
</body>
</html>
